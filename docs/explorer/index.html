bsystem":"Bridge & Extend","loopCode":""},{"id":"rec2JyzX5aClPvUl4_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"High","mechanism":"Each exit into the shadow system spends down the Trust seam: as more people give up on formal care, trust in public institutions erodes, which pushes still more people out in a reinforcing drain.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"rec23YWljo96oYOH6","label":"Net harm vs net asset","question":"Is the shadow system net harm (unsafe, unmonitored, inequitable) or net asset (access and innovation for the excluded), or does it cut both ways depending on who uses it?","poleA":"Net asset: access for the excluded","poleB":"Net harm: unsafe and inequitable","sharpest":false,"outcomes":[{"id":"recel2bAnSt4j4WGt","label":"Access for the excluded","direction":"Mixed / depends","alignment":"Mixed / depends","narrative":"For people the mainstream fails, the shadow system delivers real access and innovation, while the same channel is unsafe for others, so the outcome depends on who uses it and how public health engages.","strategicMove":"The mechanism is selective engagement: treat the access the shadow system provides to the excluded as an asset to build on through harm reduction and quality signals, while bridging users toward safer options rather than criminalizing the channel wholesale. The venue is harm-reduction and community engagement programs that meet users where they already are, the online pharmacies and peer networks the excluded actually rely on. The hard part is that engaging without endorsing is a genuine tightrope: legitimize too much and you bless unsafe products, condemn too much and you push the excluded back into pure darkness. The move: engage the shadow system as a differentiated harm-reduction problem, investing where it serves the excluded and steering toward safety, because the reflex to treat it as uniformly criminal destroys the access it provides to the people the mainstream already abandoned.","impacts":[{"id":"recel2bAnSt4j4WGt_rec9AMEcryfbNiCUX","label":"R3 — Partner-leverage reach","effect":"Reshapes","magnitude":"Medium","mechanism":"Treated as an asset, the shadow system can be worked through the partner-leverage reach loop: public health borrows the channel's existing reach to the excluded rather than fighting it, though fidelity is uncertain.","loopName":"R3 — Partner-leverage reach","loopSubsystem":"Translate & Disperse","loopCode":"R3"}]},{"id":"rec984eOxkw6vluFR","label":"Unsafe and inequitable","direction":"Negative","alignment":"Needs collective action","narrative":"Unmonitored products, no quality control, and no recourse make the shadow system a source of preventable harm concentrated among the most vulnerable.","strategicMove":"This is the negative default because an unregulated market has no incentive to guarantee quality, and the people with no safer alternative absorb the injuries off the books where no system counts them. The engine is the absence of oversight plus the absence of any safer, affordable option that would pull vulnerable users out. The hard part is that the obvious response, crackdowns, drives the harm deeper underground and strips away the last points of contact, so enforcement makes the counting harder and the injuries worse. The move: reduce harm at the source by funding drug-checking, product testing, and low-barrier safer alternatives rather than crackdowns, because preventable harm concentrated in the vulnerable falls only when there is a safer option they can actually reach, not when the unsafe one is merely outlawed.","impacts":[{"id":"rec984eOxkw6vluFR_rec72k0jpsfpCyrde","label":"B3 — Community agency (catalyst vs recipient)","effect":"Weakens","magnitude":"High","mechanism":"Concentrated, unmonitored harm undermines the community-agency loop: when the only accessible option is unsafe, vulnerable communities are left choosing between exclusion and risk, not real agency.","loopName":"B3 — Community agency (catalyst vs recipient)","loopSubsystem":"Convene","loopCode":"B3"}]}]}]},{"id":"recf2tdIoRVe87K06","name":"From Sick Care to Self-Care","theme":"Decentralization & Consumerization","headline":"Health is shifting from sick care to self-care.","short":"Proactive, privatized health rising against reactive medicine, with wellness for those who can pay.","neutralHeadline":"Health is shifting from sick care to self-care.","neutralReading":"Health is shifting from treating sickness toward proactive self-management, wellness, and prevention, propelled by consumer tools and wearables. This can advance real prevention and agency or become privatized wellness for those who can pay. A neutral shift in orientation with an equity question attached.","neutralName":"","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"rec8nlx363nJipcdj","label":"Prevention vs privatized wellness","question":"As the culture shifts from treating sickness toward consumer-driven wellness and self-management, does this become a genuine population-wide prevention movement, or a privatized wellness market that mostly serves those who can already pay?","poleA":"Population-wide prevention shift","poleB":"Privatized wellness for those who can pay","sharpest":true,"outcomes":[{"id":"reckZEV08M4dA02vG","label":"Upstream prevention at scale","direction":"Positive","alignment":"Engineered alignment","narrative":"The wellness turn channels real money and attention into prevention, and public health steers it toward evidence-based habits across whole populations.","strategicMove":"The mechanism is to become the setter of defaults and the trusted source the wellness channel cites: publish the evidence-graded prevention standards, embed them in the apps, employer programs, and retail wellness offerings people already use, and certify what actually works. The venue is the consumer wellness channel and the credibility layer, where public health licenses its authority into commercial products rather than launching its own. The hard part is that steering commercial energy means partnering with a market full of unproven claims, risking the public brand on products it cannot fully control. The move: define and own the prevention evidence standard that the wellness industry adopts to look legitimate, converting the market's marketing budget into a distribution channel for real upstream habits.","impacts":[{"id":"reckZEV08M4dA02vG_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Strengthens","magnitude":"Medium","mechanism":"Demonstrated upstream results build the trust that unlocks funding, feeding the trust-and-funding engine that sustains further prevention work.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"},{"id":"reckZEV08M4dA02vG_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"High","mechanism":"A real population prevention shift lowers disease burden in measurable ways, giving public health hard evidence of program effectiveness that reinforces the seam.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recK903FUGveVcFg1","label":"Wellness for the wealthy","direction":"Negative","alignment":"Self-aligned","narrative":"The movement calcifies into a premium market of coaches, supplements, and memberships priced beyond most people, and prevention becomes a luxury good.","strategicMove":"This is the default that wins because the wellness market monetizes those who can already pay, and there is no revenue in prevention for people with none, so the commercial gravity pulls upmarket by itself. The engine is profit incentive plus the absence of a funded actor whose job is the excluded. The hard part is that reaching non-paying populations has no business model, so it happens only if public health pays for it, and that funding competes with everything else in a thin budget. The move: fund and deliver free or subsidized prevention through the channels the excluded actually use, community programs and safety-net venues, because if public health does not own reach to the non-paying majority, the market never will.","impacts":[{"id":"recK903FUGveVcFg1_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Weakens","magnitude":"Medium","mechanism":"If gains concentrate among those who can pay, population-level effectiveness stalls, undercutting public health's ability to show broad program impact.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recK903FUGveVcFg1_rec4NCooYpMNY00fu","label":"B2 — Barrier amplification","effect":"Strengthens","magnitude":"High","mechanism":"When prevention becomes a paid luxury, cost and cultural barriers amplify, pushing wellness further out of reach for the very communities public health serves.","loopName":"B2 — Barrier amplification","loopSubsystem":"Convene","loopCode":"B2"}]}]},{"id":"recMfTOly8yCFRVul","label":"Closes gap vs widens gap","question":"Does the self-care and wellness turn reach underserved communities and narrow health disparities, or does it widen the gap between the optimizing few and the excluded many?","poleA":"Narrows disparities by reaching the underserved","poleB":"Widens the gap between optimizers and excluded","sharpest":false,"outcomes":[{"id":"recInk8vMoNasJRpt","label":"Equity dividend","direction":"Positive","alignment":"Engineered alignment","narrative":"Low-cost tools, community programs, and outreach carry self-care into underserved neighborhoods, and disparities narrow.","strategicMove":"The mechanism is to reach the excluded the market leaves out: subsidize the wearables and self-tracking tools, run the trusted community programs, and translate wellness into practical prevention where safety-net clinics and community networks already have standing. The venue is community health worker networks and safety-net delivery sites, the surfaces the wellness market ignores because they do not pay. The hard part is that equity delivery is pure cost with no commercial partner to share it, so it survives only on dedicated public financing that erodes the moment the wellness fad cools. The move: build equity into the wellness shift by financing distribution through community networks, and lock in the funding before attention moves on, because the gap closes only where public health pays to close it.","impacts":[{"id":"recInk8vMoNasJRpt_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Strengthens","magnitude":"Medium","mechanism":"Visibly helping the underserved benefit from the wellness shift builds public health's standing and trust in exactly the communities where it matters most.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"},{"id":"recInk8vMoNasJRpt_rec4NCooYpMNY00fu","label":"B2 — Barrier amplification","effect":"Weakens","magnitude":"High","mechanism":"Reaching underserved communities with low-cost self-care tools directly counters the barrier-amplification dynamic, easing access rather than compounding exclusion.","loopName":"B2 — Barrier amplification","loopSubsystem":"Convene","loopCode":"B2"}]},{"id":"rec8MyFU5E2qre1Lt","label":"Optimization divide","direction":"Negative","alignment":"Self-aligned","narrative":"The already-healthy optimize further while excluded communities fall behind, priced and designed out of the wellness economy into a new axis of inequity.","strategicMove":"This is the default that wins by inertia, because wellness products are built for and sold to those who can pay and have time, and no market force carries them to anyone else. The engine is commercial targeting plus the absence of a funded counterweight for the excluded. The hard part is that closing the gap has no buyer, so it depends entirely on public spending that must be defended every cycle against the visible optimizers who need it least but vote and fund. The move: treat reach to the excluded as the core public-health product of the wellness era and finance it deliberately, because left to the market the self-care turn is an inequity engine, not a leveler.","impacts":[{"id":"rec8MyFU5E2qre1Lt_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Weakens","magnitude":"Medium","mechanism":"A widening optimization divide signals that prevention is not for everyone, weakening public health's standing among the communities left out of the wellness economy.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"}]}]},{"id":"recoBaGYyjVOisRh8","label":"Ride wave vs drowned out","question":"Can public health ride the wellness wave to promote credible upstream prevention, or does it get drowned out by commercial marketing and unproven optimization products?","poleA":"Rides the wave as a credible voice","poleB":"Drowned out by commercial noise","sharpest":false,"outcomes":[{"id":"recsvcrZlEiX64z6Y","label":"Credible voice on the wave","direction":"Positive","alignment":"Self-aligned","narrative":"Public health becomes the trusted, science-based source consumers actively seek in a crowded wellness market, and the wave amplifies its message.","strategicMove":"The mechanism is to be the neutral referee the market cannot fake: publish independent evaluations of wellness products and claims, and become the source that credible sellers cite and confused buyers check, so authority is the differentiator. The venue is the credibility-and-evaluation layer, a trust-mark or clearinghouse consumers and journalists turn to when the hype is thick. The hard part is that neutrality means calling out popular and profitable products, inviting industry backlash and requiring the discipline to stay unbought when partnership money is offered. The move: stand up an authoritative evaluation function and defend its independence, because in a market drowning in claims the scarce asset is a source no one can buy, and that source is worth building only if it stays incorruptible.","impacts":[{"id":"recsvcrZlEiX64z6Y_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Strengthens","magnitude":"High","mechanism":"When consumers seek out public health for trusted guidance amid the hype, each credible answer compounds its authority, spinning the credibility flywheel.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]},{"id":"recGiCCtCajRhauTP","label":"Drowned out by hype","direction":"Negative","alignment":"Self-aligned","narrative":"Slick commercial marketing and influencers outshout public health, unproven claims crowd the field, and the prevention conversation is ceded to sellers.","strategicMove":"This is the default that wins because sellers have budgets, algorithms, and emotional hooks while public health has caveats and press releases, so on the attention battlefield it is simply outgunned. The engine is a mismatch of communication capacity, and trying to win by shouting louder is a fight the noise always wins. The hard part is that competing for attention on the sellers' terms burns credibility and money for fleeting reach, when the durable move is to become the reference standard the noise must answer to rather than another voice in it. The move: stop chasing attention and become the cited authority, the evaluations and defaults that credible actors point to, because public health wins on being the trusted source, not on out-shouting people who are better at shouting.","impacts":[{"id":"recGiCCtCajRhauTP_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Weakens","magnitude":"High","mechanism":"Commercial noise and unproven claims crowd out public health's message, starving the credibility flywheel of the attention and trust it needs to build.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]}]}]},{"id":"recMosQmtESM4thy5","name":"The Decentralization of Care","theme":"Decentralization & Consumerization","headline":"Care is leaving the hospital.","short":"Into the home, the phone, retail, and wearables, scattered across private, often unconnected nodes.","neutralHeadline":"Care is moving out of the hospital.","neutralReading":"Care is moving out of centralized clinical settings into the home, the phone, retail, and wearables. That can expand access and convenience while fragmenting accountability and the population view. A neutral shift in where care happens, with the balance set by how well it is integrated.","neutralName":"","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"recBZ6gfLh0ydLrSL","label":"Access vs fragmentation","question":"As care moves into homes, retail, telehealth, and community venues, does decentralization expand access and prevention while integrating with public health, or does it fragment accountability and widen the gaps it was meant to close?","poleA":"Integrated access that expands prevention","poleB":"Fragmented system that evades oversight","sharpest":true,"outcomes":[{"id":"recLiNi8xf72unhKz","label":"Access engine for prevention","direction":"Positive","alignment":"Engineered alignment","narrative":"Retail clinics, pharmacies, and home visits become coordinated new front doors for screening, vaccination, and prevention, not scattered one-offs.","strategicMove":"Public health sets the enabling substrate that lets dispersed sites count as coverage: shared clinical protocols, a common vaccination and screening registry every venue writes into, and eligibility rules that route the underserved to the nearest door. The venue is the standards-and-registry layer plus the contracts with retail and home-care operators, upstream of any one clinic. The hard part is that standardization is unglamorous, slow, and invisible when it works, so it loses every budget fight to a visible program that cuts a ribbon. The move: fund and own the registry and protocol layer that turns a thousand private front doors into one measurable coverage system, and write it into the partnership contracts before the venues set their own.","impacts":[{"id":"recLiNi8xf72unhKz_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"Medium","mechanism":"Successful decentralized delivery generates visible wins that feed the delivery-reputation engine, reinforcing public health's standing as an effective partner across settings.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"},{"id":"recLiNi8xf72unhKz_receijri1gmOH75Ha","label":"Three delivery channels","effect":"Strengthens","magnitude":"High","mechanism":"Adding home, retail, and telehealth as coordinated delivery channels widens the throughput of the three-channel model, so prevention reaches more people through more doors.","loopName":"Three delivery channels","loopSubsystem":"Bridge & Extend","loopCode":""}]},{"id":"recxwtiLaQCnFRrpq","label":"Accountability sinkhole","direction":"Negative","alignment":"Needs collective action","narrative":"Care scatters across venues with no shared standards or safety net, and responsibility for the hardest-to-reach falls between the cracks.","strategicMove":"This is the default that wins by inertia, because each new venue optimizes for its own throughput and no actor is paid to own the seams between them. The engine is a fragmented market plus the absence of any funded steward of continuity, so a patient bounced from a telehealth app to a retail clinic to a home service is nobody's responsibility. The hard part is that fixing it means imposing reporting and referral obligations that every venue will resist as cost and friction, and public health has weak leverage to compel them. The move: make handoff and referral accountability a licensing or reimbursement condition rather than a request, so continuity has an owner with teeth instead of dissolving into good intentions.","impacts":[{"id":"recxwtiLaQCnFRrpq_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Weakens","magnitude":"Medium","mechanism":"Scattered, uncoordinated care makes it harder to show program effectiveness, since outcomes cannot be traced or attributed across disconnected venues.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recxwtiLaQCnFRrpq_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Weakens","magnitude":"High","mechanism":"When care fragments with no shared accountability, vendors set the terms of the root PHI-versus-vendor relationship, tilting it toward the vendor and hollowing out public health's leverage.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""}]}]},{"id":"recEQUmVAODTdBD6n","label":"Data visibility vs blind spots","question":"With care dispersed across many sites and platforms, does public health gain richer data and visibility into population health, or does it lose the picture as information stays siloed inside private venues?","poleA":"Fuller data across dispersed sites","poleB":"Loss of the population picture","sharpest":false,"outcomes":[{"id":"recxWQtggyoG9Lgp2","label":"Networked surveillance upgrade","direction":"Positive","alignment":"Engineered alignment","narrative":"Telehealth, pharmacy, and home visits feed standardized data back to public health, forming a denser sensing network than centralized clinics ever were.","strategicMove":"The mechanism is a mandated interoperability and reporting standard: dispersed sites must emit case, syndromic, and coverage data in a common format as a condition of operating, turning private encounters into public signal. The venue is the reporting requirement and the data-standards body, the choke point every venue must pass through regardless of platform. The hard part is that data is a commercial asset the venues would rather hoard, and building the pipes and the standard costs real money with no immediate outbreak to justify it. The move: use public health's one durable lever, the reporting mandate, to require standardized data emission now while the venues are still being licensed, because a standard not set at entry never gets retrofitted.","impacts":[{"id":"recxWQtggyoG9Lgp2_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"High","mechanism":"Standardized data flowing back from dispersed sites lets public health measure and target interventions more precisely, directly boosting demonstrated program effectiveness.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recNmOHBy0CmFPYiM","label":"Data goes dark","direction":"Negative","alignment":"Self-aligned","narrative":"Private platforms hoard the data they collect, no interoperability rule forces it into the public picture, and public health flies blind on whole segments of care.","strategicMove":"This is the default that wins because data is more valuable to a platform as a proprietary moat than as a public good, and nobody made emitting it a condition of doing business. The engine is commercial incentive plus regulatory absence: with no reporting mandate, the rational move for every venue is to keep its data. The hard part is that once platforms have built their businesses on data exclusivity, prying it loose triggers lobbying, litigation, and claims of privacy and trade secrecy that public health rarely has the resources to outlast. The move: fight for the interoperability and reporting mandate at the point of licensing and procurement, before exclusivity hardens, because after the fact the cost of forcing visibility exceeds what any health department can pay.","impacts":[{"id":"recNmOHBy0CmFPYiM_rec9AMEcryfbNiCUX","label":"R3 — Partner-leverage reach","effect":"Weakens","magnitude":"Medium","mechanism":"If partner data stays siloed, public health cannot leverage those partners to extend reach, since it never sees where the gaps and opportunities are.","loopName":"R3 — Partner-leverage reach","loopSubsystem":"Translate & Disperse","loopCode":"R3"}]}]},{"id":"recP2rcRwTv77yGg7","label":"Partners vs competitors","question":"Do the new venues delivering care, such as retail clinics, telehealth firms, and home-based services, partner with public health as delivery channels, or do they bypass and compete with it for the same populations and funding?","poleA":"Aligned delivery partners","poleB":"Competitors that bypass public health","sharpest":false,"outcomes":[{"id":"recaHy4Y7J3LKvUaC","label":"Delivery-channel alliance","direction":"Positive","alignment":"Engineered alignment","narrative":"Retail, telehealth, and home-care providers adopt public health as their trusted convener and content source, routing patients into its programs.","strategicMove":"The mechanism is to become the credibility layer the venues rent rather than build: public health supplies the vetted clinical content, referral pathways, and the trusted brand that a retail or telehealth operator cannot manufacture and does not want to be liable for. The venue is the content-and-referral partnership agreement, where public health trades its authority for the operator's reach. The hard part is that being the neutral content source means giving up direct control of the patient relationship and the visible credit, so the venue gets the customer and public health gets the footnote. The move: strike partnership deals that make public health the indispensable standards-and-content backbone the venues cite, accepting the invisible role in exchange for shaping what every partner delivers.","impacts":[{"id":"recaHy4Y7J3LKvUaC_rec9AMEcryfbNiCUX","label":"R3 — Partner-leverage reach","effect":"Strengthens","magnitude":"Medium","mechanism":"Aligned retail and telehealth partners carry public health messages and programs into their own customer bases, multiplying reach through partner leverage.","loopName":"R3 — Partner-leverage reach","loopSubsystem":"Translate & Disperse","loopCode":"R3"},{"id":"recaHy4Y7J3LKvUaC_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Strengthens","magnitude":"High","mechanism":"When new venues treat public health as trusted convener and route patients to its programs, its visibility and standing in the community compound through the community-standing loop.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"}]},{"id":"recagI93Ovl8L1M03","label":"Bypassed and outcompeted","direction":"Negative","alignment":"Self-aligned","narrative":"Well-funded venues treat public health as a rival for patients and dollars, route around it, and consumers default to the convenient commercial option.","strategicMove":"This is the default that wins by inertia, because retail and telehealth firms have product, capital, and marketing while public health competes on the same turf with none of those and a weaker brand for convenience. The engine is a capability mismatch: fighting for the same patients on the venues' terms is a fight public health loses. The hard part is that the instinct to compete head-to-head burns scarce resources on a game already lost, when the winnable move is to become infrastructure the competitors depend on rather than a competitor they outspend. The move: stop competing for the patient and start owning the standards, data, and referral rails the venues must use, so public health is the layer they build on instead of the rival they bypass.","impacts":[{"id":"recagI93Ovl8L1M03_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Breaks / reverses","magnitude":"High","mechanism":"When venues position as rivals and route around public health, the root PHI-versus-vendor relationship flips from partnership to competition, breaking the collaboration the loop depends on.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""}]}]}]}]};

const DIR_COLOR = {"Positive":"#2F8F2A","Negative":"#FF644E","Mixed / depends":"#B9860B"};
const ALIGN = {
  "Self-aligned":{c:"#2F8F2A",bg:"rgba(47,143,42,0.10)"},
  "Engineered alignment":{c:"#275DE2",bg:"rgba(39,93,226,0.10)"},
  "Needs collective action":{c:"#FF644E",bg:"rgba(255,100,78,0.10)"},
  "Mixed / depends":{c:"#B9860B",bg:"rgba(185,134,11,0.12)"}
};
const ALIGN_SHORT = {"All":"All","Self-aligned":"Self-aligned","Engineered alignment":"Engineered","Needs collective action":"Needs collective","Mixed / depends":"Mixed"};
const EFFECT = {"Strengthens":"#2F8F2A","Weakens":"#E07A26","Breaks / reverses":"#D1382A","Reshapes":"#4B45C6","Neutral / unclear":"#6B6B5E"};
function effectColor(e){ return EFFECT[e] || "#6B6B5E"; }
function effectBg(e){ return effectColor(e)+"1A"; }

function Marker({color}){
  return (
    <svg className="mark-svg" viewBox="0 0 300 24" preserveAspectRatio="none" aria-hidden="true">
      <path d="M3 16 C 60 7, 120 18, 180 11 S 285 8, 297 14" stroke={color||"var(--lime)"} strokeWidth="11" fill="none" strokeLinecap="round"/>
    </svg>
  );
}
function MarkText({children}){
  return (<span className="mark-wrap"><Marker/><span className="mark-txt">{children}</span></span>);
}
function isHopefulSeed(o){ return o.direction==="Positive" && (o.alignment==="Self-aligned" || o.alignment==="Engineered alignment"); }
function magDots(mag){
  const map={High:1,Medium:0.6,Low:0.3};
  const op=map[mag]!==undefined?map[mag]:0.6;
  return (<span className="mag" title={mag}><span className="d" style={{opacity:op}}></span><span className="d" style={{opacity:op}}></span><span className="d" style={{opacity:op}}></span></span>);
}

function OutcomeBlock({o}){
  const dc = DIR_COLOR[o.direction] || "#6B6B5E";
  const al = ALIGN[o.alignment] || {c:"#6B6B5E",bg:"rgba(107,107,94,0.1)"};
  const [smOpen,setSmOpen] = useState(false);
  const hasMove = typeof o.strategicMove === "string" && o.strategicMove.trim().length>0;
  return (
    <div className="outcome" style={{borderLeftColor:dc}}>
      <div className="oc-head">
        <span className="oc-label">{o.label}</span>
        <span className="oc-dir" style={{color:dc}}>{o.direction}</span>
        <span className="align-chip" style={{color:al.c,background:al.bg,borderColor:al.c}}>{o.alignment}</span>
      </div>
      <div className="oc-narr">{o.narrative}</div>
      {hasMove && (
        <React.Fragment>
          <button className={"sm-toggle"+(smOpen?" open":"")} onClick={()=>setSmOpen(!smOpen)} aria-expanded={smOpen}>
            <span className="sm-caret">{smOpen?"▾":"▸"}</span> Strategic move
          </button>
          {smOpen && <div className="sm-body">{o.strategicMove}</div>}
        </React.Fragment>
      )}
      {o.impacts.length>0 && <div className="imp-label">Loop Impacts</div>}
      <div className="imp-list">
        {o.impacts.map((im,i)=>(
          <div className="imp" key={i}>
            <div className="imp-top">
              <span className="effect-chip" style={{color:effectColor(im.effect),background:effectBg(im.effect),borderColor:effectColor(im.effect)}}>{im.effect}</span>
              {magDots(im.magnitude)}
              <span className="imp-loop">{im.loopName}</span>
              <span className="imp-sub">{im.loopSubsystem}{im.loopCode?(" · "+im.loopCode):""}</span>
            </div>
            <div className="imp-mech">{im.mechanism}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function UncertaintyCard({u,open,onToggle,filteredOutcomes,dim}){
  return (
    <div className={"unc-card"+(dim?" dim":"")}>
      <button className="unc-head" onClick={onToggle} aria-expanded={open}>
        <span className="unc-caret">{open?"▾":"▸"}</span>
        <span className="unc-title-block">
          <span className="unc-label">{u.label}{u.sharpest && <span className="sharp-pill">Sharpest Axis</span>}</span>
          <div className="unc-q">{u.question}</div>
          <div className="poles">
            <span className="pole a">{u.poleA}</span>
            <span className="pole-line"></span>
            <span className="pole b">{u.poleB}</span>
          </div>
        </span>
        <span className="unc-count">{filteredOutcomes.length} / {u.outcomes.length}</span>
      </button>
      {open && filteredOutcomes.length>0 && (
        <div className="outcomes">
          {filteredOutcomes.map(o=><OutcomeBlock key={o.id} o={o} />)}
        </div>
      )}
    </div>
  );
}

function App(){
  const [search,setSearch] = useState("");
  const [topOnly,setTopOnly] = useState(false);
  const keystone = DATA.drivers.find(d=>d.name==="The Receding Public") || DATA.drivers[0];
  const [activeId,setActiveId] = useState(keystone.id);
  const [alignFilter,setAlignFilter] = useState("All");
  const [hopeful,setHopeful] = useState(false);
  const initUnc = (keystone.uncertainties.find(function(u){return u.sharpest;})||keystone.uncertainties[0]).id;
  const [selUncId,setSelUncId] = useState(initUnc);
  const [legendOpen,setLegendOpen] = useState(false);
  const mainRef = React.useRef(null);

  const active = DATA.drivers.find(d=>d.id===activeId) || keystone;
  const curUnc = active.uncertainties.find(function(u){return u.id===selUncId;}) || active.uncertainties.find(function(u){return u.sharpest;}) || active.uncertainties[0];

  const groups = useMemo(function(){
    const q = search.trim().toLowerCase();
    const order = [];
    DATA.drivers.forEach(function(d){
      if(topOnly && !d.topRight) return;
      if(q && d.name.toLowerCase().indexOf(q)===-1) return;
      if(order.indexOf(d.theme)===-1) order.push(d.theme);
    });
    const g=[];
    order.forEach(function(th){
      const rows = DATA.drivers.filter(function(d){ return d.theme===th && (!topOnly||d.topRight) && (!q||d.name.toLowerCase().indexOf(q)!==-1); });
      if(rows.length) g.push({theme:th,rows:rows});
    });
    return g;
  },[search,topOnly]);

  function seedCount(d){
    let n=0;
    d.uncertainties.forEach(function(u){ u.outcomes.forEach(function(o){ if(isHopefulSeed(o)) n++; }); });
    return n;
  }
  function selectDriver(id){
    setActiveId(id);
    const d = DATA.drivers.find(function(x){return x.id===id;});
    if(d){ const su = d.uncertainties.find(function(u){return u.sharpest;})||d.uncertainties[0]; if(su) setSelUncId(su.id); }
    if(mainRef.current) mainRef.current.scrollTop = 0;
  }
  function filterOutcomes(u){
    if(hopeful){ return u.outcomes.filter(isHopefulSeed); }
    if(alignFilter!=="All"){ return u.outcomes.filter(function(o){ return o.alignment===alignFilter; }); }
    return u.outcomes;
  }
  const curFiltered = curUnc ? filterOutcomes(curUnc) : [];
  function setChip(a){
    setAlignFilter(a); setHopeful(false);
    if(a!=="All"){
      const match = active.uncertainties.find(function(u){ return u.outcomes.some(function(o){return o.alignment===a;}); });
      if(match) setSelUncId(match.id);
    }
  }
  function toggleHopeful(){
    const nv = !hopeful;
    setHopeful(nv);
    if(nv){
      setAlignFilter("All");
      const match = active.uncertainties.find(function(u){ return u.outcomes.some(isHopefulSeed); });
      if(match) setSelUncId(match.id);
    }
  }

  const tally = useMemo(function(){
    const t={"Self-aligned":0,"Engineered alignment":0,"Needs collective action":0,"Mixed / depends":0};
    active.uncertainties.forEach(function(u){ u.outcomes.forEach(function(o){ if(t[o.alignment]!==undefined) t[o.alignment]++; }); });
    return t;
  },[active]);

  const alignChips = ["All","Self-aligned","Engineered alignment","Needs collective action","Mixed / depends"];

  return (
    <div className="app">
      <aside className="sidebar">
        <MarkText><span className="app-title">Future of Public Health</span></MarkText>
        <div className="app-sub"><span className="eyebrow">Driver Explorer · to 2035</span></div>
        <input className="search" placeholder="Filter drivers…" value={search} onChange={function(e){setSearch(e.target.value);}} aria-label="Filter drivers" />
        <div className="toggle-row">
          <button className={"sq-toggle"+(topOnly?" on":"")} onClick={function(){setTopOnly(function(t){return !t;});}} role="switch" aria-checked={topOnly} aria-label="Top-ranked only"><span className="knob"></span></button>
          <span className="toggle-label">Top-ranked only</span>
        </div>
        {groups.map(function(g){
          return (
            <div className="theme-group" key={g.theme}>
              <div className="theme-label"><span className="eyebrow">{g.theme}</span></div>
              {g.rows.map(function(d){
                const isActive = d.id===activeId;
                const sc = hopeful ? seedCount(d) : 0;
                return (
                  <button className={"driver-row"+(isActive?" active":"")} key={d.id} onClick={function(){selectDriver(d.id);}} aria-current={isActive?"true":undefined}>
                    <span className={"diamond"+(d.topRight?"":" hidden")}></span>
                    {isActive && <span className="dr-mark"></span>}
                    <span className="dr-name">{d.name}</span>
                    {hopeful && sc>0 && <span className="count-badge">{sc}</span>}
                  </button>
                );
              })}
            </div>
          );
        })}
        {groups.length===0 && <div className="no-match" style={{paddingLeft:0}}>No drivers match.</div>}
        <div className="side-footer">
          <div className="lchar">L</div>
          <div className="ftitle">Future of Public Health</div>
          <div className="ftotals">22 drivers · 66 uncertainties · 132 outcomes · 187 loop impacts</div>
        </div>
      </aside>

      <main className="main" ref={mainRef}>
        <div className="main-header">
          <span className="eyebrow blue">{active.theme}</span>
          <h1 className="driver-name"><MarkText>{active.name}</MarkText></h1>
          <div className="driver-statement">{active.headline}</div>
          <div className="driver-short">{active.short}</div>
          <div className="meta-row">
            {active.impact && <span className="mini-tag">Impact: {active.impact}</span>}
            {active.uncertainty && <span className="mini-tag">Uncertainty: {active.uncertainty}</span>}
            <span className="align-tally">
              <span className="tally-item" title="Self-aligned"><span className="tally-sq" style={{background:ALIGN["Self-aligned"].c}}></span><span className="tally-n">{tally["Self-aligned"]}</span></span>
              <span className="tally-item" title="Engineered alignment"><span className="tally-sq" style={{background:ALIGN["Engineered alignment"].c}}></span><span className="tally-n">{tally["Engineered alignment"]}</span></span>
              <span className="tally-item" title="Needs collective action"><span className="tally-sq" style={{background:ALIGN["Needs collective action"].c}}></span><span className="tally-n">{tally["Needs collective action"]}</span></span>
              <span className="tally-item" title="Mixed / depends"><span className="tally-sq" style={{background:ALIGN["Mixed / depends"].c}}></span><span className="tally-n">{tally["Mixed / depends"]}</span></span>
            </span>
          </div>
        </div>

        <div className="controlbar">
          <div className="cb-inner">
            <span className="cb-label">Alignment lens</span>
            {alignChips.map(function(a){
              const isAll = a==="All";
              const col = isAll ? "var(--ink)" : ALIGN[a].c;
              const activeChip = !hopeful && alignFilter===a;
              return (
                <button key={a} className={"chip"+(activeChip?" active":"")} style={activeChip?{background:col,borderColor:col}:{}} onClick={function(){setChip(a);}}>
                  {!isAll && <span className="dot" style={{background:activeChip?"#fff":col}}></span>}
                  {ALIGN_SHORT[a]}
                </button>
              );
            })}
            <button className={"hopeful-btn"+(hopeful?" on":"")} onClick={toggleHopeful} aria-pressed={hopeful}>Hopeful Lens</button>
          </div>
          {hopeful && <div className="hopeful-banner">Hopeful lens: showing only positive outcomes that are self-aligned or engineered — the good that needs no mandate.</div>}
        </div>

        <div className="section-wrap">
          <span className="section-label">
            <span className="stxt">Key Uncertainties</span>
            <svg className="sunder" viewBox="0 0 64 12" preserveAspectRatio="none" aria-hidden="true"><path d="M2 8 C 16 4, 32 9, 48 6 S 60 5, 62 8" stroke="var(--lime)" strokeWidth="6" fill="none" strokeLinecap="round"/></svg>
          </span>
        </div>

        <div className="unc-tabs">
          {active.uncertainties.map(function(u){
            const filtered = filterOutcomes(u);
            const filtering = hopeful || alignFilter!=="All";
            const isSel = !!(curUnc && u.id===curUnc.id);
            const isDim = filtering && filtered.length===0;
            return (
              <button key={u.id} className={"unc-tab"+(isSel?" sel":"")+(isDim?" dim":"")} onClick={function(){setSelUncId(u.id);}} aria-pressed={isSel}>
                <span className="ut-top">
                  {u.sharpest && <span className="ut-sharp">Sharpest Axis</span>}
                  <span className="ut-count">{filtered.length}/{u.outcomes.length}</span>
                </span>
                <span className="ut-label">{u.label}</span>
                <span className="ut-poles">{u.poleA}<span className="ut-vs">/</span>{u.poleB}</span>
              </button>
            );
          })}
        </div>
        {curUnc && (
          <div className="unc-detail">
            <div className="ud-q">{curUnc.question}</div>
            <div className="poles">
              <span className="pole a">{curUnc.poleA}</span>
              <span className="pole-line"></span>
              <span className="pole b">{curUnc.poleB}</span>
            </div>
            {curFiltered.length>0 ? (
              <div className="outcomes">
                {curFiltered.map(function(o){ return <OutcomeBlock key={o.id} o={o} />; })}
              </div>
            ) : (
              <div className="ud-empty">No outcomes under this uncertainty match the current lens. Pick another, or turn the lens off.</div>
            )}
          </div>
        )}

        <div className="legend-wrap">
          <button className="legend-toggle" onClick={function(){setLegendOpen(function(o){return !o;});}} aria-expanded={legendOpen}>{legendOpen?"▾":"▸"} Legend</button>
          {legendOpen && (
            <div className="legend-body">
              <div className="legend-col">
                <h4>Direction</h4>
                <div className="legend-item"><span className="legend-sq" style={{background:"#2F8F2A"}}></span><span className="legend-txt">Positive</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#B9860B"}}></span><span className="legend-txt">Mixed / depends</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#FF644E"}}></span><span className="legend-txt">Negative</span></div>
              </div>
              <div className="legend-col">
                <h4>Alignment</h4>
                <div className="legend-item"><span className="legend-sq" style={{background:"#2F8F2A"}}></span><span className="legend-txt">Self-aligned</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#275DE2"}}></span><span className="legend-txt">Engineered alignment</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#FF644E"}}></span><span className="legend-txt">Needs collective action</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#B9860B"}}></span><span className="legend-txt">Mixed / depends</span></div>
              </div>
              <div className="legend-col">
                <h4>Loop Effect</h4>
                <div className="legend-item"><span className="legend-sq" style={{background:"#2F8F2A"}}></span><span className="legend-txt">Strengthens</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#E07A26"}}></span><span className="legend-txt">Weakens</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#D1382A"}}></span><span className="legend-txt">Breaks / reverses</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#4B45C6"}}></span><span className="legend-txt">Reshapes</span></div>
                <div className="legend-item"><span className="legend-sq" style={{background:"#6B6B5E"}}></span><span className="legend-txt">Neutral / unclear</span></div>
              </div>
            </div>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
