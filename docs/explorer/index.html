y owned, switching costs and dependency compound. The move: intervene at the leverage points still open, procurement terms, data provenance, interoperability, before the defaults harden.","impacts":[{"id":"recuHdfH8fJZRAITw_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Reshapes","magnitude":"High","mechanism":"Closed-model dependence rewrites the root PHI-vs-vendor relationship: the vendor owns the analytic core, so the PHI shifts from author of its own logic to a customer of it.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""},{"id":"recuHdfH8fJZRAITw_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Weakens","magnitude":"Medium","mechanism":"If the model does the reasoning, in-house analytic skill atrophies, weakening the Steward knowledge engine that normally compounds institutional expertise over time.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"}]}]}]},{"id":"recqpNBIkSGYO7ITm","name":"Biodata Sovereignty","theme":"The Data & AI Inflection","headline":"The body's data is up for grabs.","short":"Genomic, behavioral, and now neural data raise new questions of ownership, consent, and trust.","neutralHeadline":"Who owns the body's data is an open question.","neutralReading":"Genomic, behavioral, and increasingly neural data are becoming abundant, raising open questions of ownership, consent, and control. It is both a powerful resource for population health and a serious privacy and equity risk, depending on who governs it. Already neutral and two-sided.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recU6PBVsqYt1UKf5","label":"Public good vs private capture","question":"Can biodata be mobilized for population insight under consent and governance as a public good, or does it default to private capture, commercial exploitation, and personalization to the individual?","poleA":"Biodata as a governed public good","poleB":"Biodata privatized, captured, and personalized","sharpest":true,"outcomes":[{"id":"recwUWzBjV6xGaPGB","label":"Governed biodata commons","direction":"Positive","alignment":"Engineered alignment","narrative":"The body's data (genomic, biometric, neural) is mobilized for population insight under consent and governance, a public good rather than a private asset.","strategicMove":"Build a consented biodata commons with teeth: individuals opt in to specific, bounded uses, an independent public steward or trust holds the data, and researchers get insight without owning the raw streams. The venue is the consent architecture and governance structure, plus law that makes misuse costly. The hard part is that the commercial pull is enormous and constant, and a commons only holds if the steward is funded and the walls against capture and secondary use are enforced, not aspirational. The move: stand up the public-interest steward and consent regime early, and make participation worth people's trust with visible benefit and control.","impacts":[{"id":"recwUWzBjV6xGaPGB_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Strengthens","magnitude":"High","mechanism":"A governed biodata commons rests on and rebuilds the Trust seam: people contribute their most intimate data only when they trust the rules, and every honored commitment deepens the trust the system runs on.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recwUWzBjV6xGaPGB_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"Population insight from a well-run commons feeds the credibility flywheel: public health that visibly turns shared biodata into better guidance earns standing that makes the next contribution easier.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]},{"id":"recHc2risIW9UcRyw","label":"Private biodata capture","direction":"Negative","alignment":"Self-aligned","narrative":"Biodata defaults to private capture, harvested and monetized by platforms, and public health loses both access and standing to use it for the common good.","strategicMove":"This is the default because biodata is commercially valuable and collected wherever people use consumer health products, with no public steward competing for it. The engine is ordinary market self-interest moving faster than governance. The hard part is that once genomic and biometric data sit in private hands under terms-of-service consent, they are effectively unrecoverable, and the population insight they could have produced is locked away or sold back. The move: establish consent, ownership, and use-limitation rules at the point of collection, because after capture the leverage is gone.","impacts":[{"id":"recHc2risIW9UcRyw_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"Medium","mechanism":"Commercial harvesting of intimate data without real consent spends down the Trust seam: as people learn their biology is monetized, willingness to engage with any health institution erodes.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recHc2risIW9UcRyw_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Reshapes","magnitude":"High","mechanism":"Private biodata capture rewrites the root PHI-vs-vendor relationship: the platform owns the population biology, so public health must negotiate for access to insight it can no longer generate itself.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""}]}]},{"id":"rec0eQeP1wBL0rVCt","label":"Population health vs n-of-1","question":"If health goes fully n-of-1 (precision everything, trials of one), does shared population-level evidence survive as a common good, or does it dissolve into private, personalized silos?","poleA":"Shared population evidence survives","poleB":"Health dissolves into n-of-1 silos","sharpest":false,"outcomes":[{"id":"recHHHqPaoS4tJfB1","label":"Precision plus population","direction":"Positive","alignment":"Engineered alignment","narrative":"Even as care personalizes, the population view survives, and individual data still rolls up into the shared evidence base that protects everyone.","strategicMove":"Build the aggregation layer that turns n-of-1 data into population insight with consent: a standard and a steward that let personalized data feed surveillance and equity monitoring without exposing individuals. The venue is the data-standards and governance layer beneath the personalized apps. The hard part is that personalization's business model is individual, not collective, so no one in the market is paid to maintain the population rollup; it has to be built and funded as public infrastructure. The move: make consented population aggregation a required layer beneath personalized health, so the shared evidence base does not quietly disappear.","impacts":[{"id":"recHHHqPaoS4tJfB1_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Strengthens","magnitude":"Medium","mechanism":"When n-of-1 insights feed back into a common base, the Steward knowledge engine compounds: individual precision becomes reusable population knowledge instead of a dead-end private result.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"},{"id":"recHHHqPaoS4tJfB1_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"Low","mechanism":"Keeping a population lens on precision care feeds the Program-effectiveness seam: shared evidence lets public health see which personalized interventions actually move population outcomes.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"rec7XZhQtJxf7HlGn","label":"Evidence base dissolves","direction":"Negative","alignment":"Self-aligned","narrative":"Health goes fully n-of-1, and the logic of population evidence and shared protection erodes as everyone optimizes alone.","strategicMove":"This is where the market naturally goes: precision products serve individuals who can pay, evidence fragments into private datasets, and the population picture thins because no one profits from maintaining it. The engine is self-interest plus the absence of a public aggregator. The hard part is that public health's entire logic (shared risk, herd effects, equity) depends on a population view that n-of-1 quietly dissolves, and rebuilding it later is very hard. The move: insist on the consented population-aggregation layer now and fund it publicly, because a purely personalized system is blind exactly where public health needs to see.","impacts":[{"id":"rec7XZhQtJxf7HlGn_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Weakens","magnitude":"High","mechanism":"If health dissolves into private trials-of-one, the Steward knowledge engine starves: with no shared denominator, findings cannot aggregate, and the institutional knowledge base stops compounding.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"}]}]},{"id":"recGhhAvcWAw5CAXX","label":"Who controls the body's data","question":"By 2035, who controls the body's data (individuals, public institutions, or whoever scrapes it first), and does that control serve population health or fragment it?","poleA":"Individuals and public institutions hold control","poleB":"Whoever scrapes it first controls it","sharpest":false,"outcomes":[{"id":"rectAXTMpFN9OrQ71","label":"Individual data sovereignty","direction":"Mixed / depends","alignment":"Mixed / depends","narrative":"Control shifts toward individuals, but whether that helps the public depends on whether a collective steward stands behind the right.","strategicMove":"Make control operational, not rhetorical: portable personal health-data rights (you can move and revoke access), a public or fiduciary steward that defends those rights at scale, and standards that let data serve population good without surrendering ownership. The venue is data-rights law and the fiduciary institution. The hard part is that individual control alone is thin, since people cannot negotiate with platforms one by one, so it needs a collective agent holding the rights on their behalf, which does not exist by default and has no revenue. The move: build the fiduciary steward and portability rights together, so control is real rather than a checkbox.","impacts":[{"id":"rectAXTMpFN9OrQ71_recpspyaDTQkNATyN","label":"B1 — Neutrality tension","effect":"Reshapes","magnitude":"Medium","mechanism":"Strong individual data rights force the neutrality-tension loop into play: PHIs must broker between autonomy and aggregate need, and the shape of that brokered consent decides whether shared data survives.","loopName":"B1 — Neutrality tension","loopSubsystem":"Convene","loopCode":"B1"}]},{"id":"recDtD4wB0dYBHud7","label":"Scraped-first free-for-all","direction":"Negative","alignment":"Self-aligned","narrative":"Whoever collects the data first controls it, and the body's data is scraped, inferred, and traded before anyone consents.","strategicMove":"This happens because data is captured through ordinary use (apps, wearables, purchases, even inference from non-health data) and control follows possession. The engine is commercial self-interest plus the sheer diffuseness of collection. The hard part is that control-by-possession is nearly impossible to claw back once inference and data brokerage are established, and the harms (discrimination, denial, exposure) land unevenly and invisibly. The move: regulate collection and inference at the source and ban the worst secondary uses, because consent after the fact is meaningless once the data is already inferred.","impacts":[{"id":"recDtD4wB0dYBHud7_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Breaks / reverses","magnitude":"High","mechanism":"A scrape-first regime inverts the Trust seam for the exposed: once vulnerable groups see their biodata weaponized, trust flips to defensive avoidance, and public health loses reach exactly where it matters most.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]}]}]},{"id":"recs99MLAzZSZ2qdk","name":"Data Modernization & Real-Time Surveillance","theme":"The Data & AI Inflection","headline":"Disease surveillance is going real-time.","short":"The quiet shift from fax to cloud, with wastewater and genomic streams that see threats early.","neutralHeadline":"Disease surveillance is going real-time.","neutralReading":"Public health data systems are modernizing from legacy tools toward real-time streams (wastewater, genomic, syndromic) that can see threats earlier. The upside is faster visibility; the open questions are privacy, consent, sustained funding, and whether faster data becomes faster action. Among the more optimistic drivers already.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"rec7954vvpWeClQxm","label":"Standing utility vs decay","question":"Does real-time surveillance (wastewater, genomic, syndromic) become permanent, trusted standing infrastructure, or does it ride the boom-bust cycle and decay, distrusted or privatized, between crises?","poleA":"A trusted real-time public-health data utility","poleB":"Decayed, distrusted, or privatized data","sharpest":true,"outcomes":[{"id":"rec1VjS0GWj05KcGk","label":"Standing data utility","direction":"Positive","alignment":"Needs collective action","narrative":"Real-time surveillance (wastewater, genomic, syndromic) becomes permanent standing infrastructure, funded and trusted between crises, not just during them.","strategicMove":"Convert episodic, grant-funded surveillance into utility-grade infrastructure with the boring properties utilities have: a guaranteed baseline budget, published uptime and data-quality standards, and shared operation across states so no single agency carries it. The venue is the financing model and interstate operating compacts, not the sensors. The hard part is the between-crisis valley: the system looks worthless when nothing is spreading, so it gets cut exactly when it is working. The move: dedicated formula-based funding and a multistate operating consortium so the stream survives the quiet years.","impacts":[{"id":"rec1VjS0GWj05KcGk_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Strengthens","magnitude":"Medium","mechanism":"A trusted data utility that visibly earns its keep feeds the trust-and-funding engine: demonstrated value builds the case for sustained investment rather than one-off emergency dollars.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"},{"id":"rec1VjS0GWj05KcGk_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"High","mechanism":"Standing surveillance feeds the Program-effectiveness seam: reliable early signals let programs act sooner and demonstrably work, and demonstrated impact justifies keeping the data utility funded.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recIjPif8CMnBwnGK","label":"Boom-bust decay","direction":"Negative","alignment":"Needs collective action","narrative":"Surveillance rides the crisis cycle, built in the emergency and starved after, so the country goes partially blind between outbreaks.","strategicMove":"This is the default because emergency money is easy and standing money is hard, and dashboards do not defend their own budgets. The path is defined by the absence of durable financing: emergency capacity decays as staff leave and contracts lapse, and the next threat hits a hollowed system. Reversing it needs a funding stream insulated from the cycle and an owner accountable for continuity. The move: name the valley now and fight for standing financing, because rebuilding from zero each time is slower and costlier than never letting it decay.","impacts":[{"id":"recIjPif8CMnBwnGK_recxYORcLcLGwWl4S","label":"B2 — Political-turnover buffer","effect":"Weakens","magnitude":"Medium","mechanism":"Political turnover between crises overwhelms the political-turnover buffer meant to protect surveillance, letting new priorities dismantle systems the buffer cannot shield.","loopName":"B2 — Political-turnover buffer","loopSubsystem":"Anchor","loopCode":"B2"},{"id":"recIjPif8CMnBwnGK_recLemwzhLNZ2Y60f","label":"B1 — Funding buffer","effect":"Weakens","magnitude":"High","mechanism":"Boom-bust cycling drains the funding buffer that is supposed to carry surveillance between crises, so each downturn strips capacity that the next emergency has to rebuild from scratch.","loopName":"B1 — Funding buffer","loopSubsystem":"Anchor","loopCode":"B1"}]}]},{"id":"recDpgQLtLg3w18i8","label":"Consent vs privacy freeze","question":"Can the data system earn a real data-for-the-public-good compact with public consent, or does privacy backlash freeze data sharing and starve surveillance of its inputs?","poleA":"Public consent and a data-for-good compact","poleB":"Privacy backlash freezes data sharing","sharpest":false,"outcomes":[{"id":"recwSMQ0SOqDf2cX7","label":"Data-for-good compact","direction":"Positive","alignment":"Engineered alignment","narrative":"The public grants real, informed consent for health data used for the common good, and data flows because people trust how it is handled.","strategicMove":"Trust is engineered, not assumed. Stand up a visible consent-and-governance compact: clear use limits, independent oversight, transparency about who touches the data, and hard walls against secondary use for enforcement, immigration, or insurance. The venue is governance and law plus the public explanation of the deal. The hard part is that one abuse anywhere resets trust everywhere, so the walls have to be real and enforced, not promised. The move: lead on guardrails first and treat trust as the precondition for the data, not an afterthought.","impacts":[{"id":"recwSMQ0SOqDf2cX7_rec04pNdmhANStwwt","label":"R1 — Administrative-trustworthiness engine","effect":"Strengthens","magnitude":"Medium","mechanism":"Visible, well-governed data handling feeds the administrative-trustworthiness engine: competent, transparent stewardship of sensitive data is exactly the signal that builds institutional credibility.","loopName":"R1 — Administrative-trustworthiness engine","loopSubsystem":"Steward","loopCode":"R1"},{"id":"recwSMQ0SOqDf2cX7_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Strengthens","magnitude":"High","mechanism":"A genuine data-for-good compact reinforces the Trust seam: people who see their data used transparently and for their benefit keep contributing, and that trust is the input every function draws on.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recxpYKpU8Ksw9T6q","label":"Privacy freeze","direction":"Negative","alignment":"Needs collective action","narrative":"Privacy backlash freezes data sharing, and the systems that could catch threats early are starved of what they need.","strategicMove":"This happens when data is collected faster than trust is built, a breach or repurposing scandal lands, and the public and lawmakers slam the gate. The engine is the absence of a credible compact: without visible limits, every new stream reads as surveillance and sharing agreements collapse. Undoing it means rebuilding consent after trust is spent, far harder than earning it up front. The move: build enforceable governance before the scandal, because a freeze is slow and expensive to thaw.","impacts":[{"id":"recxpYKpU8Ksw9T6q_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Breaks / reverses","magnitude":"High","mechanism":"A privacy backlash inverts the Trust seam: once people believe data is used against them, withdrawal cascades, and the trust that surveillance depends on flips into active resistance.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"rec8T2KKgWZ03LkkI","label":"Public vs private ownership","question":"Do public agencies own and control the data streams as a shared utility, or do private platforms capture them into new proprietary silos that agencies must rent back?","poleA":"Public agencies own the streams","poleB":"Private platforms own the streams","sharpest":false,"outcomes":[{"id":"recJEWnEzT6lXwqtO","label":"Public data commons","direction":"Positive","alignment":"Needs collective action","narrative":"The core data streams are owned and governed as a public commons, not locked inside private platforms.","strategicMove":"Establish public ownership of the pipes and standards: a public agency or consortium holds the streams, sets open interoperability standards, and contracts vendors as operators, not owners. The venue is procurement and the legal structure of who owns the data. The hard part is that a commons has no natural revenue and constant pressure to let a vendor 'just run it,' which is how ownership quietly goes private. The move: lock public ownership and open standards into contracts and law now, while the streams are still public.","impacts":[]},{"id":"rec2vhs3sjAL68mgz","label":"Privatized data silos","direction":"Negative","alignment":"Self-aligned","narrative":"The streams end up owned by private platforms, the new silos, and public health rents access to information about its own population.","strategicMove":"This happens by default because vendors build the systems, own the pipes, and lock in formats, and a fragmented public sector signs whatever gets the dashboard running. The engine is ordinary commercial self-interest plus public-sector expedience. The hard part is lock-in: proprietary systems and formats compound switching costs and dependency until the public loses both leverage and visibility. The move: demand data portability, open standards, and public-ownership clauses at contracting time, the one moment leverage exists.","impacts":[{"id":"rec2vhs3sjAL68mgz_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Reshapes","magnitude":"High","mechanism":"Privatized streams rewrite the root PHI-vs-vendor relationship: the vendor owns the data itself, so the agency becomes a tenant renting access to its own population's health picture.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""},{"id":"rec2vhs3sjAL68mgz_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Weakens","magnitude":"Medium","mechanism":"When data lives behind proprietary paywalls, the Program-effectiveness seam weakens: programs cannot freely see whether they work, so the learning loop between data and action stalls.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]}]}]},{"id":"recMM1W5xzDdsxnsg","name":"The Chronic, Metabolic & Longevity Reckoning","theme":"The Shifting Burden of Disease","headline":"We're medicating our way through chronic disease.","short":"GLP-1s, an aging population, and longevity science reshuffle the burden and the inequities.","neutralHeadline":"New medicine is reshaping chronic disease.","neutralReading":"New tools (GLP-1s, longevity science) and an aging population are reshuffling the chronic-disease burden and how it is addressed. This opens real gains against metabolic disease alongside real questions of cost, equity, and whether the response goes upstream or stays individual. Genuinely two-sided already.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recqsPByo1ov96Y0m","label":"Upstream collective or downstream individual","question":"Does the proactive turn in chronic health go upstream and collective (food systems, environment, prevention) or downstream and individual (pills, optimization, biohacking) as the dominant model for the next decade?","poleA":"Upstream collective prevention","poleB":"Medicalized individual optimization","sharpest":true,"outcomes":[{"id":"recYPJ5eyhPSTKE5s","label":"Upstream turn wins","direction":"Positive","alignment":"Needs collective action","narrative":"The proactive-health moment is channeled into food systems, the built environment, and prevention policy, and public health leads a collective agenda that cuts chronic disease at the root regardless of ability to pay.","strategicMove":"The mechanism is mandate-to-substrate: public health becomes the setter of defaults in the food and built environment, engineering the healthy choice into procurement, reformulation standards, zoning, and coverage rules rather than exhorting individuals to optimize. The venue is food and environment policy, the layer upstream of any pill or wearable, where a standard reaches everyone at once. The hard part is that upstream policy fights entrenched industry incentives and pays off slowly and invisibly, while the downstream individual model delivers visible personal wins now. The move: seize the proactive-health moment to set population-scale defaults and standards, because the durable win is engineering health into the substrate people live in, not winning a competition for individual attention it may not win.","impacts":[{"id":"recYPJ5eyhPSTKE5s_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"Medium","mechanism":"Collective prevention that lowers chronic disease produces measurable population results, reinforcing the program-effectiveness seam that proves public health delivers value.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recYPJ5eyhPSTKE5s_recF6ANvoybZcVCqR","label":"R1 — Relevance flywheel","effect":"Strengthens","magnitude":"High","mechanism":"Leading a visible upstream prevention agenda makes public health demonstrably relevant to a top public concern, feeding the relevance flywheel that earns it standing and further mandate.","loopName":"R1 — Relevance flywheel","loopSubsystem":"Translate & Disperse","loopCode":"R1"}]},{"id":"recL4SCRnn0yma75z","label":"Medicalized optimization wins","direction":"Negative","alignment":"Self-aligned","narrative":"Chronic health is redefined as individual optimization through drugs, wearables, and biohacking, and prevention becomes a consumer product for the affluent.","strategicMove":"This is the default that wins by inertia because individual optimization has a market, an aspirational story, and a willing-to-pay customer, while collective prevention has none of those and no one setting the default. The path is defined by the absence of a population-scale standard: as the healthy life is sold as a personal purchase, the built environment and food supply stay unhealthy by default and the gap tracks income. Reversing it means engineering the healthy default into shared systems so health is not something you have to buy. The hard part is that the individual model feels empowering and delivers real results for those who can afford it, making the collective case look paternalistic. The move: compete for the default, not the consumer, by setting food and environment standards that make the healthy choice automatic, because if public health does not own the default, the market will sell health only to those who can pay.","impacts":[{"id":"recL4SCRnn0yma75z_recLemwzhLNZ2Y60f","label":"B1 — Funding buffer","effect":"Weakens","magnitude":"Medium","mechanism":"As dollars flow to consumer drugs and devices rather than collective prevention, the public health funding buffer thins and the reserve that carries programs through lean years erodes.","loopName":"B1 — Funding buffer","loopSubsystem":"Anchor","loopCode":"B1"},{"id":"recL4SCRnn0yma75z_recF6ANvoybZcVCqR","label":"R1 — Relevance flywheel","effect":"Weakens","magnitude":"High","mechanism":"If chronic health becomes a private optimization market, public health looks peripheral to where the action is, weakening the relevance flywheel that depends on being seen as central to the problem.","loopName":"R1 — Relevance flywheel","loopSubsystem":"Translate & Disperse","loopCode":"R1"}]}]},{"id":"recEN31saTu9vrFgF","label":"GLP-1s at scale or only for payers","question":"Do GLP-1s and longevity science bend the chronic-disease curve at population scale, or do the benefits accrue only to those who can pay, widening health inequity?","poleA":"Population-scale benefit","poleB":"Widening inequity","sharpest":false,"outcomes":[{"id":"rec13B1VZX3mhgHcf","label":"Curve bends for everyone","direction":"Positive","alignment":"Engineered alignment","narrative":"Coverage rules, generic pricing, and public programs put GLP-1s and longevity care within broad reach, so the metabolic curve bends across income groups instead of only for those who can pay.","strategicMove":"The mechanism is engineering equitable access through the payer rulebook: writing GLP-1 coverage into Medicaid state plans and formularies with prevention-linked terms, and using pooled public purchasing to force price down as patents lapse. The venue is the coverage-and-coverage-rules layer, payer decisions and Medicaid, which determines who actually gets the drug regardless of list price. The hard part is that broad coverage is a large, permanent line item, and payers have every incentive to restrict it to the sickest or wealthiest, so the default is rationing by ability to pay. The move: make public health the setter of coverage defaults and the aggregator of buyer leverage, tying access to upstream metabolic benefit, because population-scale gain is won in the payer rule, not in the pharmacy.","impacts":[{"id":"rec13B1VZX3mhgHcf_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Strengthens","magnitude":"High","mechanism":"Delivering a population-scale metabolic win across income groups builds public trust and the political case for funding, turning the trust-and-funding engine in public health's favor.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"},{"id":"rec13B1VZX3mhgHcf_receijri1gmOH75Ha","label":"Three delivery channels","effect":"Strengthens","magnitude":"Medium","mechanism":"Getting GLP-1s to underserved populations means routing care through clinics, pharmacies, and community programs, strengthening the multiple delivery channels public health can reach people through.","loopName":"Three delivery channels","loopSubsystem":"Bridge & Extend","loopCode":""}]},{"id":"recJAvHczUz9nLXPW","label":"Longevity divide widens","direction":"Negative","alignment":"Self-aligned","narrative":"High prices and uneven coverage keep GLP-1s and longevity medicine a privilege of the wealthy, widening the health gap into a durable longevity divide.","strategicMove":"This is the default that wins by inertia because the market prices a scarce, powerful drug to those who can pay and no public actor sets a different default. The path is defined by the absence of a coverage floor: without a payer rule guaranteeing access, benefit concentrates upward and the very inequities public health exists to close get wider. Reversing it means contesting the coverage design early, before the affluent-first pattern hardens into the norm. The hard part is that closing the gap requires spending public money on an expensive drug for people the system already underserves, which is a hard sell against competing claims. The move: fight on the Medicaid and formulary coverage rule, not on awareness, because who gets longevity medicine is decided by payer defaults, and inaction there is itself the choice that widens the divide.","impacts":[{"id":"recJAvHczUz9nLXPW_rec4NCooYpMNY00fu","label":"B2 — Barrier amplification","effect":"Strengthens","magnitude":"High","mechanism":"When only the wealthy can afford longevity medicine, existing access barriers compound, driving the barrier-amplification loop that concentrates health gains among those already advantaged.","loopName":"B2 — Barrier amplification","loopSubsystem":"Convene","loopCode":"B2"}]}]},{"id":"recbGo9tDSJ6ztcdS","label":"Pharma crowds out or frees prevention","question":"Does pharma appearing to solve metabolic disease crowd out prevention funding and political will, or does it free public health to redirect scarce resources upstream?","poleA":"Frees prevention focus","poleB":"Crowds out prevention","sharpest":false,"outcomes":[{"id":"recWzdDlMyPnYdzK2","label":"Prevention gets freed up","direction":"Positive","alignment":"Engineered alignment","narrative":"With pharma absorbing acute metabolic treatment, public health redirects scarce resources upstream to prevention and equity, and total impact expands.","strategicMove":"The mechanism is a deliberate division of labor: cede acute pharmacological treatment to payers and clinicians, and reinvest the freed attention and dollars into engineering the healthy default in the food supply and built environment. The venue is food and environment policy, procurement standards, zoning, and prevention financing, the surfaces where the healthy choice is designed in rather than sold. The hard part is that the freed resources do not automatically flow upstream: the default is that the pill absorbs the budget and prevention gets nothing, so the redirection must be fought for explicitly. The move: claim the upstream lane and lock in prevention financing as the drug takes the downstream load, because the division of labor only expands impact if public health actively captures the space pharma vacates instead of ceding the whole field.","impacts":[{"id":"recWzdDlMyPnYdzK2_recAV1YuukaQU0KPr","label":"R2 — Knowledge & practice","effect":"Strengthens","magnitude":"Medium","mechanism":"Freeing resources for upstream work lets public health convene partners and build the prevention evidence base, feeding the knowledge-and-practice loop that spreads what works.","loopName":"R2 — Knowledge & practice","loopSubsystem":"Convene","loopCode":"R2"}]},{"id":"recKG5ZMy3AtEKDQk","label":"Prevention crowded out","direction":"Negative","alignment":"Needs collective action","narrative":"A pharmaceutical fix becomes the political excuse to defund prevention, since a pill looks cheaper than changing the food supply or the built environment.","strategicMove":"This is the default because a billable pill has a payer, a lobby, and a P&L, while prevention has none of those defending its budget. The path is defined by substitution: as GLP-1s appear to solve metabolic disease, upstream food and environment programs lose their rationale and their line item, and the root drivers go unaddressed. Reversing it means protecting prevention financing structurally, not arguing that prevention still matters after the drug exists. The hard part is that the pill genuinely works for individuals, so the case against defunding prevention cannot rest on drug skepticism. The move: ring-fence prevention financing and reframe the drug as downstream cleanup of an upstream failure, because what kills prevention here is the budget logic that a pill makes it optional, not any lack of evidence.","impacts":[{"id":"recKG5ZMy3AtEKDQk_recLemwzhLNZ2Y60f","label":"B1 — Funding buffer","effect":"Weakens","magnitude":"High","mechanism":"Treating a pill as a substitute for prevention gives politicians a reason to cut upstream budgets, draining the funding buffer that protects prevention programs from disinvestment.","loopName":"B1 — Funding buffer","loopSubsystem":"Anchor","loopCode":"B1"}]}]}]},{"id":"recPm2VZydZXrnhzb","name":"Climate as a Health Multiplier","theme":"The Shifting Burden of Disease","headline":"Climate is becoming the background condition of health.","short":"Heat, disasters, migration, food and water stress, and the spread of disease, compounding together.","neutralHeadline":"Climate is becoming the baseline condition of health.","neutralReading":"Climate is becoming a background condition shaping health, through heat, disasters, migration, food and water stress, and shifting disease patterns. It adds load to the system and elevates public health's role in resilience and adaptation. A neutral read centers it as a defining context to design for, not only a threat.","neutralName":"","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"recyZkbq71jlCovEX","label":"Core mandate or overwhelmed","question":"Does public health own climate resilience as a core mandate, or stay siloed while a warming climate overwhelms an unprepared, underfunded system?","poleA":"Climate resilience built in as a core public health mandate","poleB":"Climate overwhelms an unprepared, underfunded system","sharpest":true,"outcomes":[{"id":"recj9442ZyKL0CUmJ","label":"Resilience backbone","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health claims climate resilience as a core mandate and becomes the connective backbone that stressed local systems lean on during every weather emergency.","strategicMove":"The mechanism is becoming the funded steward of the local resilience commons: running the heat, air-quality, and vector surveillance that hospitals, planners, energy utilities, and emergency management all cite, and setting the trigger thresholds that activate their responses. The venue is the local resilience infrastructure and the cross-sector agreements (planning, energy, emergency management) that route decisions through public health data. The hard part is that stewarding a shared backbone costs continuous money and staff for a service that is invisible when it works and blamed when it fails. The move: make public health the default standard-setter and data steward for climate resilience, and secure the recurring financing a commons always lacks, so partners depend on you by design rather than by crisis.","impacts":[{"id":"recj9442ZyKL0CUmJ_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"High","mechanism":"Embedding heat, air, and vector surveillance into everyday practice produces visible protective results, which feeds the program-effectiveness seam and justifies renewed investment in those capabilities.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recj9442ZyKL0CUmJ_recrHXtP6M4NJ7qJ6","label":"B1 — Surge-demand balance","effect":"Strengthens","magnitude":"Medium","mechanism":"Acting as the resilience backbone lets PHIs meet spikes in demand during weather emergencies with pre-built capacity, keeping the surge-demand balancing loop stable rather than overwhelmed.","loopName":"B1 — Surge-demand balance","loopSubsystem":"Bridge & Extend","loopCode":"B1"}]},{"id":"recKa62o3ohRmzXWo","label":"Overrun and siloed","direction":"Negative","alignment":"Needs collective action","narrative":"Climate stays a peripheral concern while cascading emergencies consume the capacity meant for prevention, hollowing out core programs.","strategicMove":"This is the default that wins by inertia when public health treats climate as someone else's file and never claims the steward role. The path is defined by the absence of a mandate: with no owned surveillance backbone, every heat wave and smoke season is fought with borrowed staff, and prevention is cannibalized to cover the emergency. Reversing it requires claiming climate resilience as core work and funding it, not adding it as an unfunded duty on top of a thinned workforce. The hard part is that saying yes to the mandate without new money just accelerates the hollowing. The move: refuse the unfunded-mandate trap by pairing any climate-resilience claim with a dedicated financing and staffing line, because taking the mission without the money is how core programs get overrun.","impacts":[{"id":"recKa62o3ohRmzXWo_recrHXtP6M4NJ7qJ6","label":"B1 — Surge-demand balance","effect":"Breaks / reverses","magnitude":"High","mechanism":"Cascading climate disasters push demand permanently past the system's ability to respond, overwhelming the surge-demand balancing loop so it can no longer return to equilibrium.","loopName":"B1 — Surge-demand balance","loopSubsystem":"Bridge & Extend","loopCode":"B1"},{"id":"recKa62o3ohRmzXWo_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Weakens","magnitude":"High","mechanism":"When emergencies consume capacity meant for prevention, core programs stop delivering results, and the program-effectiveness seam erodes as demonstrated impact falls.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"recM32BGLpRpeC2cK","label":"Mobilizes will or deepens fatalism","question":"Does mounting climate harm mobilize public and political will to invest in health, or deepen inequity and fatalism that erode support?","poleA":"Climate mobilizes political and public will for health","poleB":"Climate deepens inequity and public fatalism","sharpest":false,"outcomes":[{"id":"recdWrfEmDBcq07z3","label":"Climate rallies support","direction":"Positive","alignment":"Needs collective action","narrative":"Visible climate harm is framed as a health emergency, and that framing pulls public and political will toward investment rather than despair.","strategicMove":"The mechanism is owning the health attribution layer: public health becomes the body that translates heat deaths, smoke-driven asthma, and vector spread into an official, cited health-impact number that budgets and lawsuits run on. The venue is the local and state climate-and-hazard planning process, where a health-impact assessment can be written into resilience plans, building codes, and emergency-management triggers. The hard part is that climate framing is politicized, so leading with carbon loses half the room, and mobilization is fickle: the coalition evaporates when the smoke clears. The move: attach public health as the neutral scorekeeper of climate health harm, embed that metric in the planning documents that allocate money, and pick apolitical framings (heat, clean air, protecting kids and workers) so the win survives the next election.","impacts":[{"id":"recdWrfEmDBcq07z3_rec6hW9Xkbb80fHl7","label":"R1 — Neutral-table flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"Framing climate as a shared health emergency draws diverse partners to convene, feeding the neutral-table flywheel as broader coalitions raise the value of a trusted convener.","loopName":"R1 — Neutral-table flywheel","loopSubsystem":"Convene","loopCode":"R1"}]},{"id":"rec70jdInruzSCB7Y","label":"Fatalism and inequity","direction":"Negative","alignment":"Needs collective action","narrative":"Relentless disasters breed fatigue and fatalism, harm concentrates on the least-resourced, and political will fractures along the same lines the damage does.","strategicMove":"This is the default when public health waits for mobilization instead of building a standing claim on adaptation dollars. The path is defined by the absence of an owner: no agency holds the climate-health mandate, so each disaster is metabolized as a one-off and fatigue compounds. Reversing it means capturing durable authority and a formula-based funding line before the fatigue sets in, not a campaign that asks an exhausted public to care more. The hard part is that fatalism is rational when people see harm rise and protection stay flat, and equity gaps make the least-resourced disengage first. The move: stop competing for attention and instead secure a standing adaptation mandate and financing now, because the failure here is structural absence, not insufficient public feeling.","impacts":[{"id":"rec70jdInruzSCB7Y_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Weakens","magnitude":"Medium","mechanism":"When disasters breed fatigue and impacts fall hardest on underserved communities, trust in institutions seen as unable to protect people declines, weakening community standing.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"}]}]},{"id":"recpKNfS2Rcxdx4oF","label":"Proactive or reactive funding","question":"Is climate adaptation for health funded proactively ahead of impacts, or only reactively after each disaster hits?","poleA":"Proactive, sustained adaptation funding","poleB":"Reactive, disaster-triggered funding only","sharpest":false,"outcomes":[{"id":"recdZviNWg0xTbTbE","label":"Adaptation funded ahead","direction":"Positive","alignment":"Needs collective action","narrative":"Adaptation is funded ahead of impacts, so cooling centers, early-warning systems, and resilient infrastructure exist before the disaster, not after.","strategicMove":"The mechanism is converting reactive disaster appropriations into a standing, formula-based adaptation line tied to projected risk rather than last year's headlines. The venue is the appropriations and hazard-mitigation surface: FEMA BRIC-style pre-disaster funds, state climate resilience budgets, and CDC climate-and-health cooperative agreements that fund staff, not just one-time capital. The hard part is that proactive spending has no photo op and no grieving constituency, so it always loses the budget fight to the visible emergency next door. The move: fight for insulated, risk-indexed adaptation financing and an accountable owner for continuity, because preparedness only compounds if the money does not reset to zero after each shock.","impacts":[{"id":"recdZviNWg0xTbTbE_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Strengthens","magnitude":"High","mechanism":"Sustained adaptation funding produces reliable protection that builds public trust, which in the trust-and-funding engine reinforces continued investment year over year.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"}]},{"id":"rec7aQZDEoAk7vqnu","label":"Disaster-cycle whiplash","direction":"Negative","alignment":"Needs collective action","narrative":"Money arrives only after catastrophe, in surges that fade, so agencies cannot staff or plan and communities stay exposed between disasters.","strategicMove":"This is the default because emergency money is politically easy and standing money is hard, and no dashboard defends its own budget once attention moves on. The path is defined by the absence of durable financing: surge-funded capacity decays as staff leave and contracts lapse, so each disaster rebuilds from a lower floor. Escaping it needs a funding stream insulated from the attention cycle and an owner accountable for continuity between shocks. The hard part is that the whiplash feels normal and survivable, so the case for standing money must be made when nothing is burning. The move: press for formula-based adaptation financing now, because rebuilding capacity from scratch each cycle is slower and costlier than never letting it decay.","impacts":[{"id":"rec7aQZDEoAk7vqnu_recLemwzhLNZ2Y60f","label":"B1 — Funding buffer","effect":"Weakens","magnitude":"High","mechanism":"Boom-and-bust disaster funding prevents agencies from accumulating reserves, draining the funding buffer that would otherwise carry programs through lean years between shocks.","loopName":"B1 — Funding buffer","loopSubsystem":"Anchor","loopCode":"B1"}]}]}]},{"id":"recAbiZzCPFgeUFO7","name":"The Changing Nature of Disease","theme":"The Shifting Burden of Disease","headline":"Disease itself is changing shape.","short":"Faster spillover, antimicrobial resistance, and engineered biology change what disease can do.","neutralHeadline":"Disease itself is changing shape.","neutralReading":"The disease landscape is shifting, faster zoonotic spillover, antimicrobial resistance, a blurring of infectious and chronic, and advances in biology are changing what threats look like. This raises the difficulty of the work and the value of modern detection and response. Already largely neutral: it describes a changing terrain, not a defeat.","neutralName":"","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"recVOtqzO1bTZE7FB","label":"Keeps pace or falls behind","question":"Does surveillance and response keep pace with novel, zoonotic, and antimicrobial-resistant threats, or fall behind a faster, more complex disease landscape?","poleA":"Public health adapts to a faster, more complex threat landscape","poleB":"Public health falls behind emerging and novel disease","sharpest":true,"outcomes":[{"id":"recqPUgAQMCY13iAJ","label":"Surveillance stays ahead","direction":"Positive","alignment":"Engineered alignment","narrative":"Modernized genomic and One Health surveillance is wired to response, so public health catches zoonotic and resistant threats while they are still containable.","strategicMove":"The mechanism is stewarding an integrated detection substrate: a standing genomic surveillance system and One Health lab-and-partner network (human, animal, environmental) with data pipelines connected directly to response authority and capacity. The venue is the surveillance-and-lab-network layer, upstream of any single outbreak, plus the AMR stewardship programs that slow resistance at the source. The hard part is that this substrate has no constituency and no revenue once the last scare fades, so it dies without dedicated, cycle-insulated funding. The move: be the neutral steward of the genomic and One Health detection commons and secure the standing financing it always lacks, because early detection only pays off if the system is still running when the next thing emerges.","impacts":[{"id":"recqPUgAQMCY13iAJ_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"High","mechanism":"Catching emergence early and containing it demonstrates clear program effectiveness, feeding the effectiveness seam that justifies keeping surveillance and response capacity funded.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recqPUgAQMCY13iAJ_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Strengthens","magnitude":"Medium","mechanism":"Genomic and One Health surveillance generates practice knowledge that accumulates in the knowledge engine, sharpening the field's ability to characterize the next novel threat.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"}]},{"id":"recARhRwW8GDZg83z","label":"Outpaced by emergence","direction":"Negative","alignment":"Needs collective action","narrative":"Novel pathogens, AMR, and post-viral syndromes move faster than aging surveillance can track, and a thinned workforce recognizes threats only after they spread.","strategicMove":"This is the default that wins by inertia when surveillance is built in the last emergency and starved after, so the country goes partially blind between outbreaks. The path is defined by two absences: no standing genomic and One Health detection wired to response, and no staff to triage the signals that do arrive. Reversing it requires durable financing for detection infrastructure and the analysts who read it, not another post-crisis surge that decays. The hard part is that a quiet surveillance system that catches nothing looks like waste right up until the miss it would have prevented. The move: fight for standing, formula-based surveillance financing and a named owner for continuity, because emergence outruns any capacity that has to be rebuilt from zero each cycle.","impacts":[{"id":"recARhRwW8GDZg83z_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Weakens","magnitude":"High","mechanism":"When threats are recognized only after they spread, demonstrated results decline and the program-effectiveness seam weakens, undercutting the case for sustained investment.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recARhRwW8GDZg83z_recrHXtP6M4NJ7qJ6","label":"B1 — Surge-demand balance","effect":"Weakens","magnitude":"Medium","mechanism":"A thinned workforce that cannot triage signals fails to meet demand spikes from novel outbreaks, straining the surge-demand balancing loop past its limits.","loopName":"B1 — Surge-demand balance","loopSubsystem":"Bridge & Extend","loopCode":"B1"}]}]},{"id":"recrj9SdpUZAhUNIA","label":"Integrated or siloed models","question":"Does the blurring of infectious and chronic disease drive integrated models, or outstrip siloed, single-disease approaches?","poleA":"Integrated models spanning infectious and chronic disease","poleB":"Siloed single-disease models overtaken by syndemics","sharpest":false,"outcomes":[{"id":"recFRWophxMzveioq","label":"Integrated response","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health builds models that treat infectious and chronic disease as intertwined, so syndemics and long-COVID are addressed together rather than falling between silos.","strategicMove":"The mechanism is stewarding a shared data-and-classification substrate: linked, cross-condition records and case definitions (for syndemics, post-viral illness, AMR-complicated chronic disease) that let one system see how disease actually clusters in people. The venue is the surveillance data layer and the funding and reporting categories that currently hardwire single-disease silos, from grant lines to ICD coding practice. The hard part is that every silo has its own funding stream, constituency, and metrics defending the boundary, so integration threatens budgets and asks people to give up program identity. The move: build the linked data commons and fight to reform the categorical funding and reporting rules that enforce silos, because the integrated view only exists if public health owns the substrate and rewires the incentives that keep disease artificially separated.","impacts":[{"id":"recFRWophxMzveioq_recAV1YuukaQU0KPr","label":"R2 — Knowledge & practice","effect":"Strengthens","magnitude":"Medium","mechanism":"Cross-disciplinary teams sharing data on syndemics and long-COVID enrich the knowledge and practice loop, spreading integrated approaches across the convening network.","loopName":"R2 — Knowledge & practice","loopSubsystem":"Convene","loopCode":"R2"}]},{"id":"recc3YCBXIY1Efck1","label":"Silos overtaken","direction":"Negative","alignment":"Needs collective action","narrative":"Single-disease programs cannot see overlapping conditions, so syndemics and post-viral burdens fall through the cracks and fragmented data hides the true compounding burden.","strategicMove":"This is the default that wins by inertia because categorical funding pays for silos and no one is funded to see across them. The path is defined by structural fragmentation: separate grant lines, data systems, and case definitions mean overlapping conditions are never assembled into one picture, so the compounding burden stays invisible and unmanaged. Reversing it requires a linked data substrate and a rewrite of the categorical funding rules that reward staying siloed. The hard part is that each silo is defended by its own budget and constituency, so integration reads as a threat rather than an upgrade. The move: attack the categorical funding and reporting structure that enforces the silos, not the front-line teams inside them, because the fragmentation is engineered by the money and will persist until the money is redesigned.","impacts":[{"id":"recc3YCBXIY1Efck1_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Weakens","magnitude":"Medium","mechanism":"Fragmented single-disease programs let overlapping conditions fall through the cracks, so measured effectiveness understates real burden and the program-effectiveness seam degrades.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"reciMnwUUtcqUCt6c","label":"Reform or retrenchment","question":"When the next major emergence hits, does it trigger investment and reform, or just blame and retrenchment?","poleA":"Emergence triggers investment and structural reform","poleB":"Emergence triggers blame and retrenchment","sharpest":false,"outcomes":[{"id":"recsE43Kr86aSIHFz","label":"Crisis drives reform","direction":"Positive","alignment":"Needs collective action","narrative":"A major emergence becomes a turning point that channels new investment into modernized systems and clearer authority, and the field emerges more capable than before.","strategicMove":"The mechanism is using the crisis window to institutionalize pre-drafted reforms: standing surveillance financing, modernized data systems, and clarified legal authority that outlast the news cycle. The venue is the post-emergence legislative and appropriations moment, plus the after-action process that decides whether lessons become statute or get forgotten. The hard part is that these windows close fast and default to symbolic gestures, so the reforms must be written, scored, and ready before the crisis, and the durable ones (financing, authority) are exactly the boring items that get dropped for visible ones. The move: keep a scored reform-and-financing package on the shelf and drive the after-action toward statute, because a crisis only leaves you stronger if you convert the surge into standing capacity while the window is open.","impacts":[{"id":"recsE43Kr86aSIHFz_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Strengthens","magnitude":"High","mechanism":"When a crisis channels investment into modernized systems and clearer authority, visible improvement rebuilds trust, reinforcing the trust-and-funding engine that sustains capacity.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"}]},{"id":"rec7qfREgNBPRyXxK","label":"Blame and retreat","direction":"Negative","alignment":"Needs collective action","narrative":"The next emergence triggers scapegoating and defunding rather than reform, and public health absorbs blame for a slow response it was never resourced to give.","strategicMove":"This is the default because after a miss, blame is cheaper to spend than money, and a field without pre-committed reforms becomes the target instead of the fixer. The path is defined by the absence of a ready plan: with no shovel-ready reform agenda and no protected authority, the post-crisis window is filled by scapegoating and capacity contracts just as threats intensify. Reversing it means banking specific reforms and financing commitments before the emergence, so the crisis triggers a pre-agreed rebuild instead of a reckoning. The hard part is that preparing the reform package during calm competes with daily firefighting and feels premature. The move: pre-position a concrete reform-and-financing agenda and protect statutory authority now, because whether a crisis builds you up or tears you down is decided by what is already on the shelf when it hits.","impacts":[{"id":"rec7qfREgNBPRyXxK_recZyLPx38j0qTLC0","label":"B1 — Brain drain","effect":"Strengthens","magnitude":"Medium","mechanism":"Scapegoating and defunding after an emergence push experienced staff to leave, accelerating the brain-drain loop and hollowing out the expertise needed to respond next time.","loopName":"B1 — Brain drain","loopSubsystem":"Steward","loopCode":"B1"}]}]}]},{"id":"reccJaHQggWtfATl2","name":"The Lowered Shield","theme":"The Shifting Burden of Disease","headline":"Health protections are being rolled back.","short":"Deregulation of air, water, food, and drugs raises exposures, hardest on already-burdened communities.","neutralHeadline":"Population protection is being renegotiated.","neutralReading":"Society's protective barriers, both regulatory (air, water, food, drug safety) and immunological (vaccination, herd immunity), are being lowered, raising exposures, hardest on already-burdened communities. The neutral read is that the terms of population protection are being renegotiated and could be re-established through new means. Limit: this is largely a rollback with real harm, so neutrality is limited. Note: the driver's short (environmental deregulation) and its uncertainties (vaccination/immunity) currently emphasize different facets, worth reconciling, see review.","neutralName":"The Shifting Shield","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"rechWjCHZ6euAUP2B","label":"Recovery or lowered-shield equilibrium","question":"Does vaccine confidence and coverage recover, or keep falling into a lowered-shield equilibrium where preventable disease returns?","poleA":"Protective immunity and coverage rebuilt","poleB":"Continued erosion into a lowered-shield equilibrium","sharpest":true,"outcomes":[{"id":"recTlrla8DceshD54","label":"Shield rebuilt","direction":"Positive","alignment":"Needs collective action","narrative":"Vaccine confidence recovers as trusted messengers and accessible delivery rebuild coverage toward protective thresholds, and herd immunity is restored.","strategicMove":"The mechanism is combining financed trusted-messenger outreach with frictionless access and protected school-entry requirements, so both willingness and easy uptake rise together toward herd-immunity thresholds. The venue is the delivery layer (CHWs and clinicians, reimbursed and embedded) plus the school-entry mandate that sets the default and backstops confidence work. The hard part is that confidence is now sorted by politics and mandate authority is being stripped, so rebuilding coverage on messengers alone is fragile without the school-entry floor, and defending that floor is a live fight. The move: rebuild on both legs at once, fund trusted local delivery and defend school-entry authority, because coverage recovers durably only when persuasion and the default requirement reinforce each other rather than substitute for one another.","impacts":[{"id":"recTlrla8DceshD54_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Strengthens","magnitude":"Medium","mechanism":"Delivering protection people can see raises public health's standing in the community, reinforcing the loop where credibility earns the goodwill that sustains coverage.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"},{"id":"recTlrla8DceshD54_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Strengthens","magnitude":"High","mechanism":"As trusted messengers rebuild coverage and disease recedes, visible protection reinforces public confidence, strengthening the trust seam that makes future uptake easier.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recVOVQlwCwAdLWEP","label":"Lowered-shield equilibrium","direction":"Negative","alignment":"Needs collective action","narrative":"Confidence keeps eroding and coverage settles below herd-immunity thresholds as a new normal, and measles and other preventable diseases return in recurring clusters.","strategicMove":"This is the default that wins by inertia when the school-entry floor is stripped and no financed local delivery replaces it, so coverage drifts down to a lowered-shield equilibrium. The path is defined by two removals: the mandate default that used to hold the floor is weakened, and the trusted-messenger delivery that could rebuild demand was never funded. Reversing it requires defending the remaining mandate authority while standing up relational delivery, before the equilibrium settles and outbreaks normalize. The hard part is that confidence is identity-sorted, mandate authority is under active political attack, and an equilibrium of periodic outbreaks is survivable enough to feel tolerable. The move: fight to hold school-entry authority and fund trusted-messenger delivery now, because once a lowered shield becomes the accepted normal, every point of coverage costs far more to win back than it did to keep.","impacts":[{"id":"recVOVQlwCwAdLWEP_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"High","mechanism":"As coverage settles below herd-immunity thresholds and outbreaks recur, confidence in vaccination and the institutions promoting it continues to slip, weakening the trust seam.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"rec9Mki7Gw0d9Nm8g","label":"Local messengers or mass campaigns","question":"Can new delivery through community health workers and trusted local messengers restore coverage where mandates and mass campaigns no longer can?","poleA":"Trusted local messengers restore coverage","poleB":"Mandates and mass campaigns keep losing reach","sharpest":false,"outcomes":[{"id":"recEEcctyAG536kaF","label":"Local messengers restore reach","direction":"Positive","alignment":"Engineered alignment","narrative":"Community health workers and trusted local voices reach families that mandates and mass campaigns cannot, rebuilding coverage through relationships, community by community.","strategicMove":"The mechanism is standing up trusted-messenger delivery as financed infrastructure: CHWs and local clinicians reimbursed to do vaccine outreach in the languages and settings families trust, not a grant-funded pilot that expires. The venue is the delivery surface, CHW and clinician programs funded through Medicaid reimbursement and foundational public health funding, plus the school and clinic access points where the shot actually happens. The hard part is that trust is built slowly, person by person, and the financing for relational outreach is soft and keeps dying in the grant cycle, so the messengers vanish before confidence compounds. The move: fund trusted-messenger delivery as permanent infrastructure with real reimbursement, because coverage is rebuilt at the relationship layer and that layer collapses the moment the grant ends.","impacts":[{"id":"recEEcctyAG536kaF_recpspyaDTQkNATyN","label":"B1 — Neutrality tension","effect":"Reshapes","magnitude":"Medium","mechanism":"Working through local messengers rather than contested mandates reshapes the neutrality-tension loop, letting public health advance coverage without being cast as a partisan actor.","loopName":"B1 — Neutrality tension","loopSubsystem":"Convene","loopCode":"B1"},{"id":"recEEcctyAG536kaF_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"High","mechanism":"Community health workers delivering vaccines through relationships produce visible uptake that builds reputation, reinforcing the delivery-reputation engine that draws more demand.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"}]},{"id":"recJ1S1gGdsIHOmTq","label":"Mandates keep losing ground","direction":"Negative","alignment":"Needs collective action","narrative":"Top-down mandates and broadcast campaigns lose traction as exemptions widen and trust in central authority falls, and coverage keeps slipping where it is needed most.","strategicMove":"This is the default that wins by inertia when public health leans on the tools that no longer reach people and never builds the local delivery that would. The path is defined by a mismatch: mandates and mass messaging assume a trust in central authority that has eroded, so effort lands on the surface least able to move the hesitant. Reversing it means shifting investment to trusted local messengers before mandate authority erodes further, not amplifying the broadcast. The hard part is that mandates are the cheap, familiar lever and standing up financed community delivery is slow and unglamorous. The move: stop pouring effort into the broadcast layer and fund relational, local delivery instead, because in low-trust communities the mandate-and-campaign model fails on the surface, and doing more of it just loses ground faster.","impacts":[{"id":"recJ1S1gGdsIHOmTq_receijri1gmOH75Ha","label":"Three delivery channels","effect":"Weakens","magnitude":"Medium","mechanism":"As mandates and mass campaigns lose reach and exemptions widen, the delivery channels that once held coverage thin out, weakening the system's ability to reach hesitant families.","loopName":"Three delivery channels","loopSubsystem":"Bridge & Extend","loopCode":""}]}]},{"id":"recHoTi16Rkx3Dx29","label":"Resurgence rebuilds or entrenches refusal","question":"Does a resurgence of preventable disease trigger a rebuild of protection, or entrench refusal and blame?","poleA":"Resurgence triggers a coverage rebuild","poleB":"Resurgence entrenches refusal and blame","sharpest":false,"outcomes":[{"id":"recG9fdxSBUvFc2LW","label":"Outbreak spurs rebuild","direction":"Positive","alignment":"Needs collective action","narrative":"A visible, painful resurgence jolts hesitant families and policymakers into renewed action, and the scare becomes a catalyst for rebuilding protection.","strategicMove":"The mechanism is pre-positioning the rebuild so a local outbreak converts into durable coverage instead of a passing scare: trusted-messenger outreach ready to deploy, and protected school-entry requirements ready to enforce when demand spikes. The venue is the school-entry and clinic-access surface plus the CHW delivery network, the places where a burst of urgency can be turned into shots in arms and enrolled kids. The hard part is that the urgency window is brief and fear alone hardens some families rather than persuading them, so without ready infrastructure the moment passes and coverage settles back. The move: keep the delivery and school-entry machinery loaded before the outbreak, because a resurgence only rebuilds the shield if public health can convert the spike in demand fast, while the fear is fresh.","impacts":[{"id":"recG9fdxSBUvFc2LW_receijri1gmOH75Ha","label":"Three delivery channels","effect":"Strengthens","magnitude":"Medium","mechanism":"A painful resurgence lifts demand across clinical, community, and outreach channels, reactivating the three delivery channels that push coverage back up.","loopName":"Three delivery channels","loopSubsystem":"Bridge & Extend","loopCode":""}]},{"id":"recX2SSwk3Tjf4nYr","label":"Refusal entrenched","direction":"Negative","alignment":"Self-aligned","narrative":"Resurgence hardens positions instead of changing minds, blame lands on public health rather than the disease, and refusal calcifies as coverage sinks further.","strategicMove":"This is the default when confidence is sorted by politics and public health lets each outbreak become a fight over its own authority. The path is defined by polarization: with no trusted local messenger between the agency and the community, the resurgence is absorbed as a referendum on institutions, and refusal hardens rather than breaks. Reversing it means moving the conversation off central authority and onto trusted local voices before the outbreak, so the disease, not the health department, is the thing people are reacting to. The hard part is that the messengers who can reach the hesitant are often outside the institution and slow to cultivate, and mandate authority is being stripped just as it is needed. The move: invest in independent trusted messengers and protect school-entry authority now, because once refusal is politically identity-locked, the agency arguing louder only deepens the entrenchment.","impacts":[{"id":"recX2SSwk3Tjf4nYr_recpHxg5zO1QWqtgR","label":"B1 — Polarization / backlash","effect":"Strengthens","magnitude":"High","mechanism":"When outbreaks harden positions and direct blame at public health, each event feeds the polarization and backlash loop, deepening refusal rather than resolving it.","loopName":"B1 — Polarization / backlash","loopSubsystem":"Amplify","loopCode":"B1"}]}]}]},{"id":"recOM7VJiXw3BDqTr","name":"The Shadow Healthcare System","theme":"Decentralization & Consumerization","headline":"A shadow health system is rising.","short":"A parallel, largely unregulated, invisible health economy for those who distrust or can't access the mainstream.","neutralHeadline":"A parallel health system is growing.","neutralReading":"A parallel, largely unregulated health economy, online pharmacies, DIY care, peer networks, telehealth arbitrage, is growing for people who distrust or cannot access the mainstream. It is at once a source of access for the excluded and of unmonitored risk. The 'shadow' label sounds ominous, but the phenomenon is a genuine alternative system with mixed effects.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recUlSQHvJVP4rWuk","label":"Visible vs invisible shadow","question":"Can public health gain visibility into the shadow system (surveillance, harm reduction, engagement) so it becomes integrated and visible, or does it stay a permanent, entrenched blind spot?","poleA":"Shadow system integrated and visible","poleB":"Shadow system entrenched and invisible","sharpest":true,"outcomes":[{"id":"recPhwPJcQ6CXJCmm","label":"Integrated visible bridge","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health engages the shadow system through harm reduction and trusted intermediaries, gaining visibility without driving it underground.","strategicMove":"The mechanism is harm reduction as an intelligence and re-entry channel: fund needle exchanges, drug-checking services, and peer networks that give people a reason to stay in contact, and treat the resulting signals as legitimate surveillance rather than evidence for enforcement. The venue is harm-reduction programs and trusted community intermediaries, the only surface where people who exited the mainstream will still show up. The hard part is the firewall this demands between public health and law enforcement, because the moment engagement feels like policing, the population vanishes and the visibility is lost. The move: build and fund harm-reduction contact points and guarantee they are non-punitive, because the shadow system becomes visible only to an actor it has reason to trust, and trust dies the instant the data is shared with police.","impacts":[{"id":"recPhwPJcQ6CXJCmm_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Strengthens","magnitude":"Medium","mechanism":"Meeting people where they already are, without punishing them, feeds the community-standing loop: credibility earned in the shadow space makes public health more trusted overall.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"},{"id":"recPhwPJcQ6CXJCmm_receijri1gmOH75Ha","label":"Three delivery channels","effect":"Strengthens","magnitude":"High","mechanism":"Engaging the shadow system revives it as one of the three delivery channels: instead of losing exited populations, public health keeps a working route to reach and serve them.","loopName":"Three delivery channels","loopSubsystem":"Bridge & Extend","loopCode":""}]},{"id":"recOlJ40tGfHKuFHg","label":"Permanent blind spot","direction":"Negative","alignment":"Self-aligned","narrative":"The shadow system stays opaque and entrenched, public health has no line of sight, and outbreaks and unsafe products surface only as crises.","strategicMove":"This is the default that wins because the reflex is to criminalize or ignore what is unregulated, and both responses guarantee blindness by pushing users further out of reach. The engine is the enforcement instinct plus the absence of any funded, non-punitive channel to engage. The hard part is that building trusted engagement costs money and political capital and looks like condoning behavior officials would rather condemn, so the do-nothing path is always the safer career choice. The move: create and protect non-punitive harm-reduction and engagement programs before a crisis forces it, because the alternative is not a controlled shadow system but an invisible one that public health only discovers when the bodies appear.","impacts":[{"id":"recOlJ40tGfHKuFHg_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Breaks / reverses","magnitude":"High","mechanism":"A permanent blind spot severs the Program-effectiveness seam: with no data on shadow-system use or harm, public health cannot see what is happening or whether anything it does works there.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recOlJ40tGfHKuFHg_receijri1gmOH75Ha","label":"Three delivery channels","effect":"Weakens","magnitude":"Medium","mechanism":"When the shadow system stays invisible, one of the three delivery channels effectively closes: public health has no functioning path to the populations who have exited into it.","loopName":"Three delivery channels","loopSubsystem":"Bridge & Extend","loopCode":""}]}]},{"id":"recfY7JAK25f84xwD","label":"Growth vs reabsorption","question":"Does the shadow system keep growing as trust and affordability erode, or does the mainstream reabsorb and regulate it back in as a legitimate channel?","poleA":"Shadow system keeps growing","poleB":"Reabsorbed and regulated into mainstream","sharpest":false,"outcomes":[{"id":"recMyscTvwIEpbAXe","label":"Reabsorbed and regulated","direction":"Positive","alignment":"Engineered alignment","narrative":"The mainstream competes on price, speed, and trust, regulation pulls the useful parts of the shadow system into legitimate channels, and standards follow the users back in.","strategicMove":"The mechanism is to reabsorb by out-competing on the exact axes that drove people out: legitimize and fund fast, cheap, low-friction options like regulated telehealth prescribing and low-cost online pharmacy access, so the legal path beats the gray one on convenience, not just safety. The venue is the regulated delivery and reputation layer, plus the licensing rules that decide what counts as legitimate. The hard part is that matching the shadow system on speed and price means loosening rules and absorbing cost that incumbents and regulators resist as risk and lost revenue. The move: make the legitimate channel genuinely cheaper, faster, and more trusted than the workaround, because people return to the mainstream only when it beats the shadow on the terms that made them leave, not when they are told it is safer.","impacts":[{"id":"recMyscTvwIEpbAXe_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"High","mechanism":"A mainstream that competes and wins users back feeds the delivery-reputation engine: cheaper, faster, more trusted delivery pulls people out of the shadow and rebuilds the case for the formal system.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"}]},{"id":"rec2JyzX5aClPvUl4","label":"Runaway shadow growth","direction":"Negative","alignment":"Self-aligned","narrative":"As trust and affordability erode, more people exit into the shadow system, it hardens into parallel infrastructure, and the mainstream shrinks to those who can pay.","strategicMove":"This is the default that wins by inertia, because the shadow system already beats the mainstream on price, speed, and friction, and every year the legal path stays slow and expensive it recruits more of the exit. The engine is the mainstream's own inaccessibility, which does the shadow system's marketing for free. The hard part is that reversing it means the mainstream must actually become cheaper and faster, a structural reform that fights entrenched pricing, licensing, and incumbent interests, not a messaging campaign. The move: attack the affordability and friction that push people out, because the shadow system does not win on ideology, it wins on being easier, and only a mainstream that closes that gap stops the bleed.","impacts":[{"id":"rec2JyzX5aClPvUl4_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Reshapes","magnitude":"Medium","mechanism":"As the shadow system hardens into parallel infrastructure, the root PHI-vs-vendor relationship shifts: unregulated platforms, not public institutions, become the default provider for the excluded.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSu
