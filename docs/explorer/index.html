<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Future of Public Health &mdash; Driver Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --paper:#F5F4EC; --card:#FBFAF3; --ink:#242424; --muted:#6B6B5E;
  --hairline:rgba(36,36,34,0.16); --rule:#242424;
  --lime:#C4FF67; --lime-deep:#A6E84B;
  --blue:#275DE2; --coral:#FF644E; --yellow:#FFD932; --green:#2F8F2A; --navy:#0D1C3D;
  --amber:#B9860B; --orange:#E07A26; --red:#D1382A; --indigo:#4B45C6; --gray:#6B6B5E;
  --sans:'Archivo', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  --serif:'Cormorant', Georgia, 'Times New Roman', serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:15px; line-height:1.5; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}
#root{height:100vh;}
button{font-family:inherit;color:inherit;cursor:pointer;background:none;border:none;padding:0;margin:0;text-align:left;}
button:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
.app{display:flex;height:100vh;width:100%;background:var(--paper);}
.sidebar{width:320px;min-width:320px;height:100vh;overflow-y:auto;border-right:1px solid var(--hairline);background:var(--paper);padding:22px 20px 40px 22px;}
.main{flex:1;height:100vh;overflow-y:auto;background:var(--paper);}
.eyebrow{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:11px;color:var(--muted);}
.eyebrow.ink{color:var(--ink);}
.eyebrow.blue{color:var(--blue);}
.mark-wrap{position:relative;display:inline-block;}
.mark-svg{position:absolute;left:-2px;right:-2px;bottom:-3px;width:calc(100% + 4px);height:14px;mix-blend-mode:multiply;pointer-events:none;z-index:0;}
.mark-wrap>.mark-txt{position:relative;z-index:1;}
.app-title{font-family:var(--sans);font-weight:800;text-transform:uppercase;letter-spacing:-.005em;font-size:20px;line-height:1.05;color:var(--ink);}
.app-sub{margin-top:8px;}
.search{width:100%;margin-top:18px;padding:9px 11px;border:1px solid var(--hairline);border-radius:2px;background:var(--card);font-family:var(--sans);font-size:13px;color:var(--ink);}
.search::placeholder{color:var(--muted);}
.search:focus{outline:none;border-color:var(--ink);}
.toggle-row{display:flex;align-items:center;gap:10px;margin-top:14px;}
.sq-toggle{width:34px;height:20px;border:1px solid var(--ink);border-radius:2px;background:var(--card);position:relative;flex:none;transition:background .12s;}
.sq-toggle .knob{position:absolute;top:1px;left:1px;width:16px;height:16px;background:var(--ink);border-radius:1px;transition:transform .12s,background .12s;}
.sq-toggle.on{background:var(--lime);}
.sq-toggle.on .knob{transform:translateX(14px);background:var(--ink);}
.toggle-label{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:10.5px;color:var(--ink);}
.theme-group{margin-top:26px;}
.theme-label{padding-bottom:7px;border-bottom:1px solid var(--hairline);margin-bottom:6px;}
.driver-row{display:flex;align-items:flex-start;gap:8px;width:100%;padding:7px 8px;border-radius:2px;position:relative;line-height:1.25;}
.driver-row:hover{background:rgba(36,36,34,0.045);}
.driver-row .diamond{width:8px;height:8px;background:var(--lime-deep);transform:rotate(45deg);margin-top:5px;flex:none;}
.driver-row .diamond.hidden{visibility:hidden;}
.driver-row .dr-name{font-family:var(--sans);font-weight:500;font-size:13.5px;color:var(--ink);position:relative;z-index:1;}
.driver-row.active .dr-name{font-weight:700;}
.driver-row .dr-mark{position:absolute;left:24px;right:8px;top:6px;bottom:6px;background:var(--lime);mix-blend-mode:multiply;z-index:0;border-radius:1px;}
.driver-row .count-badge{margin-left:auto;flex:none;background:var(--lime);color:var(--ink);font-family:var(--sans);font-weight:700;font-size:10px;line-height:1;padding:3px 5px;border-radius:2px;position:relative;z-index:1;}
.side-footer{margin-top:34px;padding-top:16px;border-top:1px solid var(--rule);}
.side-footer .lchar{font-family:var(--serif);font-weight:500;font-size:22px;line-height:1;color:var(--ink);}
.side-footer .ftitle{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--ink);margin-top:4px;}
.side-footer .ftotals{font-family:var(--sans);font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;}
.main-header{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:1px solid var(--rule);padding:26px 44px 20px 44px;}
.driver-name{font-family:var(--sans);font-weight:800;text-transform:uppercase;letter-spacing:-.005em;font-size:32px;line-height:1.02;color:var(--ink);margin:8px 0 0 0;}
.driver-statement{font-family:var(--serif);font-weight:500;font-size:24px;line-height:1.28;color:var(--ink);margin:14px 0 0 0;}
.driver-short{font-family:var(--sans);font-weight:400;font-size:14.5px;color:var(--muted);margin:10px 0 0 0;max-width:760px;}
.meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:16px;}
.mini-tag{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:10px;border:1px solid var(--hairline);border-radius:2px;padding:4px 7px;color:var(--muted);background:var(--card);}
.align-tally{display:flex;align-items:center;gap:9px;margin-left:4px;}
.tally-item{display:flex;align-items:center;gap:4px;}
.tally-sq{width:10px;height:10px;border-radius:1px;flex:none;}
.tally-n{font-family:var(--sans);font-weight:700;font-size:11px;color:var(--ink);}
.controlbar{padding:18px 44px 4px 44px;}
.cb-inner{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:14px 0 16px 0;border-bottom:1px solid var(--hairline);}
.cb-label{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:10.5px;color:var(--muted);margin-right:4px;}
.chip{font-family:var(--sans);font-weight:600;font-size:11.5px;letter-spacing:.02em;padding:6px 11px;border-radius:2px;border:1px solid var(--hairline);background:var(--card);color:var(--ink);white-space:nowrap;}
.chip:hover{border-color:var(--ink);}
.chip.active{color:#fff;border-color:transparent;}
.chip .dot{display:inline-block;width:8px;height:8px;border-radius:1px;margin-right:6px;vertical-align:middle;}
.hopeful-btn{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.09em;font-size:11px;padding:8px 15px;border-radius:2px;border:1px solid var(--ink);background:var(--card);color:var(--ink);margin-left:6px;white-space:nowrap;}
.hopeful-btn.on{background:var(--lime);border-color:var(--ink);}
.hopeful-banner{margin:14px 0 0 0;padding:9px 13px;background:var(--lime);border-radius:2px;font-family:var(--sans);font-weight:500;font-size:12.5px;color:var(--ink);border:1px solid var(--lime-deep);}
.section-wrap{padding:22px 44px 4px 44px;}
.section-label{display:inline-block;padding-bottom:6px;position:relative;}
.section-label .stxt{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.14em;font-size:12px;color:var(--ink);}
.section-label .sunder{position:absolute;left:0;bottom:-1px;width:64px;height:9px;mix-blend-mode:multiply;}
.cards{padding:8px 44px 20px 44px;display:flex;flex-direction:column;gap:14px;}
.unc-card{border:1px solid var(--hairline);border-radius:2px;background:var(--card);overflow:hidden;}
.unc-card.dim{opacity:.45;}
.unc-head{display:flex;align-items:flex-start;gap:12px;width:100%;padding:16px 18px;}
.unc-head:hover{background:rgba(36,36,34,0.03);}
.unc-caret{font-family:var(--sans);font-size:12px;color:var(--muted);margin-top:3px;flex:none;width:12px;}
.unc-title-block{flex:1;min-width:0;}
.unc-label{font-family:var(--sans);font-weight:700;font-size:16px;color:var(--ink);line-height:1.2;}
.sharp-pill{display:inline-block;margin-left:9px;vertical-align:middle;background:var(--lime);color:var(--ink);font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:9px;padding:3px 6px;border-radius:2px;}
.unc-q{font-family:var(--serif);font-style:italic;font-weight:400;font-size:16px;line-height:1.35;color:var(--muted);margin-top:6px;}
.poles{display:flex;align-items:center;gap:8px;margin-top:12px;}
.pole{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:9.5px;color:var(--muted);white-space:nowrap;max-width:44%;line-height:1.25;overflow:hidden;text-overflow:ellipsis;}
.pole.b{text-align:right;}
.pole-line{flex:1;height:1px;background:var(--ink);position:relative;}
.pole-line::before,.pole-line::after{content:'';position:absolute;top:-2.5px;width:5px;height:5px;border-top:1px solid var(--ink);border-right:1px solid var(--ink);}
.pole-line::before{left:0;transform:rotate(-135deg);}
.pole-line::after{right:0;transform:rotate(45deg);}
.unc-count{font-family:var(--sans);font-weight:600;font-size:10.5px;color:var(--muted);margin-top:3px;flex:none;text-transform:uppercase;letter-spacing:.08em;}
.outcomes{padding:0 18px 16px 18px;display:flex;flex-direction:column;gap:12px;}
.outcome{border-left:3px solid var(--gray);background:var(--paper);padding:13px 15px;border-radius:0 2px 2px 0;}
.oc-head{display:flex;flex-wrap:wrap;align-items:center;gap:9px;}
.oc-label{font-family:var(--sans);font-weight:600;font-size:14.5px;color:var(--ink);}
.oc-dir{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:9.5px;}
.align-chip{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:9.5px;padding:3px 7px;border-radius:2px;border:1px solid;}
.oc-narr{font-family:var(--sans);font-weight:400;font-size:13.5px;color:var(--ink);margin-top:9px;line-height:1.5;}
.sm-toggle{display:inline-flex;align-items:center;gap:5px;margin-top:11px;font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:10.5px;color:var(--muted);padding:3px 2px;border-radius:2px;transition:color .12s;}
.sm-toggle:hover{color:var(--ink);}
.sm-toggle.open{color:var(--ink);}
.sm-toggle:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}
.sm-toggle .sm-caret{font-size:10px;line-height:1;color:var(--lime-deep);}
.sm-body{margin-top:8px;padding:11px 14px;background:var(--card);border-left:2px solid var(--lime-deep);border-radius:0 1px 1px 0;font-family:var(--sans);font-weight:400;font-size:13px;line-height:1.55;color:var(--ink);}
.imp-label{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:9.5px;color:var(--muted);margin-top:13px;}
.imp-list{display:flex;flex-direction:column;gap:9px;margin-top:8px;}
.imp{display:flex;flex-direction:column;gap:3px;}
.imp-top{display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
.effect-chip{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:9px;padding:2px 6px;border-radius:2px;border:1px solid;white-space:nowrap;}
.mag{display:flex;align-items:center;gap:3px;}
.mag .d{width:5px;height:5px;border-radius:50%;background:var(--ink);}
.imp-loop{font-family:var(--sans);font-weight:500;font-size:12.5px;color:var(--ink);}
.imp-sub{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:9px;color:var(--muted);}
.imp-mech{font-family:var(--sans);font-weight:400;font-size:12px;color:var(--muted);line-height:1.45;}
.legend-wrap{padding:10px 44px 56px 44px;}
.legend-toggle{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.13em;font-size:10.5px;color:var(--muted);padding:10px 0;border-top:1px solid var(--hairline);width:100%;}
.legend-body{padding:6px 0 8px 0;display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px 26px;}
.legend-col h4{font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:10px;color:var(--ink);margin:0 0 8px 0;}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.legend-sq{width:11px;height:11px;border-radius:1px;flex:none;}
.legend-txt{font-family:var(--sans);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:9.5px;color:var(--muted);}
.empty{padding:80px 44px;color:var(--muted);font-family:var(--serif);font-size:22px;font-style:italic;}
.no-match{padding:20px 44px;color:var(--muted);font-family:var(--sans);font-size:13px;}
.unc-tabs{padding:10px 44px 0 44px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;}
.unc-tab{display:flex;flex-direction:column;gap:7px;border:1px solid var(--hairline);border-radius:2px;background:var(--card);padding:13px 13px 14px 13px;position:relative;transition:border-color .12s,background .12s;}
.unc-tab:hover{border-color:var(--muted);}
.unc-tab.sel{border-color:var(--ink);}
.unc-tab.sel::before{content:'';position:absolute;left:-1px;right:-1px;top:-1px;height:3px;background:var(--lime);}
.unc-tab.dim{opacity:.4;}
.unc-tab .ut-top{display:flex;align-items:center;gap:8px;min-height:15px;}
.unc-tab .ut-sharp{background:var(--lime);color:var(--ink);font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.1em;font-size:8.5px;padding:3px 6px;border-radius:2px;}
.unc-tab .ut-count{margin-left:auto;font-family:var(--sans);font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:9.5px;color:var(--muted);}
.unc-tab .ut-label{font-family:var(--sans);font-weight:700;font-size:14.5px;line-height:1.22;color:var(--ink);text-align:left;}
.unc-tab .ut-poles{font-family:var(--sans);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:9px;color:var(--muted);line-height:1.4;}
.unc-tab .ut-poles .ut-vs{color:var(--lime-deep);font-weight:800;padding:0 3px;}
.unc-detail{margin:16px 44px 8px 44px;border:1px solid var(--hairline);border-top:3px solid var(--ink);border-radius:2px;background:var(--card);padding:18px 18px 6px 18px;}
.ud-q{font-family:var(--serif);font-style:italic;font-weight:400;font-size:18px;line-height:1.35;color:var(--ink);}
.unc-detail .poles{margin-top:14px;}
.unc-detail .outcomes{padding:16px 0 6px 0;}
.ud-empty{margin-top:14px;font-family:var(--sans);font-size:13px;color:var(--muted);}
</style>
</head>

<script type="text/babel" data-presets="env,react">
const {useState,useMemo} = React;

const DATA = {"drivers":[{"id":"recWNguyj9ztw5Lga","name":"The Receding Public","theme":"Keystone","headline":"Public health is losing its public.","short":"Many of these forces don't just strain public health, they dissolve its premise: a shared, governable public with a common good worth protecting together.","neutralHeadline":"What 'the public' means is being renegotiated.","neutralReading":"The shared, governable 'public' that public health has assumed is being renegotiated as people move toward more individualized, private health worlds. This challenges the premise of collective action and invites a redefinition of how public health creates value without a mobilized public. As the keystone, it is more existential than the others; the neutral read is 'what is the public, and what is public health for,' rather than simply loss.","neutralName":"","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"recSSb4N11vt5YF2z","label":"Is there still a public?","question":"By 2035, is there still a shared public that public health can serve and mobilize, or has it receded into private, individualized health worlds?","poleA":"Re-engaged, re-constituted public","poleB":"Permanently receded, privatized public","sharpest":true,"outcomes":[{"id":"recJGmYhtH5qNuyes","label":"Public re-constituted","direction":"Positive","alignment":"Needs collective action","narrative":"A visible crisis and deliberate community organizing rebuild a shared sense of the public. Public health regains a real constituency it can mobilize, and collective programs land because people again see themselves as part of a whole.","strategicMove":"","impacts":[{"id":"recJGmYhtH5qNuyes_rec6hW9Xkbb80fHl7","label":"R1 — Neutral-table flywheel","effect":"Strengthens","magnitude":"High","mechanism":"A re-constituted public gives the neutral convening table a real constituency to gather, so more parties show up and the flywheel of convening authority spins faster.","loopName":"R1 — Neutral-table flywheel","loopSubsystem":"Convene","loopCode":"R1"},{"id":"recJGmYhtH5qNuyes_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Strengthens","magnitude":"Medium","mechanism":"With a shared public rebuilt, the community-standing loop regains its base: trusted messengers reach an audience that identifies collectively, reinforcing public health's local reputation.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"}]},{"id":"recmL9nBYqx64fybl","label":"Public dissolves into silos","direction":"Negative","alignment":"Self-aligned","narrative":"People fully retreat into private, individualized health worlds curated by platforms and personal networks. There is no shared audience left to mobilize, and population-level messaging and programs lose all purchase.","strategicMove":"","impacts":[{"id":"recmL9nBYqx64fybl_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Weakens","magnitude":"High","mechanism":"The credibility flywheel needs an audience that values public authority; as people privatize into individual health worlds, credibility gains no longer compound because fewer people are listening.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"},{"id":"recmL9nBYqx64fybl_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Breaks / reverses","magnitude":"High","mechanism":"When the public dissolves into private silos, the trust seam loses the shared arena where trust is built or spent, so the trust-building cycle has nothing to act on and collapses.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"recpYdCdlqCNpxrmO","label":"Mandate for collective action","question":"Does public health retain a legitimate mandate to act on the collective, or does public consent for collective action evaporate?","poleA":"Consent for collective action holds","poleB":"Consent evaporates","sharpest":false,"outcomes":[{"id":"rec3EQUc5775lT87Y","label":"Collective mandate renewed","direction":"Positive","alignment":"Needs collective action","narrative":"Communities reaffirm that some health problems require collective action, and grant public health explicit consent to act on their behalf. Legitimacy is rebuilt through participation, giving institutions durable authority to intervene.","strategicMove":"","impacts":[{"id":"rec3EQUc5775lT87Y_rec72k0jpsfpCyrde","label":"B3 — Community agency (catalyst vs recipient)","effect":"Strengthens","magnitude":"Medium","mechanism":"A renewed collective mandate is granted through participation, so communities exercise agency in setting priorities, which reinforces the community-agency loop that legitimizes further collective action.","loopName":"B3 — Community agency (catalyst vs recipient)","loopSubsystem":"Convene","loopCode":"B3"}]},{"id":"recGcDHBRY94TtyR4","label":"Consent withdrawn","direction":"Negative","alignment":"Needs collective action","narrative":"The idea that any body may act on the collective becomes illegitimate in most people's eyes. Public health loses the political and social license to intervene, and even sound interventions are read as overreach.","strategicMove":"","impacts":[{"id":"recGcDHBRY94TtyR4_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Weakens","magnitude":"High","mechanism":"When consent for collective action evaporates, the trust-and-funding engine loses its justification: funders and publics stop backing interventions they no longer see as legitimate, cutting the resource loop.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"}]}]},{"id":"rech45Hdb4qPA55i1","label":"Routed around or re-earned?","question":"Can public institutions re-earn a place in people's lives, or are they permanently routed around by private and platform alternatives?","poleA":"Institutions re-earn their place","poleB":"Permanently routed around","sharpest":false,"outcomes":[{"id":"recj4yiAKiuaP1YwT","label":"Institutions re-earn relevance","direction":"Positive","alignment":"Engineered alignment","narrative":"By showing up reliably and delivering value in daily life, public institutions win back a place people actually use. They become a trusted default rather than a fallback, anchoring health decisions in something shared.","strategicMove":"","impacts":[{"id":"recj4yiAKiuaP1YwT_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"Medium","mechanism":"As institutions re-earn relevance by delivering value in daily life, the delivery-reputation engine turns: reliable delivery builds reputation, which draws more use and reinforces the institution's place.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"}]},{"id":"rec9XblsLvS4IMLJO","label":"Permanently routed around","direction":"Negative","alignment":"Self-aligned","narrative":"Private and platform alternatives become the default path for health information and services, and institutions are bypassed entirely. Public health fades into a residual role, invisible to most people until a system fails.","strategicMove":"","impacts":[{"id":"rec9XblsLvS4IMLJO_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Breaks / reverses","magnitude":"High","mechanism":"When platform alternatives become the default, the root PHI-versus-vendor relationship inverts: vendors own the direct tie to people and the institute is disintermediated out of the loop.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""}]}]}]},{"id":"recWM6OhzJg5LzLHo","name":"Public Health Under Political Fire","theme":"Trust, Legitimacy & Information","headline":"Public health has become a political target.","short":"Legal authority and the equity mandate are being actively rewritten at the state and federal levels.","neutralHeadline":"Public health's mandate is being contested.","neutralReading":"Public health's legal authority, mandate, and standing are being actively contested and rewritten at the state and federal levels. That is destabilizing and also forces a renegotiation of what authority is legitimate and durable. Limit: being a target is genuinely adversarial; the most neutral honest read is that the field's social and legal contract is being renegotiated, not that nothing is at stake.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recSvtgk6KNBOmeCx","label":"Durable target or bipartisan floor?","question":"Does public health remain a durable partisan target through 2035, or is a bipartisan floor of basic preparedness and local legitimacy re-established?","poleA":"Durable partisan target","poleB":"Bipartisan preparedness floor re-established","sharpest":true,"outcomes":[{"id":"recz8FJIwGV689qBs","label":"Bipartisan floor re-established","direction":"Positive","alignment":"Needs collective action","narrative":"A bipartisan floor for public health is re-established, a basic level of preparedness and legitimacy both sides will defend.","strategicMove":"The move is to rebuild bipartisan ground by anchoring on the functions with genuine cross-partisan support, emergency preparedness, protecting kids, local control, biosecurity, and depoliticizing the brand away from the flashpoints that made it a target. The venue is framing, coalition-building, and local relationships where trust runs higher than nationally. The hard part is that this requires the field to accept a narrower, less ideological mandate and to build alliances with people it disagrees with, which is uncomfortable and slow. The move: deliberately construct the bipartisan floor around preparedness and local legitimacy, because public health cannot survive as a partisan project and only a floor both sides will defend is durable.","impacts":[{"id":"recz8FJIwGV689qBs_recxYORcLcLGwWl4S","label":"B2 — Political-turnover buffer","effect":"Strengthens","magnitude":"High","mechanism":"A shared preparedness floor insulates the mission from each election swing, reinforcing the political-turnover buffer that lets institutions plan across administrations.","loopName":"B2 — Political-turnover buffer","loopSubsystem":"Anchor","loopCode":"B2"},{"id":"recz8FJIwGV689qBs_recp32wVFOurWtsCG","label":"R1 — Mission-rooted continuity","effect":"Strengthens","magnitude":"Medium","mechanism":"Restored local legitimacy lets mission-rooted institutions keep operating on purpose rather than defense, feeding the mission-rooted continuity loop.","loopName":"R1 — Mission-rooted continuity","loopSubsystem":"Anchor","loopCode":"R1"}]},{"id":"reczKttopqYtT7f3S","label":"Public health stays a durable target","direction":"Negative","alignment":"Needs collective action","narrative":"Public health remains a durable partisan target, attacked and defunded as a matter of political identity regardless of performance.","strategicMove":"This happens when public health stays fused to one political side in the public mind, so it is attacked as a proxy in the culture war and its performance becomes irrelevant to its treatment. The path is defined by the absence of a cross-partisan constituency. The hard part is that being a durable target is self-reinforcing (attacks drive defensive politicization, which invites more attacks), and no amount of good work insulates a symbol. The move: break the fusion with one side by rebuilding cross-partisan legitimacy and local trust, because as long as public health reads as a partisan actor it will be treated as one, and competence will not save it.","impacts":[{"id":"reczKttopqYtT7f3S_recpHxg5zO1QWqtgR","label":"B1 — Polarization / backlash","effect":"Strengthens","magnitude":"Medium","mechanism":"Keeping public health as a partisan target amplifies the polarization/backlash loop, where each contested action provokes an opposing reaction that deepens division.","loopName":"B1 — Polarization / backlash","loopSubsystem":"Amplify","loopCode":"B1"},{"id":"reczKttopqYtT7f3S_recxYORcLcLGwWl4S","label":"B2 — Political-turnover buffer","effect":"Breaks / reverses","magnitude":"High","mechanism":"Recurring purges and cuts each election exceed what the political-turnover buffer can absorb, so turnover shocks pass straight through to the mission.","loopName":"B2 — Political-turnover buffer","loopSubsystem":"Anchor","loopCode":"B2"}]}]},{"id":"recPdiZXJgC6OTQGc","label":"Authority curtailed or rebuilt?","question":"Does public health legal and emergency authority get permanently curtailed, or is it redefined and rebuilt on new, more durable footing?","poleA":"Authority permanently curtailed","poleB":"Authority rebuilt on new footing","sharpest":false,"outcomes":[{"id":"recglOkonHuFNpCH2","label":"Authority rebuilt on new footing","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health's legal and operational authority is rebuilt on new footing, more transparent, more bounded, and more legitimate than the emergency powers it replaced.","strategicMove":"The move is to proactively redesign authority rather than defend the old version: clearer limits, sunset and review provisions, and transparency and due-process requirements that make emergency powers legitimate enough to survive courts and legislatures. The venue is statutory reform and the design of the powers themselves. The hard part is that this means giving up sweeping discretion in exchange for durable, trusted, narrower authority, which feels like a loss to a field used to broad emergency latitude. The move: lead the redesign of public-health authority toward bounded, transparent, accountable powers, because authority that is trusted and legally durable beats authority that is broad on paper but stripped at the first challenge.","impacts":[{"id":"recglOkonHuFNpCH2_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Strengthens","magnitude":"Medium","mechanism":"Authority grounded in earned trust and local accountability replenishes the Trust seam, since the mandate now rests on demonstrated legitimacy rather than assumed deference.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recBiWHRM1ujzZCOO","label":"Authority permanently curtailed","direction":"Negative","alignment":"Needs collective action","narrative":"Public-health legal authority is permanently curtailed, courts and legislatures strip the emergency and mandate powers the field relied on, with nothing put in their place.","strategicMove":"This happens when the backlash against pandemic-era powers hardens into permanent limits, and the field loses the tools (mandates, emergency orders) without building legitimate replacements. The path is defined by reacting defensively to each restriction rather than proposing a new settlement. The hard part is that once powers are stripped by court precedent and statute, they are extremely hard to restore, and the field is left to act through persuasion alone. The move: get ahead of the curtailment by proposing legitimate, bounded authority now, because the choice is not broad-powers-versus-limits but redesigned-authority-versus-nothing, and doing nothing ends in nothing.","impacts":[{"id":"recBiWHRM1ujzZCOO_recxYORcLcLGwWl4S","label":"B2 — Political-turnover buffer","effect":"Weakens","magnitude":"High","mechanism":"Permanently stripping emergency powers removes the tools that let institutions weather turnover and still act, hollowing out the political-turnover buffer for the next crisis.","loopName":"B2 — Political-turnover buffer","loopSubsystem":"Anchor","loopCode":"B2"}]}]},{"id":"recXv1pU1613xo5FP","label":"PHIs: refuge or pulled into crossfire?","question":"Do mission-rooted PHIs absorb displaced public health functions while keeping their neutrality, or do they get pulled into the political crossfire and lose it?","poleA":"PHIs absorb functions and stay neutral","poleB":"PHIs pulled in and lose neutrality","sharpest":false,"outcomes":[{"id":"recwXTvWTErQDHPKS","label":"PHIs absorb functions, stay neutral","direction":"Positive","alignment":"Engineered alignment","narrative":"As government public health is politicized and cut, mission-rooted PHIs absorb displaced functions while holding their neutral, trusted standing.","strategicMove":"The move is for PHIs to use their non-governmental, mission-rooted position as a refuge for capacity government can no longer safely hold, taking on data, convening, and program work while deliberately protecting neutrality through governance, funding diversity, and staying off the partisan flashpoints. The venue is the PHI's institutional independence and its governance choices. The hard part is that absorbing politically charged functions is exactly what threatens neutrality, so it requires discipline about what to take on and constant guarding of the trusted-broker position. The move: position PHIs as the neutral continuity layer that holds the field's capacity through political turnover while rigorously protecting neutrality, because a PHI that gets pulled into the fight loses the one thing government cannot replace.","impacts":[{"id":"recwXTvWTErQDHPKS_recp32wVFOurWtsCG","label":"R1 — Mission-rooted continuity","effect":"Strengthens","magnitude":"High","mechanism":"By absorbing displaced functions and talent, mission-rooted PHIs keep the mission alive when public agencies cannot, directly reinforcing mission-rooted continuity.","loopName":"R1 — Mission-rooted continuity","loopSubsystem":"Anchor","loopCode":"R1"}]},{"id":"rec3N6J0E3s4Ry5VM","label":"PHIs pulled into the crossfire","direction":"Negative","alignment":"Needs collective action","narrative":"PHIs get pulled into the political crossfire too, lose their neutral standing, and become just another combatant rather than a trusted broker.","strategicMove":"This happens when PHIs take on politically charged work, funding, or public positions that identify them with one side, and their neutral standing, their core asset, erodes. The path is defined by the loss of the trusted-broker position that distinguishes them from government. The hard part is that neutrality is fragile and asymmetric: it is spent quickly by a few visible partisan moves and rebuilt slowly, and the pressure to take sides is constant. The move: protect neutrality as the field's scarcest asset through disciplined governance, funder diversity, and restraint on flashpoints, because a PHI network trusted across the divide can do things no partisan actor can, and that advantage vanishes the moment it picks a team.","impacts":[{"id":"rec3N6J0E3s4Ry5VM_recpspyaDTQkNATyN","label":"B1 — Neutrality tension","effect":"Weakens","magnitude":"Medium","mechanism":"Once a convener is read as taking sides, parties stop coming to its table, weakening the neutrality tension loop that keeps convening credible.","loopName":"B1 — Neutrality tension","loopSubsystem":"Convene","loopCode":"B1"},{"id":"rec3N6J0E3s4Ry5VM_recOLbN2l0CiYHtAk","label":"B3 — Mission vs. conduit drift","effect":"Strengthens","magnitude":"High","mechanism":"Being labeled partisan pushes PHIs from mission toward being seen as a conduit for one side, accelerating the mission-vs-conduit drift loop away from purpose.","loopName":"B3 — Mission vs. conduit drift","loopSubsystem":"Anchor","loopCode":"B3"}]}]}]},{"id":"recp5a286jkRY3hv0","name":"The Epistemic Crisis","theme":"Trust, Legitimacy & Information","headline":"We no longer agree on what's true.","short":"A polluted, AI-saturated information environment and contested ideas about what even counts as evidence.","neutralHeadline":"What counts as evidence is being contested.","neutralReading":"The information environment is being reshaped by AI-generated content and contested standards for what counts as evidence, making a shared factual baseline harder to sustain. That is a serious challenge to consensus and a prompt to rethink how credible information reaches people. Limit: the word 'crisis' is charged; the underlying shift is a contest over the information environment and the nature of evidence.","neutralName":"The Evidence Question","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"rec5DSYcdWy8umvQR","label":"AI clarifies or floods?","question":"Does AI become a net force for clarity, delivering verified, personalized, trustworthy guidance, or a net force for chaos, producing infinite cheap personalized misinformation?","poleA":"AI clarifies the information environment","poleB":"AI floods it with synthetic noise","sharpest":true,"outcomes":[{"id":"rec92Mc6XCY2KPcfE","label":"AI as clarity engine","direction":"Positive","alignment":"Engineered alignment","narrative":"AI becomes a net force for clarity, delivering verified, personalized, trustworthy health guidance at scale.","strategicMove":"The move is to build or shape the trusted AI layer: public-interest models and verification tools that give people reliable, plain-language, personalized answers, and to get public-health evidence embedded as the authoritative source these assistants draw on. The venue is the AI assistant and the verification and standards layer behind it. The hard part is that clarity-at-scale requires public health to be technically present in the AI stack (data, evaluation, partnerships), which the field is not resourced or fast enough to do by default. The move: get public-health evidence and guardrails into the consumer AI layer now, because if trustworthy answers are the default output, the information war is half won upstream.","impacts":[{"id":"rec92Mc6XCY2KPcfE_recF6ANvoybZcVCqR","label":"R1 — Relevance flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"Personalized, plain-language answers make guidance feel relevant to each user, feeding the relevance flywheel that drives uptake and further engagement.","loopName":"R1 — Relevance flywheel","loopSubsystem":"Translate & Disperse","loopCode":"R1"},{"id":"rec92Mc6XCY2KPcfE_rectnJjD3okzhRSsj","label":"R2 — Counter-misinformation","effect":"Strengthens","magnitude":"High","mechanism":"Verified AI guidance lets accurate answers scale to meet false claims one-to-one, giving the counter-misinformation loop the speed and reach it previously lacked.","loopName":"R2 — Counter-misinformation","loopSubsystem":"Amplify","loopCode":"R2"}]},{"id":"recCHaiACKeT0graa","label":"AI as misinformation firehose","direction":"Negative","alignment":"Self-aligned","narrative":"AI becomes a force for chaos, infinite cheap personalized misinformation that overwhelms the information environment.","strategicMove":"The default trajectory: generative tools make persuasive, targeted falsehood nearly free and infinite, and it spreads faster than any correction. The engine is that misinformation is cheap to produce and profitable to spread, while accuracy is slow and costly. The hard part is that volume and velocity make whack-a-mole correction unwinnable, and public health cannot out-produce the firehose. The move: shift from correcting individual falsehoods to shaping the environment, pre-bunking and inoculation, platform and AI standards, and getting trusted sources embedded upstream, because you cannot debunk your way out of infinite synthetic content, only change what the system produces and amplifies by default.","impacts":[{"id":"recCHaiACKeT0graa_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"High","mechanism":"A firehose of personalized falsehood makes people distrust all sources, draining the shared Trust seam that every public health function relies on.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recCHaiACKeT0graa_rectnJjD3okzhRSsj","label":"R2 — Counter-misinformation","effect":"Breaks / reverses","magnitude":"High","mechanism":"When falsehood is generated faster than it can be corrected, the counter-misinformation loop is swamped: each rebuttal is buried under fresh synthetic content.","loopName":"R2 — Counter-misinformation","loopSubsystem":"Amplify","loopCode":"R2"}]}]},{"id":"recYu4JdFjIuKlFUx","label":"Does public health own a channel?","question":"Does public health own any trusted information channel of its own by 2035, or does it only rent attention on platforms it does not control?","poleA":"Public health owns a trusted channel","poleB":"It only rents attention on others' platforms","sharpest":false,"outcomes":[{"id":"recqKoURwnSe8EQ4p","label":"Public health owns a channel","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health owns a real channel of its own, a trusted destination people come to, rather than only renting attention on platforms it does not control.","strategicMove":"The move is to build owned reach: a genuinely useful, trusted product people choose to use (a health information destination, tool, or assistant), plus deep relationships with the trusted messengers who carry it, so distribution does not depend on platform algorithms. The venue is a product people want and a messenger network, not a press release. The hard part is that building owned reach requires product and audience skills public health rarely has and cannot easily hire, and attention is brutally competitive. The move: invest in owning a channel (a product plus a messenger network) rather than perpetually renting attention, because reach you rent can be throttled or turned against you overnight.","impacts":[{"id":"recqKoURwnSe8EQ4p_recF6ANvoybZcVCqR","label":"R1 — Relevance flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"A directly owned channel means the audience relationship compounds without platform interference, so relevant content reliably reaches and re-engages its audience.","loopName":"R1 — Relevance flywheel","loopSubsystem":"Translate & Disperse","loopCode":"R1"}]},{"id":"recbqzcGL63KsXq1V","label":"Renting attention on others' platforms","direction":"Negative","alignment":"Self-aligned","narrative":"Public health only ever rents attention on platforms it does not control, at the mercy of algorithms and policies set by others.","strategicMove":"The default, because building owned audience is hard and posting on existing platforms is easy, so the field depends on reach it neither owns nor controls. The engine is convenience plus the absence of product capacity. The hard part is that rented reach is fragile and adversarial: algorithm changes, deplatforming, and hostile amplification can erase or weaponize your presence, and you are always one policy change from silence. The move: reduce dependence on rented platforms by building owned channels and trusted-messenger networks, because a communication strategy that lives entirely on someone else's platform is a strategy someone else controls.","impacts":[{"id":"recbqzcGL63KsXq1V_reccbUqhcXDhF3ZDE","label":"B1 — Reach vs. fidelity","effect":"Weakens","magnitude":"Medium","mechanism":"Depending on platforms means chasing algorithmic reach on terms set elsewhere, straining the reach-versus-fidelity balance as messages are reshaped to fit the platform.","loopName":"B1 — Reach vs. fidelity","loopSubsystem":"Translate & Disperse","loopCode":"B1"}]}]},{"id":"recYm4ONgmNglwLYP","label":"Shared facts or separate realities?","question":"By 2035, is there still a shared baseline of facts the public roughly agrees on, or have people settled into permanently separate epistemic realities?","poleA":"A shared factual baseline holds","poleB":"Separate epistemic realities harden","sharpest":false,"outcomes":[{"id":"rec20xfX2aX7bBZmz","label":"Shared baseline holds","direction":"Positive","alignment":"Self-aligned","narrative":"A shared baseline of facts survives, a common reality public health can still appeal to.","strategicMove":"This one partly holds on its own, since most people still share basic factual ground on most health questions, but preserving it takes work: reinforce the shared baseline by working through broadly trusted institutions and neutral framing, and avoid actions that push more health facts into the partisan bucket. The venue is framing and messenger choice. The hard part is that the shared baseline erodes at the edges precisely on the highest-stakes, most politicized issues, and defending it can itself look partisan. The move: protect the shared factual baseline deliberately by depoliticizing what you can and routing through trusted-across-the-divide messengers, because a common reality is an asset you can lose faster than you can rebuild.","impacts":[{"id":"rec20xfX2aX7bBZmz_rec6hW9Xkbb80fHl7","label":"R1 — Neutral-table flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"A surviving factual baseline gives conveners common ground to assemble parties around, keeping the neutral-table flywheel viable.","loopName":"R1 — Neutral-table flywheel","loopSubsystem":"Convene","loopCode":"R1"}]},{"id":"recUgKoWU36sbOrXU","label":"Separate realities harden","direction":"Negative","alignment":"Self-aligned","narrative":"The public splits into permanently separate epistemic realities, each with its own facts, that have to be reached on their own terms.","strategicMove":"This happens as media and algorithms sort people into non-overlapping information worlds, and health facts get absorbed into identity, so there is no single message that reaches everyone. The engine is the attention economy's incentive to segment and confirm. The hard part is that in separate realities there is no neutral ground, so public health must operate as many tailored efforts through in-group messengers rather than one authoritative broadcast, which is slower and cedes the illusion of a single public. The move: accept the plural reality and build trusted messengers inside each community rather than broadcasting one message at all of them, because in fragmented epistemics only in-group voices carry.","impacts":[{"id":"recUgKoWU36sbOrXU_rec6hW9Xkbb80fHl7","label":"R1 — Neutral-table flywheel","effect":"Breaks / reverses","magnitude":"High","mechanism":"With no shared evidentiary floor, there is nothing to convene around, so the neutral-table flywheel loses its input and cannot spin.","loopName":"R1 — Neutral-table flywheel","loopSubsystem":"Convene","loopCode":"R1"}]}]}]},{"id":"recmoIs4RO8TjjisN","name":"The Trust Recession","theme":"Trust, Legitimacy & Information","headline":"Trust in health institutions is collapsing.","short":"Confidence is draining and splitting by party; authority now travels through local messengers rather than national logos.","neutralHeadline":"Trust is moving from institutions to people.","neutralReading":"Trust in health institutions is declining and relocating rather than simply vanishing, moving from national institutions toward local, relational messengers and splitting along political lines. That weakens top-down authority and points to where credibility can be rebuilt, the local and relational level. The term 'recession' already implies something cyclical rather than terminal.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recYJJBuWUqsdRCh3","label":"Local trust rebuilds or fragments?","question":"Does trust rebuild from the local and relational level (clinicians, community health workers, local agencies), or does even local trust eventually fracture along the same partisan lines?","poleA":"Local/relational trust rebuilds","poleB":"Trust stays fragmented and partisan","sharpest":true,"outcomes":[{"id":"reckdVxFrkRjnjT9U","label":"Relational trust rebuild","direction":"Positive","alignment":"Engineered alignment","narrative":"Trust rebuilds from the local and relational level, clinicians, community health workers, and local agencies, even as national institutions stay distrusted.","strategicMove":"The move is to invest in the messengers people still trust rather than the institutions they don't: fund and equip clinicians, community health workers, and faith and community leaders as the trusted face, and have PHIs act as the credible back-end that supplies them with evidence, materials, and training rather than the front-line voice. The venue is the last mile, the local relationship, not the national podium. The hard part is that relational trust is slow, expensive, and does not scale like a campaign, and it requires national institutions to accept a behind-the-scenes role. The move: build the trusted-messenger infrastructure and be its supplier, because in a low-trust era distribution runs through people, not logos.","impacts":[{"id":"reckdVxFrkRjnjT9U_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Strengthens","magnitude":"High","mechanism":"Rebuilt last-mile trust replenishes the shared Trust seam that every function draws on, so credibility earned locally spills into program uptake system-wide.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"reckdVxFrkRjnjT9U_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Strengthens","magnitude":"High","mechanism":"Reliable local messengers deepen community standing, which raises reach and legitimacy, feeding the community-standing flywheel that amplifies future messages.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"}]},{"id":"rec2dCTkGMCJYttiM","label":"Partisan fracture reaches the local level","direction":"Negative","alignment":"Needs collective action","narrative":"Even local and relational trust eventually fractures along the same partisan lines, and there is no trusted level left to build from.","strategicMove":"This happens when polarization saturates all the way down, so your own doctor and local agency get read through a partisan lens too, and the 'local trust is resilient' assumption collapses. The path is defined by the absence of any non-partisan health identity to anchor to. The hard part is that once trust is fully sorted by politics, there is no neutral messenger left, and every source is pre-discounted by half the audience. The move: protect and rebuild a non-partisan health identity (through trusted local institutions, depoliticized framing, and cross-partisan messengers) while it still exists, because a fully sorted trust landscape leaves public health with no one who can speak to everyone.","impacts":[{"id":"rec2dCTkGMCJYttiM_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Breaks / reverses","magnitude":"High","mechanism":"When even clinicians are read as partisan, the last neutral node in the Trust seam collapses, and the seam can no longer carry credibility to any function.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"rec2dCTkGMCJYttiM_rec72k0jpsfpCyrde","label":"B3 — Community agency (catalyst vs recipient)","effect":"Weakens","magnitude":"Medium","mechanism":"If local agencies are seen through a political lens, communities disengage from convening, weakening the community-agency loop that turns participation into local ownership.","loopName":"B3 — Community agency (catalyst vs recipient)","loopSubsystem":"Convene","loopCode":"B3"}]}]},{"id":"recL5skGMm10fG204","label":"Transparency or crisis competence?","question":"Is trust won back mainly through transparency and humility, or only through visible competence in the next crisis (with the risk that a mishandled crisis destroys it further)?","poleA":"Transparency and humility rebuild trust","poleB":"Only crisis competence proves it","sharpest":false,"outcomes":[{"id":"recMHpBY5pvvKIGmQ","label":"Transparency earns durable trust","direction":"Positive","alignment":"Engineered alignment","narrative":"Trust is won back through radical transparency and humility, honest about uncertainty and open about mistakes, and it proves durable.","strategicMove":"The move is to make transparency operational: show the work and the uncertainty, correct errors openly and fast, and pre-commit to how decisions are made so trust rests on process, not personality. The venue is communication practice and institutional habit. The hard part is that transparency is uncomfortable and politically risky (admitting uncertainty gets weaponized), and it builds trust only if it is consistent, since one defensive cover-up resets it. The move: institutionalize transparency and error-correction as standard practice, because in a low-trust world the credible move is to be trustworthy in the open, not to project false certainty.","impacts":[{"id":"recMHpBY5pvvKIGmQ_rec04pNdmhANStwwt","label":"R1 — Administrative-trustworthiness engine","effect":"Strengthens","magnitude":"Medium","mechanism":"Showing the work and admitting uncertainty demonstrates trustworthy stewardship, reinforcing the administrative-trustworthiness engine that earns continued mandate and support.","loopName":"R1 — Administrative-trustworthiness engine","loopSubsystem":"Steward","loopCode":"R1"}]},{"id":"recoIANRdLZE5A8v4","label":"Trust hinges on the next crisis","direction":"Mixed / depends","alignment":"Mixed / depends","narrative":"Trust is decided less by messaging than by visible competence in the next crisis, which could rebuild it or shatter it depending on how it is handled.","strategicMove":"Genuinely two-sided: a crisis handled well (fast, honest, effective) rebuilds trust faster than any campaign, and a crisis mishandled destroys it, so trust becomes a bet on operational performance under pressure. The path depends on readiness, not communication strategy. The hard part is that the decisive moment is not chosen and not fully controllable, and the field is being asked to perform with capacity that austerity has hollowed. The move: invest in crisis competence and readiness now, treating the next emergency as the real trust test, because you cannot message your way to trust you have not earned when it counted.","impacts":[{"id":"recoIANRdLZE5A8v4_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Reshapes","magnitude":"Medium","mechanism":"When trust hangs on the next emergency, the credibility flywheel becomes all-or-nothing: one strong performance accelerates it, one failure sends it into reverse.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]}]},{"id":"rec1JOZxkYAo9LWLw","label":"Who is the default trusted voice?","question":"By 2035, does the default trusted health voice become institutions and clinicians, or does it shift to individual influencers and AI assistants (or settle into no trusted voice at all)?","poleA":"Institutions/clinicians stay trusted","poleB":"Trust migrates to influencers/AI or no one","sharpest":false,"outcomes":[{"id":"recdf66e9X5COizpf","label":"Institutions reclaim the trusted voice","direction":"Positive","alignment":"Engineered alignment","narrative":"Public institutions re-earn the default trusted-health-voice role, becoming the source people and platforms turn to first.","strategicMove":"The move is to become the cited source rather than compete for attention: be the authoritative reference clinicians, journalists, influencers, and AI assistants all draw from, and win back credibility through visible competence and transparency at the moments that matter. The venue is the credibility-supply layer beneath the megaphones, plus consistent performance. The hard part is that trust is earned slowly and lost fast, so one visible failure spends years of it, and reclaiming voice competes against faster, more charismatic private sources. The move: aim to be the trust root that others cite, not the loudest voice, because in this environment credibility is more durable leverage than reach.","impacts":[{"id":"recdf66e9X5COizpf_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Strengthens","magnitude":"High","mechanism":"Institutions re-earning the trusted voice makes accurate guidance more likely to be followed, and each followed message compounds authority through the credibility flywheel.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]},{"id":"recl1enyIuCpfo5IA","label":"Authority migrates to influencers and AI","direction":"Negative","alignment":"Self-aligned","narrative":"The default trusted health voice migrates to individual influencers and AI assistants, and institutions become one discounted source among many.","strategicMove":"The market outcome: people turn to charismatic influencers and convenient AI for health guidance because they are faster, friendlier, and always available, and institutional voice cannot compete on those terms. The engine is ordinary attention economics plus convenience. The hard part is that once authority relocates to influencers and models, institutions are routed around entirely, and the quality of guidance depends on actors with no public accountability. The move: rather than fight for the megaphone, become the verified source those influencers and AI systems rely on and the standard that certifies good guidance, because if you cannot be the voice you can still be what the voice is built on.","impacts":[{"id":"recl1enyIuCpfo5IA_rectnJjD3okzhRSsj","label":"R2 — Counter-misinformation","effect":"Weakens","magnitude":"High","mechanism":"When authority migrates off institutions, official corrections carry less weight, so the counter-misinformation loop loses the credible source it needs to overtake false claims.","loopName":"R2 — Counter-misinformation","loopSubsystem":"Amplify","loopCode":"R2"},{"id":"recl1enyIuCpfo5IA_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Weakens","magnitude":"Medium","mechanism":"Losing the trusted-voice role erodes the credibility that funders reward, slowing the trust-and-funding engine that converts reputation into resources.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"}]}]}]},{"id":"rec7bpBj9S3WS9pbc","name":"The Amplified Individual (Power of One)","theme":"The Social Fabric","headline":"One person can now do the work of an institution.","short":"AI, cheap tools, and platforms are collapsing what one person needs to build, broadcast, or deliver care, super-empowering the individual just as the collective fragments.","neutralHeadline":"One person can now do the work of an institution.","neutralReading":"Cheap tools, AI, and platforms are collapsing what a single person needs to build, broadcast, or deliver care, so individuals can do what once took institutions. That leverage cuts both ways: it can super-empower a trusted community worker or a lone bad actor. The question is who wields it, and whether public health institutions can wield it too.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recUvgp6XH2M5FgtS","label":"Help or harm public health?","question":"Does individual leverage net help public health (augmented CHWs, nimble tools, a real public voice) or net harm it (super-spreader influencers, lone biothreat actors, runaway private operators)?","poleA":"Force-multiplier for public health","poleB":"Accelerant of its threats","sharpest":true,"outcomes":[{"id":"rec5rR3XhCKtwBfJu","label":"Force-multiplier for public health","direction":"Positive","alignment":"Engineered alignment","narrative":"Augmented CHWs, nimble public-health-built tools, and trusted individual voices multiply a thin field's reach, capacity, and credibility.","strategicMove":"Individual leverage becomes a force-multiplier only if public health actually builds the capability rather than admiring it from outside, equipping frontline workers with AI copilots, standing up small internal build teams, and cultivating credible human voices with real followings. The mechanism is capability-building: AI tooling for CHWs, in-house rapid tool development, and invested-in trusted messengers. The venue is the workforce, the owned build function, and the trust layer, the three places leverage is either claimed or ceded. The hard part is that this demands talent, permission, and a build culture that risk-averse public health institutions rarely have, and it competes with legacy program spending. The move: invest in frontline augmentation and an internal build-and-voice capability, because leverage helps the field only where the field has actually built the muscle to wield it, and admiring the tools from the sidelines cedes them to others.","impacts":[{"id":"rec5rR3XhCKtwBfJu_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"High","mechanism":"Augmented CHWs raise delivery quality, which boosts delivery reputation, wins more health-department contracts, and funds the staff bench. Spins the flywheel faster.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"},{"id":"rec5rR3XhCKtwBfJu_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Strengthens","magnitude":"High","mechanism":"One augmented worker does the work of several, relieving the shared Workforce seam that constrains every function.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recoRO5r8Q3uvPkJl","label":"Accelerant of its threats","direction":"Negative","alignment":"Self-aligned","narrative":"Misinformation influencers, lone biothreat actors, and runaway private operators use individual leverage to outpace and undermine public health.","strategicMove":"Individual leverage cuts against public health by default because the same cheap tools that empower a CHW empower a super-spreader influencer or a lone bad actor, and the offense moves faster than a slow institution can respond. The engine is asymmetry: one motivated individual can now build reach or capability that used to require an organization, while public health's response cycle stays bureaucratic. The hard part is that you cannot un-democratize the tools, and reactive fact-checking or threat-chasing always lags the next fast mover. The move: shrink the asymmetry by building public health's own speed, rapid-response messenger networks, pre-positioned threat detection, and the capacity to ship a counter fast, because when leverage is universal the only defense is matching the tempo, and an institution that stays slow is structurally out-run.","impacts":[{"id":"recoRO5r8Q3uvPkJl_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"High","mechanism":"Super-empowered misinformation influencers degrade the shared Trust seam that every PHI function depends on.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recoRO5r8Q3uvPkJl_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Reshapes","magnitude":"High","mechanism":"AI-empowered solo/private operators become faster, cheaper substitutes, shifting the trust-plus-friction balance away from PHIs; work leaves the field.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""}]}]},{"id":"reca39gOzFg3ZSrAV","label":"Can PHIs actually wield it?","question":"Do PHIs have the talent, permission, and culture to vibe-code their own tools, run a breakout channel, and equip the frontline, or will they be out-maneuvered by faster private actors?","poleA":"PHIs harness it","poleB":"Private actors out-run PHIs","sharpest":false,"outcomes":[{"id":"recSUQHEm47VO7D6X","label":"PHIs harness the leverage","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health builds its own tools, runs breakout channels, and equips the frontline, claiming individual-scale leverage for the field.","strategicMove":"Harnessing the leverage is possible only if institutions grant themselves permission to build, hiring or borrowing the talent to vibe-code internal tools, run owned channels instead of renting reach, and put capability directly in frontline hands. The mechanism is an internal build-and-broadcast capacity: small technical teams, a real owned audience, and CHW-facing tooling. The venue is the owned-channel and workforce layer, where the field either operates its own vehicles or depends on others'. The hard part is procurement rules, hiring constraints, and a compliance culture that make public health institutionally slow to build anything. The move: change the operating model so building and broadcasting are permitted and funded functions, not exceptions, because the leverage is real but only accrues to institutions that reform themselves to actually use it.","impacts":[{"id":"recSUQHEm47VO7D6X_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Strengthens","magnitude":"Medium","mechanism":"PHI-built tools raise performance and delivery, sustaining public trust and the federal funding that builds the bench.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"}]},{"id":"reccxP8NkI7EO0Kvq","label":"Private actors out-run PHIs","direction":"Negative","alignment":"Self-aligned","narrative":"Faster private and vendor operators capture the space while public health, unable to build or move at speed, is out-maneuvered and sidelined.","strategicMove":"This is the default because private actors have the talent, capital, and permission to ship while public health is bound by procurement cycles, hiring freezes, and risk aversion, so the vendors define the tools and channels before the field even scopes a plan. The engine is a capability and speed gap that the institution's own rules keep open. The hard part is that once private operators own the tools and the audience, public health becomes their customer or their afterthought, renting capability it could have built. The move: attack the internal constraints directly, faster procurement, technical hiring authority, and a mandate to build, because being out-run is not a talent problem but an operating-model problem, and the field is sidelined precisely where it declines to reform the rules that keep it slow.","impacts":[{"id":"reccxP8NkI7EO0Kvq_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Weakens","magnitude":"High","mechanism":"If private actors move faster, health departments buy from vendors instead of PHIs; the PHI's trust-and-friction advantage erodes.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""}]}]},{"id":"recp9schKCZzTVzPk","label":"Lift the floor or widen the gap?","question":"Does AI augmentation lift the floor (every community health worker becomes 10x) or widen the gap (only the well-resourced get the gear)?","poleA":"Lifts the floor for everyone","poleB":"Widens the capability gap","sharpest":false,"outcomes":[{"id":"rec9yZ27YkPBiqXFY","label":"Augmentation lifts the floor","direction":"Positive","alignment":"Engineered alignment","narrative":"AI augmentation makes every community health worker dramatically more capable, easing the workforce crisis across the field.","strategicMove":"The floor rises for the whole workforce only if the augmenting tools are procured and distributed as shared public infrastructure, because left to the market only well-resourced departments buy the gear and the gap widens instead. The mechanism is pooled provisioning: a common CHW copilot funded and distributed through Medicaid, state health agencies, or a shared cooperative so the smallest clinic gets the same capability as the largest system. The venue is the workforce-tooling procurement layer, where equitable access is either designed in or left to budgets. The hard part is that shared infrastructure needs a funder and a steward, and there is no natural owner or revenue to sustain it once the pilot grant ends. The move: fund and steward a common augmentation layer for the frontline so capability is distributed by design, because AI lifts the whole floor only when the gear is provisioned as a public good, not sold department by department.","impacts":[{"id":"rec9yZ27YkPBiqXFY_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Strengthens","magnitude":"Medium","mechanism":"AI copilots capture and extend tacit know-how across a thin workforce, feeding the knowledge engine even when headcount stays low.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"}]},{"id":"recMlveuvPTrf3LQ8","label":"Augmentation widens the gap","direction":"Negative","alignment":"Needs collective action","narrative":"Only well-resourced institutions get the AI gear, deepening a two-tier geography where capability tracks existing wealth.","strategicMove":"The gap widens by default because augmentation is bought, so it flows to departments that already have money, staff, and grants, and the under-resourced places that most need the multiplier fall further behind. The engine is market distribution meeting pre-existing inequality, capability compounding where capacity already sits. The hard part is that the tools genuinely help, so refusing them is not an option, yet unmanaged adoption bakes in a durable divide between rich and poor jurisdictions. The move: treat frontline AI as infrastructure to be equalized, not a product to be sold, funding pooled procurement and targeted distribution to the lowest-capacity communities first, because without deliberate leveling the technology's benefit concentrates exactly where advantage already is and hardens the two-tier map.","impacts":[{"id":"recMlveuvPTrf3LQ8_recZyLPx38j0qTLC0","label":"B1 — Brain drain","effect":"Weakens","magnitude":"Medium","mechanism":"If only well-resourced players get AI, under-resourced PHIs fall further behind, accelerating relative brain drain and capability loss.","loopName":"B1 — Brain drain","loopSubsystem":"Steward","loopCode":"B1"}]}]}]},{"id":"recheqUlEteLP6f2G","name":"The Fragmenting Public","theme":"The Social Fabric","headline":"There is no single public anymore.","short":"Polarization, declining solidarity, and personalized everything are dissolving the shared 'we' public health acts on.","neutralHeadline":"One public is becoming many.","neutralReading":"The single 'public' public health has addressed is fragmenting into many smaller publics, driven by polarization, personalization, and shifting solidarity. That complicates one-message-for-all approaches and rewards more tailored, community-rooted engagement. A neutral shift in the structure of the public, though it does erode tools that depend on a shared 'we.'","neutralName":"The Plural Public","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"reclz0Q7WWTKWA9Ni","label":"Tribes vs fluid enclaves","question":"Does fragmentation harden into durable health tribes with rival red and blue realities, or does it stay fluid enough that publics can be re-bridged?","poleA":"Durable rival tribes","poleB":"Fluid, re-bridgeable enclaves","sharpest":false,"outcomes":[{"id":"recGYF4dvwFSrypya","label":"Fluid publics stay reachable","direction":"Positive","alignment":"Self-aligned","narrative":"Fragmentation is shallow and shifting rather than tribal, so no group is locked to a fixed health position and coalitions re-form issue by issue.","strategicMove":"Reachability survives only if public health resists the reflex to pick a side, because the thing that keeps enclaves fluid is that health has not yet become a partisan marker. The mechanism is disciplined non-alignment: route guidance through messengers with no political valence (clinicians, pharmacists, local figures) and refuse to let any single tribe brand the message as theirs. The venue is the trusted-messenger and framing layer, where a message either does or does not acquire a partisan tag. The hard part is that neutrality is costly and slow, it means declining alliances and viral moments that would lock in one bloc while repelling another. The move: protect the field's non-partisan credibility as a strategic asset, spending it deliberately through unaligned messengers, because fluidity is the window and a captured brand closes it.","impacts":[{"id":"recGYF4dvwFSrypya_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"When publics stay fluid rather than captured, credible messengers can still shift opinion, feeding the credibility flywheel as accurate guidance is heard and acted on.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]},{"id":"recPYzpkuFUlPf9nf","label":"Health tribes harden","direction":"Negative","alignment":"Self-aligned","narrative":"Red and blue health realities calcify into durable tribes where facts follow identity, and any credibility won with one side is lost with the other.","strategicMove":"This wins by default once health guidance reads as a partisan signal, because then the messenger, not the evidence, decides reception, and the establishment messenger is disqualified for half the country on sight. The engine is identity-protective cognition plus a media ecosystem rewarded for sorting people. The hard part, and the trap, is that the intuitive fix (a bigger official campaign to set the record straight) confirms the tribe's story that the establishment is coming for them. The move: stop broadcasting from the discredited center and instead resource in-group messengers who already hold standing inside each tribe to carry the same evidence in their own voice, because in a tribal world the only credible source is one the audience already counts as their own.","impacts":[{"id":"recPYzpkuFUlPf9nf_recWTeR3n1iuuChGg","label":"R3 — Community standing","effect":"Weakens","magnitude":"Medium","mechanism":"Standing built in one tribe fails to travel to the other, so community-standing gains stall at the tribal boundary and the loop cannot compound reputation field-wide.","loopName":"R3 — Community standing","loopSubsystem":"Amplify","loopCode":"R3"},{"id":"recPYzpkuFUlPf9nf_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"High","mechanism":"Hardened health tribes decode any guidance as a partisan signal, so trust earned with one side is spent with the other, draining the shared trust the seam depends on.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"recbxn2l8uQpUrnUp","label":"Collective vs individual action","question":"Can public health still mobilize collective action that depends on shared sacrifice like herd immunity and mandates, or is only voluntary individual behavior achievable?","poleA":"Shared-sacrifice action still possible","poleB":"Only voluntary individual behavior","sharpest":false,"outcomes":[{"id":"recegxFPZdEw0EKKE","label":"Collective action revives","direction":"Positive","alignment":"Needs collective action","narrative":"Enough shared identity survives that communities still accept protective sacrifice for a common good, so herd-level goals stay reachable.","strategicMove":"Collective action revives not because people were persuaded in the abstract but because public health pre-built the trusted local institutions that can vouch for a shared ask when it comes. The mechanism is standing relationships: funded partnerships with faith networks, unions, schools, and CHW rosters that already carry weight inside their communities. The venue is the local convener layer, not the national podium, because sacrifice is granted to people you know, not to an agency. The hard part is that this infrastructure is unglamorous, has to be paid for between crises, and shows no return until the moment it is needed. The move: fund and hold standing community-messenger networks in peacetime so there is a trusted vehicle to activate when a collective ask arrives, rather than trying to manufacture solidarity during the emergency.","impacts":[{"id":"recegxFPZdEw0EKKE_rec72k0jpsfpCyrde","label":"B3 — Community agency (catalyst vs recipient)","effect":"Strengthens","magnitude":"Medium","mechanism":"A surviving sense of common good lets communities organize collective action, reinforcing the community-agency loop as people mobilize around shared protective goals.","loopName":"B3 — Community agency (catalyst vs recipient)","loopSubsystem":"Convene","loopCode":"B3"}]},{"id":"recMOUUXR8nbhS6xB","label":"Only voluntary self-interest","direction":"Negative","alignment":"Needs collective action","narrative":"Shared sacrifice is dead as a frame, mandates and herd thresholds are unreachable, and public health can only nudge individuals acting on self-interest.","strategicMove":"This is the default when the only tools left are appeals to collective duty and the collective has dissolved: you keep asking a fragmented public to sacrifice for a whole it no longer feels part of, and it declines. The engine is the erosion of shared identity plus public health's habit of designing for populations rather than individuals. The hard part is that fighting it by shouting the collective message louder actively deepens the backlash. The move: redesign interventions so the protective choice pays off for the individual directly, defaults that require no coordination (opt-out schedules, pharmacy standing orders, structural barriers removed), because in a self-interest world you win by engineering the individual incentive and the default, not by invoking a solidarity that is gone.","impacts":[{"id":"recMOUUXR8nbhS6xB_rec6hW9Xkbb80fHl7","label":"R1 — Neutral-table flywheel","effect":"Weakens","magnitude":"High","mechanism":"If only individual self-interest motivates behavior, parties have little reason to sit at a shared table for collective goals, sapping the neutral-table flywheel of purpose.","loopName":"R1 — Neutral-table flywheel","loopSubsystem":"Convene","loopCode":"R1"}]}]},{"id":"rectmFwMfc0TU8zyF","label":"Re-bridgeable or fractured?","question":"By 2035, is there still a single public that health messaging can address, or must public health operate as many tailored micro-publics with no shared message?","poleA":"A re-bridgeable public","poleB":"Permanently fragmented micro-publics","sharpest":true,"outcomes":[{"id":"reccMqOz1AdXsCXiD","label":"Re-stitched common ground","direction":"Positive","alignment":"Engineered alignment","narrative":"A shared-enough public persists because trusted local conveners keep knitting micro-publics into a common conversation, so one coherent campaign still lands.","strategicMove":"Common ground gets re-stitched only if someone is paid to do the stitching, and that someone is a network of trusted local conveners who can translate one message into many idioms without breaking its core. The mechanism is funded convening: a standing weave of community anchors (libraries, clinics, faith leaders, CHWs) that public health equips with a shared evidence base but lets speak locally. The venue is the community-convener layer, the connective tissue between enclaves. The hard part is that this weave has no natural owner or revenue, so it decays the moment grant cycles end, exactly when it is needed. The move: become the funded steward of the local convening commons, financing the connective infrastructure that lets a fractured public still be addressed as one, because re-bridging is a maintained capability, not a spontaneous event.","impacts":[{"id":"reccMqOz1AdXsCXiD_rec6hW9Xkbb80fHl7","label":"R1 — Neutral-table flywheel","effect":"Strengthens","magnitude":"High","mechanism":"A still-reachable common public gives the neutral-table flywheel real convening pull, since parties still recognize one another as part of one conversation worth joining.","loopName":"R1 — Neutral-table flywheel","loopSubsystem":"Convene","loopCode":"R1"}]},{"id":"recbkbqg3NA0va30e","label":"No shared message survives","direction":"Negative","alignment":"Self-aligned","narrative":"The public splinters into micro-publics with no common frame, so any single message reaches a sliver and broad guidance loses its authority.","strategicMove":"This is the default outcome of trying to broadcast one message to a public that no longer shares a frame: reach coll
