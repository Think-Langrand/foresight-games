apses, and the response, funding parallel and contradictory outreach for every sliver, multiplies cost without rebuilding the common ground. The engine is algorithmic sorting plus the absence of any funded body whose job is to maintain shared conversation. The hard part is that the fragmentation is real, so you cannot wish a mass audience back, and chasing every micro-public bankrupts the field. The move: stop paying to reach fragments one by one and instead invest in the connective layer, shared trusted intermediaries and default channels that span enclaves, because the alternative to a common frame is not more segments, it is an infrastructure that re-creates a place messages can land.","impacts":[{"id":"recbkbqg3NA0va30e_reccbUqhcXDhF3ZDE","label":"B1 — Reach vs. fidelity","effect":"Strengthens","magnitude":"Medium","mechanism":"Funding parallel outreach to fragmented micro-publics forces mass-tailoring that trades message fidelity for reach, intensifying the reach-versus-fidelity tension the loop tracks.","loopName":"B1 — Reach vs. fidelity","loopSubsystem":"Translate & Disperse","loopCode":"B1"},{"id":"recbkbqg3NA0va30e_rec4NCooYpMNY00fu","label":"B2 — Barrier amplification","effect":"Strengthens","magnitude":"High","mechanism":"With no shared message, excluded micro-publics never see themselves addressed, so participation barriers compound and the barrier-amplification loop runs hotter for every group left out.","loopName":"B2 — Barrier amplification","loopSubsystem":"Convene","loopCode":"B2"}]}]}]},{"id":"recvcBZXSgFwF4iUV","name":"The Fringe Ascendant","theme":"The Social Fabric","headline":"Once-fringe health beliefs now hold power.","short":"Legitimacy is decoupling from evidence as alternative health movements gain real political influence.","neutralHeadline":"Once-fringe health movements are gaining power.","neutralReading":"Heterodox and alternative health movements are moving from the margins toward mainstream influence and political power. This challenges evidence-based authority and also reflects real, addressable grievances (distrust, a desire for agency) that public health can engage. Limit: from a public-health standpoint, legitimacy decoupling from evidence is a genuine concern, so a fully neutral read is hard; the movement can still be read as a signal to engage, not only a threat.","neutralName":"The Heterodox Turn","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"rec6l65Qzy3HUQT1D","label":"Captured or contained?","question":"Do heterodox and anti-establishment health movements capture regulatory and institutional power, or do they stay contained at the margins?","poleA":"Captured and normalized into power","poleB":"Contained at the margins","sharpest":true,"outcomes":[{"id":"recb9310cOag9Lofw","label":"Contained at the margins","direction":"Positive","alignment":"Self-aligned","narrative":"Heterodox movements stall short of institutional control, so public health keeps custody of the evidentiary mainstream and the fringe stays a communication problem.","strategicMove":"Containment holds only if public health actively defends the institutional positions the fringe is trying to take, the advisory committees, the guideline bodies, the funding review panels, rather than assuming the mainstream is self-sustaining. The mechanism is guarding the procedural high ground: transparent, hard-to-capture evidence processes and a bench of credible experts ready to staff the seats. The venue is the standards-and-appointments layer, where custody of the mainstream is actually decided. The hard part is that defending process is invisible and thankless until the moment it is breached, and it competes for attention with louder fights. The move: treat the evidentiary institutions as the terrain to hold, investing in the transparency and succession that make them capture-resistant, because the fringe stays contained only where the mainstream's machinery is deliberately kept sound.","impacts":[{"id":"recb9310cOag9Lofw_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"With the fringe contained, public health keeps custody of the evidentiary mainstream, so the credibility flywheel keeps compounding: authoritative wins accrue to established institutions rather than challengers.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]},{"id":"recbQo7ajJUt1twvo","label":"Fringe captures the agencies","direction":"Negative","alignment":"Needs collective action","narrative":"Heterodox movements seize regulatory and institutional levers, rewriting guidance and funding around unproven claims, so public health must work against its own captured agencies.","strategicMove":"Capture wins by default when the field treats institutional guidance as permanent and pours its energy into public debunking while the seats, the panels, and the funding rules are quietly taken from inside. The engine is the fringe's discipline about power (occupying committees and appointments) meeting public health's neglect of them. The hard part is that once agencies are captured, their imprimatur is turned against you, and appeals to official authority no longer help. The move: build institutional redundancy before capture and preserve credibility outside captured agencies, independent evidence syntheses, professional societies, subnational and academic anchors that can carry authoritative guidance when the federal seal is compromised, because the answer to captured institutions is a distributed, hard-to-capture source of authority, not a louder plea to the ones already lost.","impacts":[{"id":"recbQo7ajJUt1twvo_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"High","mechanism":"Capture splits the public into camps that trust rival authorities, so the trust seam fractures: no single institution can be a shared source of truth once official power is contested.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recbQo7ajJUt1twvo_rectnJjD3okzhRSsj","label":"R2 — Counter-misinformation","effect":"Breaks / reverses","magnitude":"High","mechanism":"Once the fringe controls the agencies, the counter-misinformation loop runs in reverse: official channels now amplify the unproven claims they were built to correct, turning the correction engine into a spreader.","loopName":"R2 — Counter-misinformation","loopSubsystem":"Amplify","loopCode":"R2"}]}]},{"id":"reciundsDwrRqdYWk","label":"Engage or dismiss the grievance","question":"Does public health engage and bridge the underlying grievance around agency and distrust, or dismiss it and cede the ground?","poleA":"Engages and bridges grievance","poleB":"Dismisses and cedes ground","sharpest":false,"outcomes":[{"id":"rec1X96WqiyjzYz53","label":"Grievance bridged, trust regained","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health takes the demand for agency seriously and meets people where their distrust lives, pulling adherents back and draining the movement's recruiting appeal.","strategicMove":"Bridging the grievance works because the fringe recruits on a real feeling (of being dismissed and controlled) and that recruiting engine is starved when public health concedes what is legitimate and hands back genuine choice. The mechanism is dignifying the concern in practice: shared decision-making, honest disclosure of uncertainty, and public acknowledgment where past guidance overreached. The venue is the clinical encounter and the trust layer, where agency is either extended or denied. The hard part is that this requires the field to give up some rhetorical certainty and control, which feels like surrender to critics inside public health itself. The move: separate the legitimate grievance from the false remedy and address the grievance directly through agency-restoring practice, because you dissolve a movement by removing the wound it exploits, not by debating the quackery it sells.","impacts":[{"id":"rec1X96WqiyjzYz53_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Strengthens","magnitude":"Medium","mechanism":"By meeting people where their distrust lives, the institute re-establishes the direct relationship the fringe vendors had captured, tilting the root PHI-versus-vendor loop back toward the institution.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""},{"id":"rec1X96WqiyjzYz53_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Strengthens","magnitude":"High","mechanism":"Engaging the underlying grievance directly feeds the trust seam: acknowledging agency and distrust converts adversaries into interlocutors, restoring the shared trust the seam depends on.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recPB8ZNlDK0bbRgY","label":"Dismissal fuels backlash","direction":"Negative","alignment":"Self-aligned","narrative":"Public health dismisses the movement as mere ignorance and cedes the emotional ground, so the unaddressed grievance hardens into identity and every rebuttal proves its point.","strategicMove":"This is the default when the field mistakes a grievance for an information deficit and answers a demand for agency with more facts, which reads as contempt and confirms the story that the establishment neither listens nor respects. The engine is the deficit-model reflex plus the emotional satisfaction of debunking. The hard part is that every official correction is now processed as an attack by the very institution the movement defines itself against, so effort spent rebutting deepens the identity. The move: stop treating adherents as ignorant and start conceding the legitimate part of the complaint out loud, because a grievance denied becomes an identity, and identities cannot be argued away, they can only be de-fueled by respect and returned agency.","impacts":[{"id":"recPB8ZNlDK0bbRgY_recpHxg5zO1QWqtgR","label":"B1 — Polarization / backlash","effect":"Strengthens","magnitude":"High","mechanism":"Dismissal that reads as elite contempt supercharges the polarization/backlash loop: each official rebuttal hardens oppositional identity and grows the movement it meant to shrink.","loopName":"B1 — Polarization / backlash","loopSubsystem":"Amplify","loopCode":"B1"}]}]},{"id":"rec9VEJU76TsjT4z5","label":"Net harm or unmet need?","question":"Is the fringe on balance net harm to health, or does it surface real unmet needs that public health could reclaim?","poleA":"Net harm, unsafe and anti-science","poleB":"Surfaces reclaimable unmet needs","sharpest":false,"outcomes":[{"id":"recZOhrSxdkI1jjM0","label":"Unmet needs reclaimed","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health reads the fringe as a signal of real unmet needs around prevention, time, and autonomy, and reclaims that territory by answering the same questions credibly.","strategicMove":"Reclaiming the ground means competing on the demand the fringe actually serves (unhurried attention, a prevention story, a sense of agency) rather than only refuting its claims. The mechanism is building the legitimate version of what people are buying elsewhere: longer preventive visits, clear guidance on diet, sleep, and metabolic health, and shared-decision tools that give patients real say. The venue is the primary-care and public-guidance surface where those unmet needs are either met or ceded. The hard part is that meeting them costs clinician time and money and forces public health to own domains it has long underweighted and left to grifters. The move: fund and legitimize the prevention-and-autonomy offer the fringe monetizes, so the credible option exists at the point of need, because you only take back territory by occupying it, not by warning people off it.","impacts":[{"id":"recZOhrSxdkI1jjM0_recF6ANvoybZcVCqR","label":"R1 — Relevance flywheel","effect":"Strengthens","magnitude":"Medium","mechanism":"Reading the fringe as unmet demand and serving it directly turns the relevance flywheel: public health becomes more responsive to felt needs, which draws people back and compounds its relevance.","loopName":"R1 — Relevance flywheel","loopSubsystem":"Translate & Disperse","loopCode":"R1"}]},{"id":"recnixO3aEsXFAZBG","label":"Net harm spreads","direction":"Negative","alignment":"Self-aligned","narrative":"The fringe proves mostly unsafe and anti-science, and its normalization spreads delayed care, refused vaccines, and dangerous protocols through influencer channels.","strategicMove":"Net harm scales by default because the fringe distributes through high-trust influencer channels while public health answers through low-trust official ones, so the bad protocol travels faster than the correction. The engine is a distribution mismatch: parasocial trust and algorithmic reach on one side, institutional voice on the other. The hard part is that direct debunking often amplifies the very claim it targets and hands the fringe the establishment-attacks-us narrative it feeds on. The move: fight the distribution gap, not the individual claim, by seeding credible messengers inside the same influencer and platform channels and pre-bunking the predictable next protocol before it peaks, because harm spreads through a channel advantage and is countered by closing that channel advantage, not by out-arguing each post.","impacts":[{"id":"recnixO3aEsXFAZBG_rectnJjD3okzhRSsj","label":"R2 — Counter-misinformation","effect":"Weakens","magnitude":"High","mechanism":"As unsafe practice scales through influencer channels, the volume of harmful claims outruns the counter-misinformation loop's capacity to correct, so corrections chronically lag the spread.","loopName":"R2 — Counter-misinformation","loopSubsystem":"Amplify","loopCode":"R2"}]}]}]},{"id":"recGMTA7OhwFe7dQy","name":"The Outsourced Mind","theme":"The Social Fabric","headline":"We're outsourcing our thinking to AI.","short":"Cognitive offloading may be eroding independent judgment, health literacy, and resistance to manipulation.","neutralHeadline":"Health decisions are moving to AI.","neutralReading":"People are increasingly turning to AI for health information and decisions, offloading some judgment to always-available assistants. This could raise the floor of everyday health decisions or erode independent literacy and resistance to manipulation, depending on how the tools are built and who shapes them. The underlying shift is neutral; the current framing leans cautionary.","neutralName":"","topRight":false,"impact":"","uncertainty":"","uncertainties":[{"id":"recD41XMH2Z6U875K","label":"Raises floor or erodes judgment?","question":"Does outsourcing health decisions to AI raise the floor of everyday choices, or erode judgment, literacy, and agency over time?","poleA":"Raises the floor of decisions","poleB":"Erodes judgment and agency","sharpest":true,"outcomes":[{"id":"rec56msEX32lX3wRk","label":"AI raises the floor","direction":"Positive","alignment":"Self-aligned","narrative":"AI assistants give everyone competent, personalized guidance, lifting the baseline of everyday health decisions for people who never had good access.","strategicMove":"The floor rises only if the guidance the assistants dispense is anchored to sound evidence and reaches the people with the worst access, which does not happen automatically. The mechanism is curating and pushing the evidence base the models draw on and steering distribution to underserved populations, through Medicaid-adjacent channels, safety-net clinics, and community devices, rather than letting quality track ability to pay. The venue is the content source the assistant cites plus the deployment channels that decide who gets the good version. The hard part is that the commercial default optimizes for paying users, so the floor-lifting version has to be deliberately funded and placed where the market will not go. The move: fund the evidence source and the equitable distribution so the AI's baseline advice is both trustworthy and actually reaches the underserved, because a raised floor is engineered through source and access, not delivered by the technology on its own.","impacts":[{"id":"rec56msEX32lX3wRk_recF6ANvoybZcVCqR","label":"R1 — Relevance flywheel","effect":"Strengthens","magnitude":"High","mechanism":"AI that raises the floor delivers relevant, personalized guidance at scale, feeding the relevance flywheel: more useful answers reach more people, who return for more, compounding public health's reach through the tool.","loopName":"R1 — Relevance flywheel","loopSubsystem":"Translate & Disperse","loopCode":"R1"},{"id":"rec56msEX32lX3wRk_reccbUqhcXDhF3ZDE","label":"B1 — Reach vs. fidelity","effect":"Reshapes","magnitude":"Medium","mechanism":"Massive AI reach strains the reach-versus-fidelity loop: guidance scales to everyone but is generic, so the tension shifts toward volume, and fidelity to local context must be actively defended.","loopName":"B1 — Reach vs. fidelity","loopSubsystem":"Translate & Disperse","loopCode":"B1"}]},{"id":"recm6NkF1DsnvoKNP","label":"Judgment atrophies","direction":"Negative","alignment":"Self-aligned","narrative":"People defer reflexively to the machine, health literacy and independent judgment atrophy, and populations grow fragile to bad models and manipulation.","strategicMove":"Atrophy is the default because the assistant makes deferring effortless and thinking-it-through costly, so people stop building the judgment needed to catch when the model is wrong or gamed. The engine is convenience plus the disappearance of any friction that would keep human sense-making alive. The hard part is that you cannot un-invent the copilot or ban the convenience, and lecturing people to think for themselves loses to the frictionless default every time. The move: build the verification habit into the tool rather than fighting the tool, push for assistants that show sources, flag uncertainty, and prompt a human check on high-stakes advice, and set literacy standards for health AI, because judgment is preserved by engineering friction and transparency into the default interface, not by asking a population to be more diligent than the design lets them be.","impacts":[{"id":"recm6NkF1DsnvoKNP_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"Medium","mechanism":"When people cannot sanity-check advice they no longer understand, the trust seam grows brittle: trust becomes blind deference to whatever tool is in front of them rather than earned confidence in a source.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recm6NkF1DsnvoKNP_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Weakens","magnitude":"Medium","mechanism":"As judgment atrophies and people stop building their own health knowledge, the knowledge engine loses the human expertise that feeds it, so the institution's capacity to reason independently thins out.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"}]}]},{"id":"recd2RjfEOgqFBXuL","label":"Accountable when AI harms at scale","question":"When an outsourced AI decision harms people at scale, is accountability clearly assigned, or does it diffuse until no one is answerable?","poleA":"Accountability clearly assigned","poleB":"Accountability diffuses to no one","sharpest":false,"outcomes":[{"id":"rec0IjAA3IzrdQNLr","label":"Accountability clearly assigned","direction":"Positive","alignment":"Engineered alignment","narrative":"Clear rules pin responsibility for AI health harms on identifiable actors, creating strong incentives for safety and giving public health real oversight leverage.","strategicMove":"Accountability gets assigned only if someone writes the liability into law and standards before the harms scale, because the default technical stack diffuses blame across model maker, platform, and user by design. The mechanism is a legal and procurement regime that names a duty-holder: mandated audit logs, adverse-event reporting for health AI, and liability that attaches to the deploying party, modeled on how drugs and devices are already governed. The venue is statute, regulatory rulemaking, and public-payer contract terms, the surfaces where responsibility is actually fixed. The hard part is that industry will resist clear liability hard and the rules must be written while the technology is still moving. The move: port the device-and-drug accountability model onto health AI through legislation and procurement now, because responsibility is a thing you assign in advance through law and contract, and if you wait for the harm the diffusion has already won.","impacts":[{"id":"rec0IjAA3IzrdQNLr_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Strengthens","magnitude":"Medium","mechanism":"Clear accountability for AI harms gives the trust seam something to rest on: people can trust the system because a named party is answerable and bad actors can be corrected, reinforcing confidence in the layer.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recTdY3IWCnEv3wvh","label":"Accountability vanishes","direction":"Negative","alignment":"Needs collective action","narrative":"Responsibility for scaled AI harms diffuses across model makers, platforms, and users until no one is answerable, harms recur uncorrected, and public health can find no party to hold.","strategicMove":"This wins by inertia because the multi-actor AI stack diffuses accountability unless someone deliberately fixes it, and no existing law cleanly names the responsible party, so each actor points to the next. The engine is legal ambiguity plus every commercial incentive to keep it ambiguous. The hard part is that after a mass harm there is no defendant, no recall authority, and no correction loop, so the same failure repeats. The move: refuse to let ambiguity stand by pushing for statutory duty-of-care and mandatory adverse-event reporting for health AI before the crisis, because in the absence of assigned accountability the default is that no one is answerable, and that default is only broken by law written ahead of the harm.","impacts":[]}]},{"id":"recCkiMWsmFvdcH7G","label":"Shape the layer or get bypassed?","question":"Does public health shape and govern the AI health-cognition layer, or get bypassed by consumer AI it does not control?","poleA":"Shapes and governs the AI layer","poleB":"Bypassed by consumer AI","sharpest":false,"outcomes":[{"id":"recw7djcc5gxbJuZ4","label":"PH governs the cognition layer","direction":"Positive","alignment":"Engineered alignment","narrative":"Public health sets the standards, guardrails, and evidence base that consumer AI draws on, embedding sound guidance at the source and shaping the defaults millions receive.","strategicMove":"Governing the cognition layer means becoming the citable source and the rulebook the models reach for, not shipping a rival chatbot no one opens. The mechanism is being the substrate: publish machine-readable, authoritative guidance the assistants ingest, set evaluation benchmarks for health answers, and negotiate as a coordinated buyer and standard-setter so vendors adopt public terms. The venue is the model-and-standards layer upstream of any single app, plus the procurement leverage of public payers. The hard part is that this commons work is invisible, has no constituency once built, and requires health departments to pool leverage they are used to spending alone. The move: aggregate public-health buying and standard-setting power to make sound guidance the default the AI cites, because you shape the copilot by owning the source and the rules it depends on, not by competing with it for the user.","impacts":[{"id":"recw7djcc5gxbJuZ4_recPPVsv5AMgVk8Yv","label":"R1 — Credibility flywheel","effect":"Strengthens","magnitude":"High","mechanism":"Governing the AI cognition layer embeds public health's evidence into the defaults millions receive, so the credibility flywheel spins faster: every good answer the tool gives accrues authority to the standard behind it.","loopName":"R1 — Credibility flywheel","loopSubsystem":"Amplify","loopCode":"R1"}]},{"id":"recetxOrNLSVNtPO1","label":"Consumer AI routes around PH","direction":"Negative","alignment":"Self-aligned","narrative":"Commercial AI becomes the primary health interface and answers to its owners, optimized for engagement or sales, with public health bypassed and no lever over what it tells people.","strategicMove":"Bypass is the default because building the source and standards layer is slow and unfunded while consumers adopt whatever assistant ships first, so the interface is set by vendors optimizing for retention and revenue. The engine is speed and convenience meeting public health's absence from the layer where answers are actually generated. The hard part is that once the assistant is entrenched as the front door, there is no obvious point of leverage: no contract, no standard, no citation that public health controls. The move: refuse to concede the layer by establishing the leverage early, procurement conditions through public payers, disclosure and evaluation standards, and authoritative machine-readable guidance, because the interface answers to whoever set its rules and its sources, and if public health sets neither it is designed out.","impacts":[{"id":"recetxOrNLSVNtPO1_recKjJJfn7C14BYTw","label":"Root relationship — Trust + friction = PHI vs vendor","effect":"Breaks / reverses","magnitude":"High","mechanism":"When consumer AI becomes the primary interface, the root PHI-versus-vendor relationship flips: the vendor owns the direct tie to people and optimizes for its own ends, disintermediating public health entirely.","loopName":"Root relationship — Trust + friction = PHI vs vendor","loopSubsystem":"Bridge & Extend","loopCode":""},{"id":"recetxOrNLSVNtPO1_rectnJjD3okzhRSsj","label":"R2 — Counter-misinformation","effect":"Weakens","magnitude":"Medium","mechanism":"If the dominant health interface answers to commercial owners, the counter-misinformation loop loses its channel: corrections cannot reach people through a tool public health does not control.","loopName":"R2 — Counter-misinformation","loopSubsystem":"Amplify","loopCode":"R2"}]}]}]},{"id":"rec5AnkKMu8hwJnJs","name":"Funding Whiplash & the Austerity Cliff","theme":"The Institutional Base","headline":"Funding lurches from surge to cliff.","short":"Boom-bust financing makes durable workforce, data, and trust almost impossible to build.","neutralHeadline":"How public health gets funded is being rewritten.","neutralReading":"Public health financing is being restructured, cycling between emergency surges and lean periods and shifting among federal, state, philanthropic, and payer sources. The instability makes long-horizon building hard, and the same churn is opening a serious debate about durable, foundational financing. Limit: the current pattern is genuinely destabilizing, and the name 'austerity cliff' carries that charge, so a fully neutral read understates a real strain.","neutralName":"Funding in Flux","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recS1abW0EoWVMhyM","label":"Foundational vs boom-bust","question":"By 2035, does public health win durable foundational financing through mandatory funding, dedicated taxes, or ROI-tied streams, or does it stay locked in permanent boom-bust austerity cycles?","poleA":"Durable foundational financing","poleB":"Permanent boom-bust austerity","sharpest":true,"outcomes":[{"id":"reccMmbNeQXfcpkP3","label":"Foundational funding lands","direction":"Positive","alignment":"Needs collective action","narrative":"Public health gets durable, foundational funding, a stable base that no longer resets to zero after each crisis.","strategicMove":"The move is to convert public health from crisis-triggered appropriations into foundational funding: a defined minimum package (the Foundational Public Health Services model) financed through a dedicated, non-discretionary mechanism, a mandatory federal line, a health-plan or provider assessment, or a small dedicated tax. The venue is the financing statute and budget rules, not the annual ask. The hard part is political: durable money means forgoing the crisis surges that are easier to pass, and building a constituency for prevention that has no visible victims when it works. The move: anchor the case in the Foundational Services floor plus a dedicated revenue source, so the base survives the next administration.","impacts":[{"id":"reccMmbNeQXfcpkP3_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Strengthens","magnitude":"Medium","mechanism":"Reliable multi-year funding removes the recurring layoff cliff, so the workforce seam holds talent and institutional memory instead of shedding them each austerity cycle.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"reccMmbNeQXfcpkP3_recLemwzhLNZ2Y60f","label":"B1 — Funding buffer","effect":"Strengthens","magnitude":"High","mechanism":"Predictable foundational financing lets PHIs hold real reserves, powering the funding-buffer loop so they can absorb shocks instead of laying off staff each downturn.","loopName":"B1 — Funding buffer","loopSubsystem":"Anchor","loopCode":"B1"}]},{"id":"recxHvT5d46PcWEux","label":"Locked in boom-bust","direction":"Negative","alignment":"Needs collective action","narrative":"Funding stays trapped in the emergency cycle, flooding in during a crisis and draining out after, so capacity is built and lost on repeat.","strategicMove":"The default, because emergency money is politically easy and standing money is hard, and prevention has no constituency between crises. The path is defined by the absence of a dedicated revenue mechanism: every dollar competes annually, so the field never builds past the last surge. Escaping it needs a financing structure insulated from the appropriations cycle. The move: stop treating each emergency as the chance to 'finally fund public health' and fight for the boring permanent line item, because surge-and-collapse is the most expensive way to run a system.","impacts":[{"id":"recxHvT5d46PcWEux_recLemwzhLNZ2Y60f","label":"B1 — Funding buffer","effect":"Weakens","magnitude":"High","mechanism":"Boom-bust cycling drains reserves faster than they refill, so the funding-buffer loop never accumulates enough cushion to smooth the next austerity trough.","loopName":"B1 — Funding buffer","loopSubsystem":"Anchor","loopCode":"B1"},{"id":"recxHvT5d46PcWEux_rec5okOjHCx0H8Mvv","label":"B2 — Underfunded-compliance trap","effect":"Strengthens","magnitude":"Medium","mechanism":"Chronic underfunding forces organizations to chase compliance-driven grant dollars just to survive, deepening the underfunded-compliance trap and crowding out mission work.","loopName":"B2 — Underfunded-compliance trap","loopSubsystem":"Steward","loopCode":"B2"}]}]},{"id":"recSf0ZbWsx4J7eL1","label":"Backfills durable or thin?","question":"As federal dollars recede, does funding durably relocate to states, philanthropy, Medicaid, and private payers, or do those backfills prove thin and temporary?","poleA":"Money durably relocates","poleB":"Backfills thin and temporary","sharpest":false,"outcomes":[{"id":"recD5WvP0PlGVJaLB","label":"Backfills hold","direction":"Positive","alignment":"Needs collective action","narrative":"As federal money recedes, states, philanthropy, Medicaid, and payers durably pick up the load, and the backfill proves real rather than temporary.","strategicMove":"The move is to convert one-off backfills into structural ones: Medicaid reimbursement for public-health services (case management, CHWs, prevention), state foundational-funding statutes, and multi-year philanthropic compacts rather than project grants. The venue is Medicaid state plan amendments and state legislation, where money becomes recurring. The hard part is that backfills are thin by nature: philanthropy is small next to federal scale and states vary wildly, so the floor is uneven and fragile. The move: prioritize the backfills that recur automatically (Medicaid, statute) over the ones re-won each year.","impacts":[{"id":"recD5WvP0PlGVJaLB_recyLUlWvEk9DgqqM","label":"R2 — Trust-and-funding engine","effect":"Strengthens","magnitude":"Medium","mechanism":"Durable state, philanthropic, and Medicaid backfills give PHIs diversified revenue to broker, reinforcing the trust-and-funding engine as delivery earns the next round of blended dollars.","loopName":"R2 — Trust-and-funding engine","loopSubsystem":"Bridge & Extend","loopCode":"R2"}]},{"id":"recxQvZOJWVHlgxtI","label":"Backfills prove thin","direction":"Negative","alignment":"Needs collective action","narrative":"The state, philanthropic, and payer backfills turn out too small and too temporary, and the hole federal retreat leaves is never really filled.","strategicMove":"This happens because the backfills are structurally smaller than what receded: philanthropy is a rounding error against federal public-health spending, and states without their own revenue cannot cover it. The path is defined by the mismatch between the gap and the patch. The hard part is that hoping for backfill substitutes for organizing durable revenue, and the thinness stays invisible until a crisis exposes it. The move: be honest that backfills buy time, not solvency, and spend that time building recurring revenue rather than assuming philanthropy will hold.","impacts":[{"id":"recxQvZOJWVHlgxtI_recrHXtP6M4NJ7qJ6","label":"B1 — Surge-demand balance","effect":"Weakens","magnitude":"Medium","mechanism":"When backfills prove thin, there is no slack to meet surges in demand, so the surge-demand balance loop tips into chronic overload and unmet need.","loopName":"B1 — Surge-demand balance","loopSubsystem":"Bridge & Extend","loopCode":"B1"},{"id":"recxQvZOJWVHlgxtI_recXa0hz6JqoW13xW","label":"B2 — Capacity / funding constraint","effect":"Strengthens","magnitude":"Medium","mechanism":"Short-lived, uneven backfills tighten the capacity-and-funding constraint, so programs must cut reach exactly where local wealth is thinnest and need is highest.","loopName":"B2 — Capacity / funding constraint","loopSubsystem":"Translate & Disperse","loopCode":"B2"}]}]},{"id":"recVvKg2pfvOq03BP","label":"Stability with strings?","question":"If funding stabilizes, does it arrive clean, or with strings such as political conditions, narrow disease silos, and performance mandates that reshape the mission?","poleA":"Flexible, mission-aligned funding","poleB":"Conditional, mission-reshaping strings","sharpest":false,"outcomes":[{"id":"recGKSZHl0XuLT42o","label":"Clean flexible funding","direction":"Positive","alignment":"Needs collective action","narrative":"Stable funding arrives with few strings, flexible enough to let institutions direct it where the need actually is.","strategicMove":"The move is to win funding in a form that preserves discretion: flexible block or foundational funding tied to broad outcomes rather than narrow disease silos, with PHIs as the flexible intermediary that can move money across categorical lines. The venue is how the appropriation is structured (flexible vs categorical) and the intermediary role in the middle. The hard part is that flexible money is harder to sell than a named disease, and flexibility invites accountability questions the field must answer. The move: pair the ask for flexibility with visible performance and equity metrics, because unaccountable flexibility loses to earmarks.","impacts":[]},{"id":"recagjPAd9VYCECa8","label":"Strings reshape mission","direction":"Mixed / depends","alignment":"Mixed / depends","narrative":"The money stabilizes but arrives with conditions (political, categorical, performance) that quietly bend what the institution works on.","strategicMove":"Genuinely two-sided: strings can enforce useful discipline (equity targets, evidence requirements) or capture the mission (political conditions, narrow silos that crowd out real need). The path is defined by whose conditions ride along with the dollars. The hard part is that money is never neutral, and an institution dependent on a single stringed source slowly becomes the shape of that string. The move: diversify funding sources deliberately so no single funder's conditions can redirect the mission, and treat funder diversity as mission insurance, not just financial prudence.","impacts":[{"id":"recagjPAd9VYCECa8_recOLbN2l0CiYHtAk","label":"B3 — Mission vs. conduit drift","effect":"Strengthens","magnitude":"High","mechanism":"Conditional, siloed funding pulls organizations toward acting as pass-through conduits for funder priorities, accelerating the mission-versus-conduit drift the loop tracks.","loopName":"B3 — Mission vs. conduit drift","loopSubsystem":"Anchor","loopCode":"B3"}]}]}]},{"id":"recXkHb9xdBIMdXmB","name":"The Great Subtraction","theme":"The Institutional Base","headline":"We're losing the ability to see threats.","short":"Cuts, talent flight, and dismantled monitoring hollow out both capacity and visibility into emerging risks.","neutralHeadline":"Where public health capacity sits is being redrawn.","neutralReading":"Public health capacity, expertise, and monitoring infrastructure are being rapidly reduced and redistributed, to states, the private sector, and abroad. This lowers visibility into emerging risks and forces hard choices about what to rebuild, where capability should sit, and what to do differently. Limit: the near-term effect is a genuine loss of capability, and the name 'subtraction' names that; a neutral read should not obscure that reduced visibility is a real risk.","neutralName":"The Great Reallocation","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recSyRcE2phKbw7dB","label":"Reversible or permanent brain drain","question":"As scientists leave public health, is the loss reversible (talent returns, monitoring is rebuilt, institutional ties are restored) or does a generation of expertise and infrastructure walk out permanently?","poleA":"Capacity and visibility rebuild","poleB":"Permanent hollowing","sharpest":true,"outcomes":[{"id":"recnicc9crRyCYlYQ","label":"Rebuilt bench","direction":"Positive","alignment":"Needs collective action","narrative":"The lost scientific and public-health capacity is rebuilt, talent returns, monitoring is restored, and the bench refills.","strategicMove":"The move is to make return and retention deliberate: fellowship and re-entry pathways that bring departed scientists back, competitive pay and mission that keep the next cohort, and rapid rebuilding of the monitoring and data infrastructure lost staff ran. The venue is workforce financing (loan repayment, fellowships, salary bands) and the training pipeline. The hard part is timing and tacit knowledge: capability leaves fast and rebuilds slowly, and a generation of institutional and relational knowledge does not come back with a headcount. The move: prioritize retaining and codifying the knowledge of who remains while rebuilding the pipeline, because you cannot rehire what walked out the door.","impacts":[{"id":"recnicc9crRyCYlYQ_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Strengthens","magnitude":"High","mechanism":"Returning scientists restock the expertise that the knowledge engine converts into practice and codified standards, restarting the reinforcing cycle of capacity generating more capacity.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"},{"id":"recnicc9crRyCYlYQ_recLYpNqjuclt3aCN","label":"R2 — Institutional-knowledge continuity","effect":"Strengthens","magnitude":"Medium","mechanism":"A trained new cohort overlaps with remaining veterans long enough to absorb tacit knowledge, repairing the institutional-knowledge continuity that a clean generational break would sever.","loopName":"R2 — Institutional-knowledge continuity","loopSubsystem":"Anchor","loopCode":"R2"}]},{"id":"recEkVkSDk4d82HLP","label":"Hollowed generation","direction":"Negative","alignment":"Needs collective action","narrative":"A generation of expertise and infrastructure leaves for good, and the loss proves permanent rather than a dip.","strategicMove":"This happens when talent exits faster than it can be replaced and the tacit knowledge goes with it: monitoring systems lapse, relationships dissolve, and the people who knew how it worked do not return. The path is defined by the irreversibility of tacit-knowledge loss. The hard part is that the damage is invisible until a crisis needs the capacity that is no longer there, and by then rebuilding from zero takes a decade. The move: treat knowledge codification and retention as the emergency they are right now, because the difference between a dip and a permanent hollowing is how much you capture before people leave.","impacts":[{"id":"recEkVkSDk4d82HLP_recZyLPx38j0qTLC0","label":"B1 — Brain drain","effect":"Strengthens","magnitude":"High","mechanism":"Each unreplaced departure raises workload and lowers morale for those left, pushing more to leave and driving the brain-drain loop deeper into a self-reinforcing spiral.","loopName":"B1 — Brain drain","loopSubsystem":"Steward","loopCode":"B1"},{"id":"recEkVkSDk4d82HLP_recLYpNqjuclt3aCN","label":"R2 — Institutional-knowledge continuity","effect":"Breaks / reverses","magnitude":"High","mechanism":"When senior experts exit without successors, the transfer of tacit institutional knowledge stops entirely, severing the continuity loop that lets an institution retain expertise across generations.","loopName":"R2 — Institutional-knowledge continuity","loopSubsystem":"Anchor","loopCode":"R2"}]}]},{"id":"rec3evfTG68mEA9gJ","label":"Backfilling lost surveillance","question":"Can states, universities, philanthropy, or private actors backfill lost national data and surveillance capacity, or does the country operate partially blind to emerging threats?","poleA":"Distributed backfill works","poleB":"Operating partially blind","sharpest":false,"outcomes":[{"id":"recTgH8dfdeR5vpdQ","label":"Distributed surveillance holds","direction":"Positive","alignment":"Needs collective action","narrative":"States, universities, philanthropy, and private actors backfill the lost national surveillance, and the country keeps its eyes open through a distributed patchwork.","strategicMove":"The move is to knit a distributed monitoring system from the pieces that survive: university labs, state systems, private diagnostics, and academic networks stitched together by shared data standards and an aggregator that makes them interoperable. The venue is the data-standards and interoperability layer that lets a patchwork function as a system. The hard part is that a stitched-together system is only as good as its coordination, and no single actor is funded to be the connective aggregator. The move: fund and own the aggregation and standards layer, because distributed sensors without a common backbone produce fragments, not a national picture.","impacts":[{"id":"recTgH8dfdeR5vpdQ_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Strengthens","magnitude":"Medium","mechanism":"A federated state and university surveillance network keeps threat detection working, preserving the program-effectiveness seam that lets public health show it still delivers results.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recD5HqoNwmwKLyEN","label":"Flying partially blind","direction":"Negative","alignment":"Needs collective action","narrative":"The lost national surveillance is never backfilled, and the country operates partially blind, missing threats until they are large.","strategicMove":"The default when national capacity is cut and nothing coordinates the remaining pieces: coverage gets patchy, signals are missed, and the first sign of an outbreak is a hospital surge. The path is defined by the absence of an owner for the connective layer. The hard part is that blindness is invisible until the miss, so there is no political pressure to fix it until a preventable outbreak makes the gap undeniable. The move: quantify and dramatize the blind spots now (what we can no longer see) to build the case for a distributed backbone, because 'we are flying blind' only lands after the crash unless someone shows it first.","impacts":[{"id":"recD5HqoNwmwKLyEN_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"Medium","mechanism":"A late-detected outbreak becomes a visible failure that erodes public confidence, weakening the trust seam that public health depends on to secure cooperation and funding.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""},{"id":"recD5HqoNwmwKLyEN_recxeyR3hvHCzJshD","label":"R2 — Knowledge engine","effect":"Breaks / reverses","magnitude":"High","mechanism":"Without national surveillance data, the knowledge engine loses its raw input, so evidence generation and codified guidance stall and the loop that turns data into practice reverses.","loopName":"R2 — Knowledge engine","loopSubsystem":"Steward","loopCode":"R2"}]}]},{"id":"recYutmIcGR2qnG0B","label":"Where the lost capacity lands","question":"Where does departed public health talent actually go: recruited abroad by the EU, China, or the Gulf; absorbed into the domestic private sector; or simply lost from the field altogether?","poleA":"Recoverable and nearby","poleB":"Dispersed and gone","sharpest":false,"outcomes":[{"id":"rec3HvxjrxjbmZ6Ow","label":"Talent stays reachable","direction":"Mixed / depends","alignment":"Mixed / depends","narrative":"The departed talent scatters into academia, the private sector, and abroad, but stays reachable and could be drawn back.","strategicMove":"Genuinely mixed: talent that moves to universities, companies, or other countries is not destroyed and can be re-engaged through partnerships, contracts, and surge arrangements, but every year away weakens the tie and deepens the alternative. The path depends on how fast public health builds the bridges to reach that dispersed expertise. The hard part is that 'reachable' decays: people build new lives and loyalties, and a standing offer beats a someday-maybe. The move: build formal reserve, fellowship, and partnership channels that keep departed experts in the field's orbit, because latent talent only counts if you have a way to call it back.","impacts":[{"id":"rec3HvxjrxjbmZ6Ow_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Reshapes","magnitude":"Medium","mechanism":"Talent parked in private sector and academia keeps the workforce pool nearby, so the workforce seam reshapes into a borrow-and-partner model rather than an outright loss of skills.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"rec9P0bt61zYxqEmh","label":"Expertise exported","direction":"Negative","alignment":"Needs collective action","narrative":"The lost expertise is actively recruited away, to the EU, China, the Gulf, and the private sector, and is gone from public service for good.","strategicMove":"This happens because other countries and industries actively recruit displaced scientists with better pay and stability, and once resettled they rarely return. The path is defined by competitors' pull plus public health's inability to match compensation. The hard part is that this is brain drain in the classic sense, a national loss of capability that benefits rivals, and it compounds as networks and training capacity go with the people. The move: treat scientific-workforce retention as a national-capacity issue, not an HR one, and compete on mission, flexibility, and the parts of the package public service can still win, because you cannot out-pay the Gulf but you can lose everyone if you try nothing.","impacts":[{"id":"rec9P0bt61zYxqEmh_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Weakens","magnitude":"High","mechanism":"With top scientists recruited offshore, delivery quality drops and the reputation that lets institutions win the next mandate erodes, weakening the delivery-reputation engine that funds future capacity.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"}]}]}]},{"id":"rec3AMWFQSVc4SFIB","name":"The Patchwork Paradox","theme":"The Institutional Base","headline":"Public health is splintering into 50 systems.","short":"Resilient as a network with no single point of failure, but any one institute can be hollowed out; does the network mutualize?","neutralHeadline":"Public health is becoming a 50-state network.","neutralReading":"Authority and capacity are distributed across many state and local systems rather than centralized. That brings real strengths, no single point of failure and room to experiment and adapt locally, alongside real risks of uneven protection and weak coordination. The live question is whether the network chooses to pool and back each other up.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recRNT8pOPhW2unTj","label":"Mutual aid vs winners-losers","question":"By 2035, does the PHI network actively mutualize with shared services, surge talent, and pooled funds, or does it harden into winners and losers?","poleA":"Network mutual aid","poleB":"Winners-and-losers patchwork","sharpest":true,"outcomes":[{"id":"recLXWtwLVJsAlIp1","label":"Network mutualizes","direction":"Positive","alignment":"Needs collective action","narrative":"The PHI network actively backstops itself, strong institutes lending capacity, shared services, and pooled funds to struggling ones.","strategicMove":"The move is real mutual-aid infrastructure across the network: shared back-office and compliance services, a surge-staffing pool that deploys talent to a strained member, and a pooled reserve or mutual-insurance fund that catches a member before it fails. The venue is the network body (NNPHI-style) and the legal and financial vehicles that let institutes share risk. The hard part is that mutualizing runs against each institute's incentive to hoard scarce dollars, so it holds only if the strong see backstopping the weak as protecting the whole field's legitimacy and pipeline. The move: stand up shared services and a mutual reserve now, and frame solidarity as self-interest, because a visible failure anywhere damages trust everywhere.","impacts":[{"id":"recLXWtwLVJsAlIp1_recFUDwFPv7ONlWhm","label":"R3 — Long-term relationships","effect":"Strengthens","magnitude":"High","mechanism":"Backstopping struggling peers builds durable reciprocity, feeding the long-term-relationships loop as each rescue deepens the trust members draw on next time.","loopName":"R3 — Long-term relationships","loopSubsystem":"Anchor","loopCode":"R3"},{"id":"recLXWtwLVJsAlIp1_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Strengthens","magnitude":"Medium","mechanism":"Shared surge talent lets strong PHIs lend staff to thin ones, so the workforce seam holds across the network instead of collapsing where capacity is weakest.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recqregKUWTceUdnA","label":"Winners and losers harden","direction":"Negative","alignment":"Needs collective action","narrative":"The network hardens into winners and losers, well-resourced institutes thrive while weak ones fail, and no one catches them.","strategicMove":"The default, because competition for scarce funding pulls institutes apart and helping a rival is nobody's job. The path is defined by the absence of a mutual-aid structure: without shared services or a pooled reserve, a struggling member's decline is a private problem until it collapses. The hard part is that the collapse of weak nodes is invisible to the strong until the geography of protection has already fractured. The move: name the network's shared fate and build the backstop before the losers fail, because a field of a few strong institutes and many dead ones is weaker than it looks.","impacts":[{"id":"recqregKUWTceUdnA_recpspyaDTQkNATyN","label":"B1 — Neutrality tension","effect":"Strengthens","magnitude":"Medium","mechanism":"When members compete for the same scarce dollars, sitting at a shared table looks like aiding a rival, intensifying the neutrality-tension loop that keeps conveners from cooperating.","loopName":"B1 — Neutrality tension","loopSubsystem":"Convene","loopCode":"B1"},{"id":"recqregKUWTceUdnA_recLemwzhLNZ2Y60f","label":"B1 — Funding buffer","effect":"Weakens","magnitude":"High","mechanism":"A winners-and-losers scramble concentrates reserves in the strongest PHIs and strips them from the weakest, so the funding-buffer loop fails exactly where the cushion is most needed.","loopName":"B1 — Funding buffer","loopSubsystem":"Anchor","loopCode":"B1"}]}]},{"id":"reczmSrE4xQcsTSRq","label":"Decentralization: strength or risk?","question":"By 2035, is decentralization mostly a strength with no single point of failure and room to experiment, or mostly a vulnerability of inequity and no coordination?","poleA":"Resilient, experimental strength","poleB":"Inequitable, uncoordinated risk","sharpest":false,"outcomes":[{"id":"recjgPjd6BTE5OOVW","label":"Decentralized resilience","direction":"Positive","alignment":"Self-aligned","narrative":"Decentralization proves a strength, no single point of failure, and 50 laboratories of experimentation that surface better approaches.","strategicMove":"This one largely runs on its own logic: a distributed system has no single kill switch, and independent states experimenting produce innovations a centralized system never would. The move for public health is to harvest it, spot what works in one state and spread it fast through peer networks and communities of practice, turning local experiments into field-wide learning. The venue is the convening and knowledge-sharing layer. The hard part is that resilience-through-distribution only becomes an asset if someone actively captures and diffuses the lessons; left alone, good local innovations stay local. The move: run the network as a fast learning system so decentralization's upside compounds instead of dissipating.","impacts":[{"id":"recjgPjd6BTE5OOVW_recAV1YuukaQU0KPr","label":"R2 — Knowledge & practice","effect":"Strengthens","magnitude":"Medium","mechanism":"Decentralized experimentation generates diverse local wins that the knowledge-and-practice loop can harvest and diffuse, turning variety into shared learning.","loopName":"R2 — Knowledge & practice","loopSubsystem":"Convene","loopCode":"R2"}]},{"id":"rec6OpdRl9YXTZ3Fd","label":"Uncoordinated fragility","direction":"Negative","alignment":"Needs collective action","narrative":"Decentralization proves a weakness, no coordination, no shared response, and fragile nodes that fail alone when stressed.","strategicMove":"The shadow side of distribution: without coordination, a shared threat meets 50 uncoordinated responses and the weakest nodes buckle with no one to catch them. The path is defined by the absence of connective tissue once federal coordination thins. The hard part is that coordination is a public good with no owner in a devolved system, and building it competes with everyone's local priorities. The move: invest in the lightweight connective layer (mutual aid, shared standards, a coordinating body) that turns a loose patchwork into a network, because distribution without coordination is just fragmentation.","impacts":[{"id":"rec6OpdRl9YXTZ3Fd_recrHXtP6M4NJ7qJ6","label":"B1 — Surge-demand balance","effect":"Weakens","magnitude":"Medium","mechanism":"Without coordination, cross-border threats hit states one at a time with no shared surge capacity, so the surge-demand balance loop breaks down under uncoordinated load.","loopName":"B1 — Surge-demand balance","loopSubsystem":"Bridge & Extend","loopCode":"B1"}]}]},{"id":"recBgknl8WZn2TvsC","label":"Two-tier or re-converge?","question":"Does the fifty-state patchwork calcify into a permanent two-tier health geography, or do standards and capacity re-converge across states?","poleA":"Permanent two-tier geography","poleB":"Re-converging standards","sharpest":false,"outcomes":[{"id":"rechSQWM3bUPv0Yvh","label":"Standards re-converge","direction":"Positive","alignment":"Engineered alignment","narrative":"The 50-state patchwork re-converges around shared standards, so where you live matters less to the protection you get.","strategicMove":"The move is voluntary convergence through shared infrastructure: common data standards, model policies, accreditation, and shared services that make the high-standard way the cheap, easy default, so states adopt it because it is better, not because they are forced. The venue is accreditation, model legislation, and the shared-services layer, the soft-power tools that work without a federal mandate. The hard part is that convergence is slow and voluntary while the strongest pull is toward divergence, as red and blue states deliberately differentiate. The move: make the high floor the path of least resistance through shared tools and accreditation, because in a devolved system you cannot mandate convergence, only make it attractive.","impacts":[{"id":"rechSQWM3bUPv0Yvh_recAV1YuukaQU0KPr","label":"R2 — Knowledge & practice","effect":"Strengthens","magnitude":"Medium","mechanism":"Cross-state exchange of standards and practice pulls laggards toward leaders, powering the knowledge-and-practice loop as shared norms diffuse capacity across the network.","loopName":"R2 — Knowledge & practice","loopSubsystem":"Convene","loopCode":"R2"}]},{"id":"recZSp42jmmn45KoY","label":"Two-tier geography locks in","direction":"Negative","alignment":"Needs collective action","narrative":"A permanent two-tier health geography sets in, where your zip code and statehouse decide your level of protection.","strategicMove":"This happens as states diverge by politics and capacity and the gap compounds: strong states build, weak states cut, residents sort accordingly. The path is defined by the absence of any convergence force once federal coordination recedes. The hard part is that a two-tier system is self-reinforcing (capacity attracts talent and funding) and comfortable for the winning tier, so nobody with power is motivated to close it. The move: use the tools that still cross state lines (accreditation, shared data standards, philanthropy aimed at the bottom tier) to slow divergence, because once the tiers harden they are extremely hard to merge.","impacts":[{"id":"recZSp42jmmn45KoY_recbkXC5gip6Wulll","label":"Seam — Program effectiveness","effect":"Weakens","magnitude":"High","mechanism":"A locked-in two-tier geography means program effectiveness diverges sharply by state, dragging the program-effectiveness seam down wherever capacity has stalled.","loopName":"Seam — Program effectiveness","loopSubsystem":"Cross-cutting","loopCode":""}]}]}]},{"id":"rec8ipgyXVQ9UlnO3","name":"The Workforce Cliff","theme":"The Institutional Base","headline":"The workforce is walking out the door.","short":"Burnout, attrition, and a hard-to-fill technical and frontline gap, with community health workers as the emerging answer.","neutralHeadline":"The public health workforce is being remade.","neutralReading":"The public health workforce is being reconstituted, who does the work and through which roles and models, as the traditional pipeline strains and new models (community health workers, AI-augmented generalists) emerge. There is real pressure from burnout and attrition and a real opening to build a different, better-fit workforce. Limit: the name 'cliff' foregrounds loss; the shift is as much redefinition as decline.","neutralName":"The Workforce Remade","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"recEc50Clswls2Nyd","label":"Does a new workforce model scale","question":"What does the public health workforce look like in 2035 (credentialed professionals, community health workers, gig and contract labor, AI-augmented generalists, or a blend), and does a new model actually scale to fill the gap left by the cliff?","poleA":"New workforce model scales","poleB":"Cliff wins, capacity collapses","sharpest":true,"outcomes":[{"id":"recENzu9IDveSgMh7","label":"Blended model scales","direction":"Positive","alignment":"Engineered alignment","narrative":"A new blended workforce (credentialed professionals, community health workers, AI-augmented generalists) scales up and actually fills the gap.","strategicMove":"The move is to design the blended model rather than wait for it: define the roles (what a CHW, a generalist, and an AI-augmented worker each do), build the career ladders and credentials that make them real jobs, and fund the mix as the standard staffing model, not a pilot. The venue is workforce policy, credentialing, and financing (including Medicaid reimbursement for CHWs). The hard part is that a blended model scales only if the new roles have durable financing and advancement, otherwise they stay grant-funded experiments that evaporate. The move: build the financing and career structure for the new roles first, because the model scales on its plumbing, not its pilots.","impacts":[{"id":"recENzu9IDveSgMh7_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"Medium","mechanism":"With enough hands to staff programs, delivery quality holds up and the reputation that wins the next contract stays intact, keeping the delivery-reputation engine turning.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"},{"id":"recENzu9IDveSgMh7_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Reshapes","magnitude":"High","mechanism":"A working blend of roles redefines the workforce seam itself, replacing the single credentialed-hire pipeline with multiple entry paths that together refill capacity.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recIQIEpHE3gwkkVD","label":"Cliff wins","direction":"Negative","alignment":"Needs collective action","narrative":"The workforce cliff wins, departures and hard-to-fill roles outpace every fix, and capacity simply collapses.","strategicMove":"This happens when retirements, burnout, and non-competitive pay drain the workforce faster than new models can be stood up, and the new roles never get durable funding. The path is defined by the mismatch between the speed of loss and the speed of the fix. The hard part is that the cliff is a compounding spiral: fewer people means more burnout means more departures, and it accelerates once critical mass is lost. The move: treat new-model financing and the pipeline as an emergency to stand up now, because past a tipping point the remaining workforce leaves faster than any program can backfill.","impacts":[{"id":"recIQIEpHE3gwkkVD_recZyLPx38j0qTLC0","label":"B1 — Brain drain","effect":"Strengthens","magnitude":"High","mechanism":"Collapsing capacity dumps unsustainable workloads on survivors, accelerating exits and reinforcing the brain-drain loop as departures beget more departures.","loopName":"B1 — Brain drain","loopSubsystem":"Steward","loopCode":"B1"},{"id":"recIQIEpHE3gwkkVD_recrHXtP6M4NJ7qJ6","label":"B1 — Surge-demand balance","effect":"Breaks / reverses","magnitude":"High","mechanism":"A skeleton crew cannot absorb demand spikes, so the surge-demand balancing loop breaks: each surge overwhelms the remaining staff and pushes more of them out, deepening the shortage.","loopName":"B1 — Surge-demand balance","loopSubsystem":"Bridge & Extend","loopCode":"B1"}]}]},{"id":"recGZnRtMbWzv3EGm","label":"AI augmentation relief or harm","question":"Does AI augmentation genuinely relieve the workforce shortage by letting fewer people do more, or does it accelerate burnout, deskilling, and displacement of the workers who remain?","poleA":"Force-multiplier for staff","poleB":"Burnout and deskilling","sharpest":false,"outcomes":[{"id":"recJfVesWJ2mspEvi","label":"AI multiplies remaining staff","direction":"Positive","alignment":"Engineered alignment","narrative":"AI augmentation lets a shrunken workforce do far more, multiplying the people who remain rather than replacing them.","strategicMove":"The move is to deploy AI as a copilot for the frontline: automating the documentation, translation, triage, and analysis that eat staff time, so a thin workforce spends its hours on the human and judgment work only people can do. The venue is tooling and workflow redesign, plus the training to use it well. The hard part is that augmentation multiplies only if paired with workflow redesign and trust; done carelessly it adds oversight burden or deskills the workforce it was meant to help. The move: redesign the work around the tools, not bolt tools onto old workflows, because augmentation is a workflow project, not a software purchase.","impacts":[{"id":"recJfVesWJ2mspEvi_recXa0hz6JqoW13xW","label":"B2 — Capacity / funding constraint","effect":"Weakens","magnitude":"Medium","mechanism":"By absorbing routine documentation and analysis, AI loosens the capacity and funding constraint loop, letting a smaller team cover the same footprint without proportional new hiring.","loopName":"B2 — Capacity / funding constraint","loopSubsystem":"Translate & Disperse","loopCode":"B2"}]},{"id":"recqVNICJeEPhkOeR","label":"AI drives burnout and deskilling","direction":"Negative","alignment":"Needs collective action","narrative":"AI augmentation backfires, accelerating burnout, deskilling, and displacement instead of relieving the shortage.","strategicMove":"This happens when AI is dropped onto an already-stretched workforce as a productivity demand rather than relief: it adds verification and oversight work, erodes the skills it automates, and signals to staff that they are replaceable. The path is defined by treating augmentation as cost-cutting rather than capacity-building. The hard part is that the failure is quiet, morale and skill erode before the metrics show it, and the workforce you meant to save leaves faster. The move: introduce AI as relief with the workforce, not as a mandate onto it, and measure burnout and skill, not just throughput, because augmentation that spends the workforce is the cliff by another name.","impacts":[{"id":"recqVNICJeEPhkOeR_recrarvwE6QQNPUB6","label":"B2 — Capacity / overreach","effect":"Strengthens","magnitude":"High","mechanism":"Using AI to justify doing even more with fewer people pushes the capacity and overreach loop harder, so overextension and burnout compound until the remaining staff break.","loopName":"B2 — Capacity / overreach","loopSubsystem":"Amplify","loopCode":"B2"}]}]},{"id":"recV28utVmsY3uovy","label":"CHW financing and career ladders","question":"Can community health workers scale fast enough and sustainably, backed by durable financing and real career ladders, or do they stay trapped in short grant cycles that never become permanent infrastructure?","poleA":"Durable CHW infrastructure","poleB":"Stuck in grant cycles","sharpest":false,"outcomes":[{"id":"recXklh2TYGs7gVWN","label":"CHWs become permanent infrastructure","direction":"Positive","alignment":"Needs collective action","narrative":"Community health workers become permanent, financed infrastructure with real career ladders, not a rotating cast of grant-funded temps.","strategicMove":"The move is to make CHWs a standing part of the system: sustainable financing (Medicaid reimbursement, foundational funding), certification and career ladders, and integration into care teams so the role has a future. The venue is Medicaid policy, state certification, and payment models, the places that turn a grant line into a job. The hard part is that CHWs have been 'the future' for decades and keep dying in the grant cycle, because their financing is soft and their advancement is thin. The move: fight the CHW battle on financing and career structure, not on evidence (that is settled), because what kills CHW programs is the funding model, not the proof they work.","impacts":[{"id":"recXklh2TYGs7gVWN_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"Medium","mechanism":"Trusted local workers reach communities professional staff could not, boosting delivery results and feeding the delivery-reputation engine that justifies continued funding.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"},{"id":"recXklh2TYGs7gVWN_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Strengthens","magnitude":"High","mechanism":"A financed, credentialed CHW layer adds a durable new tier to the workforce seam, widening the talent pool and easing the pipeline pressure that the cliff created.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recf91QxwNdXFtDE8","label":"Grant-cycle churn","direction":"Negative","alignment":"Needs collective action","narrative":"CHWs stay stuck in the grant cycle, hired and lost as short-term funding comes and goes, and the model never becomes durable.","strategicMove":"The default, because CHWs are funded through soft, categorical grants, so programs staff up, build trust in a community, then lay people off when the grant ends, destroying the relationships that made them work. The path is defined by the absence of recurring financing. The hard part is that the churn destroys exactly the community trust that is a CHW's whole value, so each cycle starts further behind. The move: convert CHW financing to recurring sources (Medicaid, statute) before scaling, because scaling a grant-funded model just scales the churn.","impacts":[{"id":"recf91QxwNdXFtDE8_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Weakens","magnitude":"Medium","mechanism":"Repeated hire-and-layoff cycles keep CHWs from becoming a stable tier, so the workforce seam never consolidates and each grant loss reopens the same gap.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""}]}]}]},{"id":"recOv2IFLOBYcgm8m","name":"AI as Public Health Infrastructure","theme":"The Data & AI Inflection","headline":"AI is becoming public health infrastructure.","short":"A force-multiplier for a thin workforce, or a trust-destroyer, depending on who governs it.","neutralHeadline":"AI is becoming public health infrastructure.","neutralReading":"AI is becoming part of the basic infrastructure of public health, able to multiply a thin workforce or erode trust depending on who governs it and how. Already framed as an explicitly two-sided inflection rather than a threat.","neutralName":"","topRight":true,"impact":"High","uncertainty":"High","uncertainties":[{"id":"reccKO5MLQo3RFw5n","label":"Governed vs ungoverned AI","question":"In a world where AI is powerful and ubiquitous, does it become governed, trusted public-health infrastructure, or an ungoverned trust-and-equity threat that agencies scramble to contain?","poleA":"Governed AI as trusted infrastructure","poleB":"Ungoverned AI as a trust-and-equity threat","sharpest":true,"outcomes":[{"id":"recytprFS5O81iscC","label":"Trusted AI backbone","direction":"Positive","alignment":"Engineered alignment","narrative":"AI becomes trusted public-health infrastructure, a governed layer agencies and people rely on rather than a black box they fear.","strategicMove":"Public health earns the governance seat by owning the parts of the stack that create trust: the evaluation and audit regime for health AI (bias, safety, accuracy benchmarks), provenance standards for training data, and a 'safe for health use' certification that gates procurement. The venue is standards and buying power, not model-building. The hard part is speed and muscle: governance only confers trust if it moves at deployment pace and can technically audit frontier systems, which means hiring talent the field cannot currently pay for. The move: build one shared national assurance function, not 50 untested agency policies.","impacts":[{"id":"recytprFS5O81iscC_rectnJjD3okzhRSsj","label":"R2 — Counter-misinformation","effect":"Strengthens","magnitude":"Medium","mechanism":"Trusted AI helps public health detect and rebut false claims at scale, reinforcing the counter-misinformation loop where credible, timely correction protects the information environment.","loopName":"R2 — Counter-misinformation","loopSubsystem":"Amplify","loopCode":"R2"},{"id":"recytprFS5O81iscC_recqxDGfNzBoagsKw","label":"R1 — Delivery-reputation engine","effect":"Strengthens","magnitude":"High","mechanism":"Governed AI lets PHIs deliver faster, sharper analysis and outreach, so the delivery-reputation engine spins harder: better delivery earns credibility that wins the next mandate.","loopName":"R1 — Delivery-reputation engine","loopSubsystem":"Bridge & Extend","loopCode":"R1"}]},{"id":"recDlJ5cUBOZV4xob","label":"Ungoverned trust collapse","direction":"Negative","alignment":"Needs collective action","narrative":"AI floods health decisions faster than anyone governs it, and its errors and biases land hardest on the least-served.","strategicMove":"This path wins by inertia. Capable models ship into apps, clinics, and call centers with no health-specific assurance, and biased triage or confident-wrong advice surfaces only after it scales. It beats the governed path because no single actor is rewarded for slowing down and the assurance layer is a public good nobody funds. Stopping it needs collective muscle public health has lost: standards with teeth, pooled procurement leverage, and the standing to say 'not safe for health use.' The move: treat AI assurance as fundable critical infrastructure, because voluntary governance loses to shipping velocity every time.","impacts":[{"id":"recDlJ5cUBOZV4xob_recpHxg5zO1QWqtgR","label":"B1 — Polarization / backlash","effect":"Strengthens","magnitude":"Medium","mechanism":"High-profile ungoverned-AI harms feed the polarization and backlash loop, giving critics fresh ammunition and accelerating the reactive spiral against public health messaging.","loopName":"B1 — Polarization / backlash","loopSubsystem":"Amplify","loopCode":"B1"},{"id":"recDlJ5cUBOZV4xob_recQUNVs3gCGpHWCD","label":"Seam — Trust","effect":"Weakens","magnitude":"High","mechanism":"Biased and hallucinated AI guidance corrodes the cross-cutting Trust seam: every visible AI failure spends trust that every function depends on, and communities route around institutions.","loopName":"Seam — Trust","loopSubsystem":"Cross-cutting","loopCode":""}]}]},{"id":"recOAR2H2uxd3eXlD","label":"AI closes or widens the gap","question":"Does AI close the capability gap between well-resourced and under-resourced PHIs by giving everyone advanced analysis, or does it widen it because only the well-funded can adopt and govern it well?","poleA":"AI levels the field for all PHIs","poleB":"AI widens the resource gap","sharpest":false,"outcomes":[{"id":"recA49AtYSZWUwQwK","label":"AI levels the field","direction":"Positive","alignment":"Engineered alignment","narrative":"Cheap, capable AI lets the smallest health departments do work that used to require staff they never had.","strategicMove":"A good model has near-zero marginal cost, so the equity play is to make a strong shared version the default floor: a public-option toolkit (surveillance triage, plain-language translation, epi analysis, grant-writing) provisioned centrally and given free to every under-resourced PHI, run as a network shared service. The hard part is that a free tool is not enough; closing the gap needs the wraparound the strong already have (training, integration, trust), the expensive human part that does not scale with software. The move: fund the toolkit and the adoption support together, or the floor rises only on paper.","impacts":[{"id":"recA49AtYSZWUwQwK_recXIVDqFpLxuVvRl","label":"Seam — Workforce","effect":"Strengthens","magnitude":"Medium","mechanism":"Affordable AI tools stretch thin teams, easing the Workforce seam by giving under-staffed PHIs analytic capacity they cannot hire, so capability spreads beyond the well-resourced.","loopName":"Seam — Workforce","loopSubsystem":"Cross-cutting","loopCode":""}]},{"id":"recxTddvVM1FO8rXd","label":"AI widens the gap","direction":"Negative","alignment":"Needs collective action","narrative":"AI amplifies whoever already had capacity, so strong PHIs pull ahead and weak ones fall further behind.","strategicMove":"Left to the market, the best tools and integration go to those who can pay and staff for them, and capability compounds: better tooling produces better results that attract more funding and talent. It beats the equalizing path because redistribution runs against how resources actually flow. The hard part for public health is that a compounding gap is far cheaper to prevent than to reverse. The move: name the divergence early and stand up the shared floor before the gap becomes self-reinforcing.","impacts":[{"id":"recxTddvVM1FO8rXd_rec4NCooYpMNY00fu","label":"B2 — Barrier amplification","effect":"Strengthens","magnitude":"High","mechanism":"When only well-funded PHIs can adopt and govern AI, the barrier-amplification loop compounds: the under-resourced fall further behind and their communities face steeper access barriers.","loopName":"B2 — Barrier amplification","loopSubsystem":"Convene","loopCode":"B2"}]}]},{"id":"recB1s3eWmoBKSaTp","label":"Who governs the AI","question":"Do public institutions set the terms for public-health AI and the data it trains on, or do commercial vendors and closed models control the stack that agencies depend on?","poleA":"Public institutions govern the models and data","poleB":"Vendors and closed models control the stack","sharpest":false,"outcomes":[{"id":"reccAttBvsKlMd3hO","label":"Public stewardship of AI","direction":"Positive","alignment":"Engineered alignment","narrative":"The data, rules, and guardrails for health AI are set in the public interest, not by whoever ships fastest.","strategicMove":"Public health stewards the shared substrate the models run on: an open, consented, representative health-data commons, published evaluation standards, and disclosure of training data and failure modes. The venue is the data-and-standards layer, upstream of any single app. What makes it real is aggregating buyer leverage, pooling procurement across health departments so vendors must meet public terms to reach the market. The hard part: a commons has no revenue and no constituency once the crisis passes, so it dies without dedicated funding or a mandate that makes it a required layer. The move: be the neutral steward and secure the financing a commons always lacks.","impacts":[{"id":"reccAttBvsKlMd3hO_rec4OZHExT6C8xOIo","label":"Codification flow (the lever)","effect":"Strengthens","magnitude":"High","mechanism":"When public institutions set and publish AI standards, the codification-flow leverage point turns hard-won practice into reusable, inspectable rules that raise the whole field's floor.","loopName":"Codification flow (the lever)","loopSubsystem":"Steward","loopCode":""}]},{"id":"recuHdfH8fJZRAITw","label":"Vendor lock-in dependence","direction":"Negative","alignment":"Self-aligned","narrative":"The firms that build and sell the models also set the norms for how health AI behaves, on their data and terms.","strategicMove":"This happens simply because vendors move first and institutions arrive with opinions but no leverage. What actually governs behavior (training data, what the model optimizes, who it works well for) is decided inside private firms answering to their own incentives. It out-competes the public path because capital and talent concentrate where the money is. The hard part is lock-in: once standards, data, and integrations are privatel
